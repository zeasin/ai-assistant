server:
  port: 6790
  address: 0.0.0.0

spring:
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: false
    encoding: UTF-8
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai

app:
  config-dir: ${ASSISTANT_CONFIG_DIR:.}
  notes-port: 14096
  code-port: 14099
  timezone: Asia/Shanghai
  max-history-chars: 6000
