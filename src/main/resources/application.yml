server:
  port: 6790
  address: 0.0.0.0

spring:
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: true
    encoding: UTF-8
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
  datasource:
    url: jdbc:sqlite:${ASSISTANT_CONFIG_DIR:.}/memory.db
    driver-class-name: org.sqlite.JDBC

app:
  config-dir: ${ASSISTANT_CONFIG_DIR:.}
  notes-port: 14096
  code-port: 14099
  timezone: Asia/Shanghai
  max-history-chars: 6000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    root: INFO
    com.laoqi.assistant.service.SchedulerService: DEBUG
    com.laoqi.assistant.service.MediaDataCollectorService: DEBUG
    com.laoqi.assistant.service.ConfigService: DEBUG
    com.laoqi.assistant.service.FeishuService: DEBUG
    com.laoqi.assistant.service.OpenCodeService: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
