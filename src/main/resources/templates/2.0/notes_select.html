<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{2.0/layout}">
<head>
    <title layout:fragment="title">笔记</title>
    <style>
        .notes-page { max-width:1200px; margin:0 auto; padding:20px; }
        .page-header { margin-bottom:24px; }
        .page-header h2 { font-size:20px; font-weight:600; margin:0 0 4px; }
        .page-desc { font-size:13px; color:#909296; }

        .kb-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:16px; }
        .kb-card { background:#fff; border:1px solid #e1e3e6; border-radius:12px; padding:20px; cursor:pointer; transition:all .2s; text-decoration:none; color:inherit; display:block; }
        .kb-card:hover { border-color:#7c5cfc; box-shadow:0 4px 16px rgba(124,92,252,0.12); transform:translateY(-2px); }
        .kb-card-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
        .kb-card-icon { font-size:28px; width:48px; height:48px; background:#f8f5ff; border-radius:10px; display:flex; align-items:center; justify-content:center; }
        .kb-card-name { font-size:16px; font-weight:600; color:#1a1b1e; }
        .kb-card-desc { font-size:12px; color:#909296; margin-top:4px; line-height:1.5; }
        .kb-card-path { font-size:11px; color:#909296; margin-top:12px; padding-top:12px; border-top:1px solid #f0f0f5; }
        .kb-card-path code { background:#f0f0f5; padding:2px 6px; border-radius:4px; font-size:11px; }

        .empty-state { text-align:center; color:#909296; padding:60px 20px; }
        .empty-state .icon { font-size:48px; margin-bottom:16px; }

        .btn { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; border:none; border-radius:6px; font-size:13px; cursor:pointer; transition:all .15s; text-decoration:none; }
        .btn-primary { background:#7c5cfc; color:#fff; }
        .btn-primary:hover { background:#6a4ae0; }
    </style>
</head>
<body>
<th:block layout:fragment="content">

<div class="notes-page">
    <div class="page-header">
        <h2>📝 笔记</h2>
        <div class="page-desc">选择一个笔记库开始浏览和管理笔记</div>
    </div>

    <div th:if="${kbList != null and #lists.size(kbList) > 0}" class="kb-grid">
        <a th:each="kb : ${kbList}" th:href="@{|/kb/${kb.id}/notes|}" class="kb-card">
            <div class="kb-card-header">
                <div class="kb-card-icon">📚</div>
                <div>
                    <div class="kb-card-name" th:text="${kb.name}">笔记库名称</div>
                </div>
            </div>
            <div class="kb-card-desc" th:text="${kb.description ?: 'Markdown 笔记管理'}">笔记库描述</div>
            <div class="kb-card-path">
                📁 <code th:text="${kb.notesDir ?: '未配置路径'}">路径</code>
            </div>
        </a>
    </div>

    <div th:if="${kbList == null or #lists.size(kbList) == 0}" class="empty-state">
        <div class="icon">📚</div>
        <p>暂无笔记库</p>
        <a href="/config" class="btn btn-primary">去配置笔记库</a>
    </div>
</div>

</th:block>
</body>
</html>
