<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{2.0/layout}">
<head>
    <title layout:fragment="title">笔记</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .notes-page { display:flex; flex-direction:column; height:100vh; overflow:hidden; }
        .notes-stats { display:flex; gap:12px; padding:12px 16px; background:#fff; border:1px solid #e1e3e6; border-radius:12px 12px 0 0; border-bottom:none; }
        .stat-card { flex:1; display:flex; align-items:center; gap:10px; padding:10px 14px; background:#fafbfc; border-radius:8px; border:1px solid #eef0f4; }
        .stat-card .icon { font-size:20px; }
        .stat-card .info { flex:1; }
        .stat-card .value { font-size:16px; font-weight:600; color:#1a1b1e; }
        .stat-card .label { font-size:11px; color:#909296; }
        .notes-menu { display:flex; gap:6px; align-items:center; }
        .notes-layout { display:flex; flex:1; min-height:0; overflow:hidden; background:#fff; border:1px solid #e1e3e6; border-radius:0 0 12px 12px; }
        
        /* 左侧树 */
        .notes-sidebar { width:280px; min-width:280px; border-right:1px solid #e1e3e6; display:flex; flex-direction:column; background:#fafbfc; }
        .notes-sidebar-header { padding:12px 14px; border-bottom:1px solid #eef0f4; display:flex; justify-content:space-between; align-items:center; }
        .notes-sidebar-header h3 { font-size:14px; font-weight:600; margin:0; }
        .notes-tree { flex:1; overflow-y:auto; padding:8px 0; }
        .tree-item { display:flex; align-items:center; padding:6px 14px; cursor:pointer; transition:all .1s; gap:6px; font-size:13px; color:#5c5f66; user-select:none; }
        .tree-item:hover { background:#f0edff; }
        .tree-item.active { background:#f0edff; color:#7c5cfc; font-weight:500; }
        .tree-item .icon { font-size:14px; width:18px; text-align:center; flex-shrink:0; }
        .tree-item .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .tree-folder > .tree-item .arrow { transition:transform .15s; }
        .tree-folder.open > .tree-item .arrow { transform:rotate(90deg); }
        .tree-children { display:none; }
        .tree-folder.open > .tree-children { display:block; }
        .tree-indent { padding-left:20px; }
        
        /* 右侧内容 */
        .notes-main { flex:1; display:flex; flex-direction:column; min-width:0; min-height:0; }
        .notes-main-header { padding:12px 16px; border-bottom:1px solid #eef0f4; display:flex; align-items:center; justify-content:space-between; }
        .notes-main-content { flex:1; overflow-y:auto; min-height:0; }
        /* Flex 子项必须允许缩小，否则 overflow-y:auto 永不触发 */
        #noteView, #editorView { min-height:0; }
        
        /* 查看模式 */
        .note-view { padding:24px 32px; max-width:900px; margin:0 auto; }
        .note-view h1 { font-size:28px; font-weight:700; margin:0 0 20px; padding-bottom:12px; border-bottom:2px solid #7c5cfc; }
        .note-view h2 { font-size:22px; font-weight:600; margin:24px 0 12px; padding-left:12px; border-left:3px solid #7c5cfc; }
        .note-view h3 { font-size:18px; font-weight:600; margin:20px 0 10px; }
        .note-view p { margin:0 0 14px; line-height:1.8; }
        .note-view blockquote { margin:14px 0; padding:12px 16px; background:#f8f7ff; border-left:4px solid #7c5cfc; border-radius:0 8px 8px 0; }
        .note-view code { background:#f0edff; padding:2px 6px; border-radius:4px; font-size:13px; color:#5c3dcf; }
        .note-view pre { background:#1e1e2e; color:#cdd6f4; padding:14px 18px; border-radius:8px; overflow-x:auto; margin:12px 0; }
        .note-view pre code { background:none; padding:0; color:inherit; }
        .note-view table { width:100%; border-collapse:collapse; margin:12px 0; }
        .note-view th, .note-view td { padding:8px 12px; border:1px solid #e1e3e6; text-align:left; }
        .note-view th { background:#f8f7ff; font-weight:600; }
        .note-view ul, .note-view ol { margin:10px 0; padding-left:24px; }
        .note-view li { margin:4px 0; }
        .note-view hr { border:none; border-top:1px solid #e1e3e6; margin:20px 0; }
        .note-view img { max-width:100%; border-radius:8px; }
        
        /* 编辑模式 */
        .note-editor { display:flex; flex-direction:column; height:100%; }
        .editor-toolbar { display:flex; gap:4px; padding:8px 12px; background:#fafbfc; border-bottom:1px solid #eef0f4; flex-wrap:wrap; }
        .toolbar-btn { padding:5px 8px; border:none; background:none; border-radius:4px; cursor:pointer; font-size:12px; color:#5c5f66; }
        .toolbar-btn:hover { background:#f0edff; color:#7c5cfc; }
        .toolbar-divider { width:1px; background:#e1e3e6; margin:0 4px; }
        .editor-split { display:flex; flex:1; overflow:hidden; min-height:0; }
        .editor-input { flex:1; border:none; padding:16px; font-family:"SF Mono","Fira Code",monospace; font-size:14px; line-height:1.8; resize:none; outline:none; }
        .editor-preview { flex:1; border-left:1px solid #e1e3e6; overflow-y:auto; padding:16px 20px; background:#fff; font-size:15px; line-height:1.8; min-height:0; }
        
        /* 欢迎/空状态 */
        .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#909296; }
        .empty-state .icon { font-size:48px; margin-bottom:16px; }
        .empty-state p { font-size:14px; margin-bottom:20px; }
        
        .btn { display:inline-flex; align-items:center; gap:5px; padding:6px 12px; border:none; border-radius:6px; font-size:12px; cursor:pointer; transition:all .15s; text-decoration:none; }
        .btn-primary { background:#7c5cfc; color:#fff; }
        .btn-primary:hover { background:#6a4ae0; }
        .btn-secondary { background:#f0f0f5; color:#5c5f66; }
        .btn-secondary:hover { background:#e5e5ea; }
        .btn-danger { background:#ffe0e0; color:#c92a2a; }
        .btn-sm { padding:4px 8px; font-size:11px; }
        
        .status-bar { padding:6px 12px; background:#fafbfc; border-top:1px solid #eef0f4; font-size:11px; color:#909296; display:flex; justify-content:space-between; }
    </style>
</head>
<body>
<th:block layout:fragment="content">

<div style="max-width:1200px;margin:0 auto;padding:20px;">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="font-size:20px;font-weight:600;margin:0;">📝 笔记</h2>
        <span style="font-size:13px;color:#909296;" th:text="${kb.name}">笔记库名</span>
    </div>
    <!-- KB 导航 Tab -->
    <div style="display:flex;gap:0;border-bottom:2px solid #e1e3e6;margin-bottom:16px;">
        <a th:href="@{/kb/{id}/ai(id=${kb.id})}"
           style="padding:10px 20px;font-size:14px;text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-2px;color:#5c5f66;">🤖 AI 中心</a>
        <a th:href="@{/kb/{id}/data(id=${kb.id})}"
           style="padding:10px 20px;font-size:14px;text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-2px;color:#5c5f66;">📈 数据</a>
        <a th:href="@{/kb/{id}/notes(id=${kb.id})}"
           style="padding:10px 20px;font-size:14px;text-decoration:none;border-bottom:2px solid #7c5cfc;margin-bottom:-2px;color:#7c5cfc;font-weight:600;"
           th:text="'📂 ' + ${labels.get('notes')}">📂 笔记</a>
        <a th:href="@{/kb/{id}/index(id=${kb.id})}"
           style="padding:10px 20px;font-size:14px;text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-2px;color:#5c5f66;">🔍 索引</a>
        <a th:href="@{/kb/{id}/ai(id=${kb.id})}"
           style="padding:10px 20px;font-size:14px;text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-2px;color:#5c5f66;"
           th:text="'⚙️ ' + ${labels.get('config')}">⚙️ 配置</a>
    </div>
    <!-- 顶部统计栏 -->
    <div class="notes-stats">
        <div class="stat-card">
            <span class="icon">📁</span>
            <div class="info">
                <div class="value" id="statFolders">-</div>
                <div class="label">文件夹</div>
            </div>
        </div>
        <div class="stat-card">
            <span class="icon">📄</span>
            <div class="info">
                <div class="value" id="statFiles">-</div>
                <div class="label">笔记文件</div>
            </div>
        </div>
        <div class="stat-card">
            <span class="icon">📝</span>
            <div class="info">
                <div class="value" id="statChars">-</div>
                <div class="label">总字符数</div>
            </div>
        </div>
        <div class="notes-menu">
            <button class="btn btn-secondary btn-sm" onclick="showAiReport()">🤖 AI 报告</button>
            <button class="btn btn-secondary btn-sm" onclick="refreshStats()">🔄 刷新</button>
        </div>
    </div>

    <div class="notes-layout">
    <!-- 左侧树 -->
    <div class="notes-sidebar">
        <div class="notes-sidebar-header">
            <h3 th:text="${kb?.name ?: '笔记'}">笔记库</h3>
            <button class="btn btn-primary btn-sm" onclick="showNewNote()">+ 新建</button>
        </div>
        <div class="notes-tree" id="notesTree">
            <div style="padding:20px;text-align:center;color:#909296;font-size:12px;">加载中...</div>
        </div>
    </div>
    
    <!-- 右侧内容 -->
    <div class="notes-main">
        <!-- 欢迎页 -->
        <div id="welcomeView" class="empty-state">
            <div class="icon">📝</div>
            <p>选择左侧文件查看，或点击「+ 新建」创建笔记</p>
        </div>
        
        <!-- 查看模式 -->
        <div id="noteView" style="display:none;flex:1;flex-direction:column;">
            <div class="notes-main-header">
                <div>
                    <span id="noteTitle" style="font-size:15px;font-weight:600;"></span>
                    <span id="notePath" style="font-size:11px;color:#909296;margin-left:8px;"></span>
                </div>
                <div style="display:flex;gap:6px;">
                    <button class="btn btn-secondary btn-sm" onclick="editCurrentNote()">✏️ 编辑</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteCurrentNote()">🗑️ 删除</button>
                </div>
            </div>
            <div class="notes-main-content">
                <div id="noteContent" class="note-view"></div>
            </div>
        </div>
        
        <!-- 编辑模式 -->
        <div id="editorView" style="display:none;flex:1;flex-direction:column;">
            <div class="notes-main-header">
                <div>
                    <input id="editorFilename" type="text" placeholder="文件名（无需.md）" 
                           style="padding:6px 10px;border:1px solid #e1e3e6;border-radius:6px;font-size:13px;width:200px;">
                    <span id="editorDirPath" style="font-size:11px;color:#909296;margin-left:8px;"></span>
                </div>
                <div style="display:flex;gap:6px;">
                    <button class="btn btn-secondary btn-sm" onclick="cancelEdit()">取消</button>
                    <button class="btn btn-primary btn-sm" onclick="saveNote()">💾 保存</button>
                </div>
            </div>
            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="insertFormat('heading')" title="标题">H</button>
                <button class="toolbar-btn" onclick="insertFormat('bold')" title="加粗"><b>B</b></button>
                <button class="toolbar-btn" onclick="insertFormat('italic')" title="斜体"><i>I</i></button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn" onclick="insertFormat('ul')" title="列表">• 列表</button>
                <button class="toolbar-btn" onclick="insertFormat('ol')" title="有序列表">1. 列表</button>
                <button class="toolbar-btn" onclick="insertFormat('code')" title="代码">&lt;/&gt;</button>
                <button class="toolbar-btn" onclick="insertFormat('quote')" title="引用">"</button>
                <button class="toolbar-btn" onclick="insertFormat('link')" title="链接">🔗</button>
                <button class="toolbar-btn" onclick="insertFormat('image')" title="图片">🖼️</button>
            </div>
            <div class="editor-split">
                <textarea id="editorTextarea" class="editor-input" placeholder="输入 Markdown 内容..."></textarea>
                <div id="editorPreview" class="editor-preview"></div>
            </div>
            <div class="status-bar">
                <span id="charCount">0 字符</span>
                <span id="saveStatus"></span>
            </div>
        </div>
    </div>
</div>
</div>

<script th:inline="javascript">
const KB_ID = [[${kb?.id}]];
const BASE_DIR = [[${rel ?: ''}]];

let currentFile = null;
let currentDir = BASE_DIR;
let isEditing = false;
let fileTree = {};

// ========== 加载文件树 ==========
async function loadTree() {
    if (!KB_ID) return;
    try {
        const resp = await fetch('/kb/' + KB_ID + '/api/notes/tree');
        const data = await resp.json();
        if (data.ok) {
            fileTree = data.tree;
            renderTree(data.tree, document.getElementById('notesTree'), 0);
            updateStats(data.tree);
        }
    } catch(e) {
        document.getElementById('notesTree').innerHTML = '<div style="padding:20px;text-align:center;color:#e03131;">加载失败</div>';
    }
}

function updateStats(tree) {
    let folders = 0, files = 0;
    
    function countItems(t) {
        if (t.dirs) {
            folders += t.dirs.length;
            t.dirs.forEach(d => countItems(d.children || {}));
        }
        if (t.files) files += t.files.length;
    }
    
    countItems(tree);
    
    document.getElementById('statFolders').textContent = folders;
    document.getElementById('statFiles').textContent = files;
    document.getElementById('statChars').textContent = '-';
    
    // 获取总字符数
    fetch('/kb/' + KB_ID + '/api/notes/stats')
        .then(r => r.json())
        .then(data => {
            if (data.ok) {
                document.getElementById('statChars').textContent = data.totalChars || '0';
            }
        });
}

function refreshStats() {
    loadTree();
}

function renderTree(tree, container, level) {
    container.innerHTML = '';
    
    // 渲染文件夹
    if (tree.dirs) {
        tree.dirs.forEach(dir => {
            const div = document.createElement('div');
            div.className = 'tree-folder' + (dir.path === currentDir ? ' open' : '');
            div.innerHTML = '<div class="tree-item" onclick="toggleFolder(this.parentElement)" style="padding-left:' + (14 + level * 16) + 'px;">'
                + '<span class="icon arrow">▶</span>'
                + '<span class="icon">📁</span>'
                + '<span class="name">' + escapeHtml(dir.name) + '</span>'
                + '</div>'
                + '<div class="tree-children"></div>';
            container.appendChild(div);
            
            // 递归渲染子目录
            if (dir.children) {
                renderTree(dir.children, div.querySelector('.tree-children'), level + 1);
            }
        });
    }
    
    // 渲染文件
    if (tree.files) {
        tree.files.forEach(file => {
            const div = document.createElement('div');
            div.className = 'tree-item' + (file.path === currentFile ? ' active' : '');
            div.style.paddingLeft = (14 + level * 16) + 'px';
            div.setAttribute('data-path', file.path);
            div.onclick = () => openFile(file.path);
            div.innerHTML = '<span class="icon">📄</span>'
                + '<span class="name">' + escapeHtml(file.name.replace('.md', '')) + '</span>';
            container.appendChild(div);
        });
    }
}

function toggleFolder(folder) {
    folder.classList.toggle('open');
}

// ========== 打开文件 ==========
async function openFile(path) {
    if (isEditing) {
        if (!confirm('当前有未保存的修改，确定要离开吗？')) return;
    }
    
    currentFile = path;
    showView('noteView');
    
    // 更新选中状态
    document.querySelectorAll('.tree-item').forEach(el => {
        el.classList.toggle('active', el.getAttribute('data-path') === path);
    });
    
    // 加载文件内容
    try {
        const resp = await fetch('/kb/' + KB_ID + '/api/notes/read?path=' + encodeURIComponent(path));
        const data = await resp.json();
        if (data.ok) {
            document.getElementById('noteTitle').textContent = path.split('/').pop().replace('.md', '');
            document.getElementById('notePath').textContent = path;
            document.getElementById('noteContent').innerHTML = marked.parse(data.content || '');
        }
    } catch(e) {
        document.getElementById('noteContent').innerHTML = '<div style="color:#e03131;">加载失败</div>';
    }
}

// ========== 新建笔记 ==========
function showNewNote(dir) {
    currentFile = null;
    currentDir = dir || currentDir;
    isEditing = true;
    showView('editorView');
    
    document.getElementById('editorFilename').value = '';
    document.getElementById('editorDirPath').textContent = currentDir ? '/' + currentDir + '/' : '/';
    document.getElementById('editorTextarea').value = '';
    document.getElementById('editorPreview').innerHTML = '';
    document.getElementById('saveStatus').textContent = '';
    
    document.getElementById('editorFilename').focus();
}

// ========== 编辑笔记 ==========
function editCurrentNote() {
    if (!currentFile) return;
    isEditing = true;
    showView('editorView');
    
    const filename = currentFile.split('/').pop().replace('.md', '');
    const dir = currentFile.includes('/') ? currentFile.substring(0, currentFile.lastIndexOf('/')) : '';
    
    document.getElementById('editorFilename').value = filename;
    document.getElementById('editorDirPath').textContent = dir ? '/' + dir + '/' : '/';
    
    // 加载文件内容到编辑器
    fetch('/kb/' + KB_ID + '/api/notes/read?path=' + encodeURIComponent(currentFile))
        .then(r => r.json())
        .then(data => {
            if (data.ok) {
                document.getElementById('editorTextarea').value = data.content || '';
                updateEditorPreview();
            }
        });
}

function cancelEdit() {
    isEditing = false;
    if (currentFile) {
        showView('noteView');
    } else {
        showView('welcomeView');
    }
}

// ========== 保存笔记 ==========
async function saveNote() {
    const filename = document.getElementById('editorFilename').value.trim();
    if (!filename) { toast('请输入文件名', 'error'); return; }
    
    const content = document.getElementById('editorTextarea').value;
    const dir = currentDir;
    
    const form = new FormData();
    form.set('dir', dir);
    form.set('filename', filename);
    form.set('content', content);
    
    document.getElementById('saveStatus').textContent = '⏳ 保存中...';
    
    try {
        const resp = await fetch('/kb/' + KB_ID + '/notes/new', { method: 'POST', body: form });
        const data = await resp.json();
        if (data.ok) {
            toast('✅ 保存成功', 'success');
            document.getElementById('saveStatus').textContent = '✅ 已保存';
            currentFile = data.path;
            isEditing = false;
            
            // 刷新树
            await loadTree();
            
            // 切换到查看模式
            setTimeout(() => openFile(data.path), 300);
        } else {
            toast('保存失败: ' + (data.error || ''), 'error');
            document.getElementById('saveStatus').textContent = '❌ 保存失败';
        }
    } catch(e) {
        toast('保存失败', 'error');
    }
}

// ========== 删除笔记 ==========
async function deleteCurrentNote() {
    if (!currentFile || !confirm('确定要删除这个文件吗？')) return;
    
    try {
        const resp = await fetch('/kb/' + KB_ID + '/notes/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'path=' + encodeURIComponent(currentFile)
        });
        const data = await resp.json();
        if (data.ok) {
            toast('已删除', 'success');
            currentFile = null;
            showView('welcomeView');
            loadTree();
        }
    } catch(e) {
        toast('删除失败', 'error');
    }
}

// ========== 视图切换 ==========
function showView(viewId) {
    document.getElementById('welcomeView').style.display = 'none';
    document.getElementById('noteView').style.display = 'none';
    document.getElementById('editorView').style.display = 'none';

    const view = document.getElementById(viewId);
    if (viewId === 'welcomeView') {
        view.style.display = 'flex';
    } else {
        view.style.display = 'flex';
    }

    // 切换后重新计算 iframe 高度
    setTimeout(syncHeight, 50);
}

// ========== 编辑器工具栏 ==========
function insertFormat(type) {
    const textarea = document.getElementById('editorTextarea');
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const selected = textarea.value.substring(start, end);
    let before = '', after = '', replacement = '';
    
    switch(type) {
        case 'heading': before = '## '; replacement = selected || '标题'; break;
        case 'bold': before = '**'; after = '**'; replacement = selected || '加粗'; break;
        case 'italic': before = '*'; after = '*'; replacement = selected || '斜体'; break;
        case 'ul': before = '- '; replacement = selected || '列表项'; break;
        case 'ol': before = '1. '; replacement = selected || '列表项'; break;
        case 'code': before = '`'; after = '`'; replacement = selected || '代码'; break;
        case 'quote': before = '> '; replacement = selected || '引用'; break;
        case 'link': before = '['; after = '](url)'; replacement = selected || '链接文本'; break;
        case 'image': before = '!['; after = '](url)'; replacement = selected || '图片'; break;
    }
    
    textarea.setRangeText(before + replacement + after, start, end, 'end');
    textarea.focus();
    updateEditorPreview();
}

// ========== 编辑器预览 ==========
document.addEventListener('DOMContentLoaded', function() {
    const textarea = document.getElementById('editorTextarea');
    if (textarea) {
        textarea.addEventListener('input', updateEditorPreview);
    }
});

function updateEditorPreview() {
    const content = document.getElementById('editorTextarea').value;
    const preview = document.getElementById('editorPreview');
    if (content.trim()) {
        preview.innerHTML = marked.parse(content);
    } else {
        preview.innerHTML = '<div style="color:#909296;text-align:center;padding:40px;">预览区域</div>';
    }
    document.getElementById('charCount').textContent = content.length + ' 字符';
}

// ========== 工具函数 ==========
function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ========== AI 报告 ==========
function showAiReport() {
    const modal = document.createElement('div');
    modal.id = 'aiReportModal';
    modal.style.cssText = 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;justify-content:center;align-items:center;';
    modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
    
    modal.innerHTML = '<div style="background:#fff;border-radius:12px;width:700px;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.18);" onclick="event.stopPropagation()">'
        + '<div style="padding:16px 20px;border-bottom:1px solid #eef0f4;display:flex;justify-content:space-between;align-items:center;">'
        + '<h3 style="margin:0;font-size:16px;">🤖 AI 分析报告</h3>'
        + '<button onclick="document.getElementById(\'aiReportModal\').remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#909296;">✕</button>'
        + '</div>'
        + '<div style="padding:16px 20px;border-bottom:1px solid #eef0f4;">'
        + '<textarea id="aiReportPrompt" rows="3" placeholder="输入分析提示词（可留空，AI 将自动分析笔记库内容）" '
        + 'style="width:100%;padding:10px;border:1px solid #e1e3e6;border-radius:8px;font-size:13px;resize:vertical;outline:none;font-family:inherit;"></textarea>'
        + '</div>'
        + '<div id="aiReportContent" style="flex:1;overflow-y:auto;padding:20px;min-height:200px;">'
        + '<div style="text-align:center;color:#909296;">点击「生成报告」开始分析</div>'
        + '</div>'
        + '<div style="padding:12px 20px;border-top:1px solid #eef0f4;display:flex;justify-content:flex-end;gap:8px;">'
        + '<button class="btn btn-secondary" onclick="document.getElementById(\'aiReportModal\').remove()">关闭</button>'
        + '<button class="btn btn-primary" id="aiReportBtn" onclick="generateAiReport()">🚀 生成报告</button>'
        + '</div>'
        + '</div>';
    
    document.body.appendChild(modal);
}

async function generateAiReport() {
    const btn = document.getElementById('aiReportBtn');
    const content = document.getElementById('aiReportContent');
    const prompt = document.getElementById('aiReportPrompt').value;
    
    btn.disabled = true;
    btn.textContent = '⏳ 分析中...';
    content.innerHTML = '<div style="text-align:center;padding:40px;color:#909296;">🤖 AI 正在分析笔记库内容...</div>';
    
    try {
        const resp = await fetch('/kb/' + KB_ID + '/api/notes/ai-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: prompt })
        });
        const data = await resp.json();
        if (data.ok) {
            content.innerHTML = '<div class="report">' + marked.parse(data.report || '暂无报告') + '</div>';
        } else {
            content.innerHTML = '<div style="color:#e03131;">生成失败: ' + (data.error || '未知错误') + '</div>';
        }
    } catch(e) {
        content.innerHTML = '<div style="color:#e03131;">请求失败</div>';
    }
    
    btn.disabled = false;
    btn.textContent = '🚀 生成报告';
}

// Ctrl+S 保存
document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's' && isEditing) {
        e.preventDefault();
        saveNote();
    }
});

// ========== iframe 高度自适应 ==========
// 在 iframe 中，100vh 可能引用父窗口视口导致溢出。
// 改用 getBoundingClientRect() 精确计算可用高度。
function syncHeight() {
    var el = document.querySelector('.notes-layout');
    if (!el) return;
    if (window !== window.top) {
        var rect = el.getBoundingClientRect();
        var available = Math.max(Math.floor(window.innerHeight - rect.top), 300);
        el.style.height = available + 'px';
    } else {
        el.style.height = 'calc(100vh - 280px)';
    }
}
window.addEventListener('resize', syncHeight);
// 初始延迟调用，确保 getBoundingClientRect 返回正确布局值
setTimeout(syncHeight, 100);
// load 完成后再次校准
window.addEventListener('load', syncHeight);

// 初始化
loadTree();
</script>
