<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{2.0/layout}">
<head><title>AI 助理</title></head>
<body>
<th:block layout:fragment="content">

<div style="max-width:1200px;margin:0 auto;padding:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="font-size:20px;font-weight:600;margin:0;">💬 对话</h2>
        <span th:if="${currentKb != null}" style="font-size:13px;color:#909296;" th:text="${currentKb.name}">笔记库名</span>
    </div>

    <!-- KB 导航 Tab -->
    <div style="display:flex;gap:0;border-bottom:2px solid #e1e3e6;margin-bottom:16px;">
        <a th:if="${currentKb != null}" th:href="@{/kb/{id}/chat(id=${currentKb.id})}"
           style="padding:10px 20px;font-size:14px;text-decoration:none;border-bottom:2px solid #7c5cfc;margin-bottom:-2px;color:#7c5cfc;font-weight:600;">💬 对话</a>
        <a th:if="${currentKb != null}" th:href="@{/kb/{id}/ai(id=${currentKb.id})}"
           style="padding:10px 20px;font-size:14px;text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-2px;color:#5c5f66;">🤖 AI 中心</a>
        <a th:if="${currentKb != null}" th:href="@{/kb/{id}/search(id=${currentKb.id})}"
           style="padding:10px 20px;font-size:14px;text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-2px;color:#5c5f66;">🔍 搜索</a>
        <a th:if="${currentKb != null}" th:href="@{/kb/{id}/notes(id=${currentKb.id})}"
           style="padding:10px 20px;font-size:14px;text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-2px;color:#5c5f66;">📂 笔记本</a>
    </div>

    <!-- ==================== 对话 ==================== -->
    <div class="card" style="padding:0;overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 280px);">
        <!-- 对话头部 -->
        <div style="padding:12px 16px;border-bottom:1px solid #eef0f4;display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:8px;">
                <span th:if="${currentKb != null}" class="badge badge-info" style="font-size:11px;" th:text="${currentKb.name}">笔记库名</span>
                <span th:unless="${currentKb != null}" class="badge" style="background:#fff3cd;color:#856404;border-color:#ffc107;font-size:11px;">未选择笔记库</span>
            </div>
            <div style="display:flex;gap:6px;">
                <select id="chatModel" style="padding:4px 8px;border:1px solid #e1e3e6;border-radius:6px;font-size:12px;background:#fff;">
                    <option th:each="m : ${chatModels}" th:value="${m.name}" th:text="${m.name}">模型</option>
                </select>
                <button onclick="clearChat()" class="btn btn-secondary" style="padding:4px 12px;font-size:12px;">清空</button>
            </div>
        </div>
        <!-- 消息区 -->
        <div id="chatBox" class="chat-box" style="border:none;border-radius:0;flex:1;overflow-y:auto;">
            <div th:if="${currentKb == null}" style="text-align:center;padding:60px 20px;color:#909296;">
                <div style="font-size:36px;margin-bottom:12px;">💬</div>
                <div>请先从左侧选择一个笔记库</div>
            </div>
        </div>
        <!-- 输入区 -->
        <div style="padding:12px 16px;border-top:1px solid #eef0f4;margin-top:auto;">
            <div class="chat-input">
                <textarea id="chatInput" placeholder="输入消息..."
                       onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"
                       oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';"
                       rows="3"
                       th:disabled="${currentKb == null}" style="flex:1;padding:10px 14px;border:1px solid #e1e3e6;border-radius:8px;background:#fff;color:#1a1b1e;font-size:14px;outline:none;resize:none;font-family:inherit;line-height:1.5;max-height:120px;"></textarea>
                <button class="btn btn-primary" onclick="sendChat()" th:disabled="${currentKb == null}">发送</button>
            </div>
        </div>
    </div>
</div>

<!-- ==================== JS ==================== -->
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js"
        onload="window.__katexLoaded = true"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">

<script th:inline="javascript">
/*<![CDATA[*/
const KB_ID = /*[[${currentKb?.id}]]*/ null;
const KB_NAME = /*[[${currentKb?.name}]]*/ '';
/*]]>*/

let chatMessages = [];
let chatSessionId = null;

// ========== 加载聊天记录 ==========
async function loadChatHistory() {
    if (!KB_ID) return;
    const box = document.getElementById('chatBox');
    box.innerHTML = '<div style="text-align:center;padding:20px;color:#909296;">加载中...</div>';
    try {
        const resp = await fetch('/chat/api/kb/' + KB_ID + '/messages?limit=60');
        const data = await resp.json();
        box.innerHTML = '';
        if (data.messages && data.messages.length > 0) {
            data.messages.forEach(m => {
                appendMsg(m.role === 'user' ? 'user' : 'ai', m.content);
            });
            chatSessionId = data.sessionId || null;
        }
    } catch(e) {
        box.innerHTML = '';
    }
}
if (KB_ID) loadChatHistory();

let chatSending = false;

async function sendChat() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg || !KB_ID || chatSending) return;

    chatSending = true;
    const btn = document.querySelector('.card .btn-primary');
    if (btn) { btn.disabled = true; btn.textContent = '⏳'; }

    input.value = '';
    appendMsg('user', msg);

    const model = document.getElementById('chatModel').value;
    const aiId = 'ai-' + Date.now();
    const box = document.getElementById('chatBox');
    box.innerHTML += '<div class="chat-msg ai" id="' + aiId + '">'
        + '<div class="text" id="reply-' + aiId + '"><span style="color:#909296;">正在处理...</span></div></div>';
    box.scrollTop = box.scrollHeight;

    const fd = new FormData();
    fd.append('message', msg);
    fd.append('kbId', KB_ID);
    fd.append('modelName', model);

    let replyText = '';
    let hasRealContent = false;
    try {
        const res = await fetch('/chat/send', { method: 'POST', body: fd });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        while (true) {
            const r = await reader.read();
            if (r.done) break;
            buf += decoder.decode(r.value, { stream: true });
            const parts = buf.split('\n\n');
            buf = parts.pop() || '';
            for (const p of parts) {
                if (p.indexOf('data:') !== 0) continue;
                try {
                    const d = JSON.parse(p.replace(/^data:\s*/, ''));
                    if (d.type === 'text') {
                        replyText += d.content;
                        if (replyText.trim()) {
                            hasRealContent = true;
                            const el = document.getElementById('reply-' + aiId);
                            if (el) {
                                el.innerHTML = marked.parse(replyText);
                                renderMath(el);
                            }
                            box.scrollTop = box.scrollHeight;
                        }
                    } else if (d.type === 'status') {
                        if (!hasRealContent && d.content) {
                            const el = document.getElementById('reply-' + aiId);
                            if (el) el.innerHTML = '<span style="color:#909296;">' + d.content + '</span>';
                            box.scrollTop = box.scrollHeight;
                        }
                    } else if (d.type === 'done') {
                        const el = document.getElementById('reply-' + aiId);
                        if (el && replyText.trim()) {
                            el.innerHTML = marked.parse(replyText);
                            renderMath(el);
                        }
                    } else if (d.type === 'error') {
                        const el = document.getElementById('reply-' + aiId);
                        if (el) el.innerHTML = '<span style="color:#e03131;">' + d.content + '</span>';
                    }
                } catch (e) {}
            }
        }
    } catch(e) {
        const el = document.getElementById('reply-' + aiId);
        if (el) el.innerHTML = '<span style="color:#e03131;">请求失败: ' + e.message + '</span>';
    } finally {
        chatSending = false;
        if (btn) { btn.disabled = false; btn.textContent = '发送'; }
        input.focus();
    }
}

function renderMath(el) {
    if (window.__katexLoaded || typeof renderMathInElement !== 'undefined') {
        try {
            renderMathInElement(el, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false
            });
        } catch(e) {}
    }
}

function appendMsg(role, text) {
    const box = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    div.innerHTML = '<div class="text">' + (role === 'ai' ? marked.parse(text) : text) + '</div>';
    box.appendChild(div);
    if (role === 'ai') setTimeout(() => renderMath(div), 50);
    box.scrollTop = box.scrollHeight;
}

function clearChat() {
    chatMessages = [];
    chatSessionId = null;
    document.getElementById('chatBox').innerHTML = '';
}
</script>

</th:block>
</body>
</html>
