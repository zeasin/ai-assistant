<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{2.0/layout}">
<head>
    <title layout:fragment="title">AI 指南</title>
    <style>
        .config-page { max-width:1200px; margin:0 auto; padding:20px; }
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .page-header h2 { font-size:20px; font-weight:600; margin:0; }

        .card { background:#fff; border:1px solid #e1e3e6; border-radius:12px; padding:20px; margin-bottom:16px; }
        .card h2 { font-size:16px; margin-bottom:12px; color:#1a1b1e; }

        .tabs-nav { display:flex; gap:0; border-bottom:2px solid #eef0f4; margin-bottom:0; }
        .tab-btn { padding:10px 20px; font-size:14px; cursor:pointer; border:none; background:none; color:#5c5f66; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; }
        .tab-btn:hover { color:#1a1b1e; }
        .tab-btn.active { color:#7c5cfc; border-bottom-color:#7c5cfc; font-weight:600; }
        .tab-content { display:none; padding:20px 0; }
        .tab-content.active { display:block; }

        .btn { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; border:none; border-radius:6px; font-size:13px; cursor:pointer; transition:all .15s; }
        .btn-primary { background:#7c5cfc; color:#fff; }
        .btn-primary:hover { background:#6a4ae0; }
        .btn-secondary { background:#f0f0f5; color:#5c5f66; }
        .btn-secondary:hover { background:#e5e5ea; }
        .btn-danger { background:#ffe0e0; color:#c92a2a; }
        .btn-sm { padding:5px 10px; font-size:12px; }

        .editor-area {
            width:100%; min-height:60vh; padding:14px;
            border:1px solid #e1e3e6; border-radius:8px;
            font-family:"SF Mono","Fira Code","Consolas",monospace;
            font-size:13px; line-height:1.6; resize:vertical;
            outline:none; background:#fafafe; box-sizing:border-box;
        }
        .editor-area:focus { border-color:#7c5cfc; background:#fff; }

        .preview-area {
            border:1px solid #e1e3e6; border-radius:8px;
            padding:20px; min-height:200px; background:#fff;
            line-height:1.8; font-size:15px;
        }
        .preview-area h1 { font-size:24px; border-bottom:2px solid #7c5cfc; padding-bottom:6px; margin:20px 0 12px; }
        .preview-area h2 { font-size:20px; margin:18px 0 10px; }
        .preview-area h3 { font-size:17px; margin:14px 0 8px; }
        .preview-area code { background:#f0edff; padding:2px 6px; border-radius:4px; font-size:13px; color:#5c3dcf; }
        .preview-area pre { background:#1e1e2e; color:#cdd6f4; padding:14px 18px; border-radius:8px; overflow-x:auto; margin:10px 0; }
        .preview-area pre code { background:none; color:inherit; padding:0; }
        .preview-area table { border-collapse:collapse; width:100%; margin:10px 0; }
        .preview-area th, .preview-area td { padding:8px 12px; border:1px solid #e1e3e6; text-align:left; }
        .preview-area th { background:#f8f7ff; font-weight:600; }
        .preview-area blockquote { border-left:4px solid #7c5cfc; padding:8px 14px; background:#f8f7ff; margin:10px 0; border-radius:0 8px 8px 0; }
        .preview-area ul, .preview-area ol { padding-left:24px; }
        .preview-area hr { border:none; border-top:1px solid #e1e3e6; margin:20px 0; }

        .toolbar { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
        .path-hint { font-size:12px; color:#909296; margin-left:auto; word-break:break-all; }
        .status-text { font-size:12px; color:#909296; margin-left:8px; transition:all .3s; }
        .status-text.success { color:#2b8a3e; }
        .status-text.error { color:#e03131; }

        .memory-file-list { list-style:none; }
        .memory-file-item {
            display:flex; align-items:center; justify-content:space-between;
            padding:10px 14px; border:1px solid #e1e3e6; border-radius:8px;
            margin-bottom:6px; transition:all .15s;
        }
        .memory-file-item:hover { border-color:#7c5cfc; background:#fafafe; }
        .memory-file-name { font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:8px; }
        .memory-file-name:hover { color:#7c5cfc; }
        .memory-type-badge { font-size:11px; padding:2px 8px; border-radius:4px; font-weight:400; color:#fff; }
        .badge-user { background:#7c5cfc; }
        .badge-feedback { background:#e8590c; }
        .badge-project { background:#1971c2; }
        .badge-reference { background:#2b8a3e; }
        .badge-other { background:#909296; }

        .empty-state { text-align:center; padding:40px 20px; color:#909296; }
        .empty-state .icon { font-size:40px; margin-bottom:10px; }

        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; justify-content:center; align-items:center; }
        .modal-overlay.active { display:flex; }
        .modal { background:#fff; border-radius:12px; padding:24px; width:800px; max-width:90vw; max-height:80vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.18); }
        .modal h3 { margin:0 0 16px; font-size:16px; }
        .modal-editor {
            width:100%; min-height:40vh; padding:12px;
            border:1px solid #e1e3e6; border-radius:8px;
            font-family:"SF Mono","Fira Code","Consolas",monospace;
            font-size:13px; line-height:1.6; resize:vertical;
            outline:none; box-sizing:border-box;
        }
        .modal-editor:focus { border-color:#7c5cfc; }
        .modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; font-size:12px; font-weight:500; color:#5c5f66; margin-bottom:4px; }
        .form-group input { width:100%; padding:8px 10px; border:1px solid #e1e3e6; border-radius:6px; font-size:13px; outline:none; }
        .form-group input:focus { border-color:#7c5cfc; }
    </style>
</head>
<body>
<th:block layout:fragment="content">

<div class="config-page">
    <div class="page-header">
        <h2>🤖 AI 中心</h2>
        <span style="font-size:13px;color:#909296;" th:text="${kb.name}">笔记库名</span>
    </div>

    <!-- 统一导航 Tab -->
    <div style="display:flex;gap:0;border-bottom:2px solid #e1e3e6;margin-bottom:16px;">
        <a th:href="@{/v2?kbId={id}(id=${kb.id})}" class="tab-btn" style="text-decoration:none;display:inline-flex;">💬 对话</a>
        <a th:href="@{/kb/{id}/notes(id=${kb.id})}" class="tab-btn" style="text-decoration:none;display:inline-flex;">📝 笔记</a>
        <button class="tab-btn" onclick="switchTab('daily')">📊 综合日报</button>
        <button class="tab-btn" onclick="switchTab('agents')">📋 AI 指南</button>
        <button class="tab-btn" onclick="switchTab('analysis')">🔬 AI 分析</button>
    </div>

    <!-- 笔记库概览统计 -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;">
        <div style="background:#fff;border:1px solid #e1e3e6;border-radius:10px;padding:14px;text-align:center;">
            <div style="font-size:22px;font-weight:700;color:#7c5cfc;" th:text="${kbFileCount} ?: 0">0</div>
            <div style="font-size:12px;color:#909296;margin-top:4px;">📄 笔记文件</div>
        </div>
        <div style="background:#fff;border:1px solid #e1e3e6;border-radius:10px;padding:14px;text-align:center;">
            <div style="font-size:22px;font-weight:700;color:#7c5cfc;" th:text="${kbIndexCount} ?: 0">0</div>
            <div style="font-size:12px;color:#909296;margin-top:4px;">🔗 索引片段</div>
        </div>
        <div style="background:#fff;border:1px solid #e1e3e6;border-radius:10px;padding:14px;text-align:center;">
            <div style="font-size:22px;font-weight:700;color:#7c5cfc;" th:text="${kbTotalMessages} ?: 0">0</div>
            <div style="font-size:12px;color:#909296;margin-top:4px;">💬 对话消息</div>
        </div>
        <a th:href="@{/kb/{id}/notes(id=${kb.id})}" style="background:#fff;border:1px solid #e1e3e6;border-radius:10px;padding:14px;text-align:center;text-decoration:none;cursor:pointer;display:block;transition:all .15s;">
            <div style="font-size:22px;font-weight:700;color:#7c5cfc;">📂</div>
            <div style="font-size:12px;color:#7c5cfc;margin-top:4px;font-weight:500;">浏览笔记</div>
        </a>
    </div>

    <div class="card">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('daily')">📊 综合日报</button>
            <button class="tab-btn" onclick="switchTab('agents')">📋 AI 指南</button>
            <button class="tab-btn" onclick="switchTab('analysis')">🔬 AI 分析</button>
        </div>

        <!-- ====== Tab 1: 综合日报 ====== -->
        <div id="tab-daily" class="tab-content active">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                <div style="font-size:13px;color:#909296;">每日 9:00 自动生成，也可手动重新生成</div>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-secondary" onclick="openReportSettings()">⚙️ 日报设置</button>
                    <button class="btn btn-primary" onclick="generateReport()" id="genReportBtn">🔄 重新生成</button>
                </div>
            </div>
            <div id="reportContent" class="preview-area" style="padding:16px;min-height:120px;">
                <div style="text-align:center;padding:30px;color:#909296;">加载中...</div>
            </div>
        </div>

        <!-- ====== Tab 2: AI 指南 ====== -->
        <div id="tab-agents" class="tab-content">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="saveAgents()">保存</button>
                <button class="btn btn-secondary" onclick="toggleAgentsPreview()">预览</button>
                <span id="agentsStatus" class="status-text"></span>
                <span id="agentsPath" class="path-hint"></span>
            </div>
            <textarea id="agentsEditor" class="editor-area" placeholder="AGENTS.md 内容..."></textarea>
            <div id="agentsPreview" class="preview-area" style="display:none;"></div>

            <div style="margin-top:20px;">
                <h2 style="font-size:16px;margin-bottom:12px;">🧠 AI 记忆</h2>
                <div class="toolbar">
                    <button class="btn btn-primary btn-sm" onclick="showMemoryNew()">+ 新建记忆</button>
                    <button class="btn btn-secondary btn-sm" onclick="showMemoryEditor('MEMORY.md')">编辑索引</button>
                    <span id="memoryStatus" class="status-text"></span>
                    <span id="memoryPath" class="path-hint"></span>
                </div>
                <div id="memoryList"></div>
            </div>
        </div>

        <!-- ====== Tab 3: AI 分析 ====== -->
        <div id="tab-analysis" class="tab-content">
            <div style="margin-bottom:12px;color:#909296;font-size:13px;">选择一个目录，输入自定义分析提示词，AI 将根据你的要求进行分析。</div>

            <div class="form-group">
                <label>分析目标目录</label>
                <select id="analysisDir" style="width:100%;padding:8px 10px;border:1px solid #e1e3e6;border-radius:6px;font-size:13px;outline:none;background:#fff;">
                    <option value="">-- 请选择目录 --</option>
                </select>
            </div>

            <div class="form-group">
                <label>分析提示词</label>
                <textarea id="analysisPrompt" rows="4" style="width:100%;padding:10px;border:1px solid #e1e3e6;border-radius:6px;font-size:13px;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit;" placeholder="输入你想让 AI 分析什么，例如：请分析这个目录下的数据趋势，给出总结和建议。留空则 AI 自行决定分析内容。"></textarea>
            </div>

            <div class="toolbar" style="margin-bottom:12px;">
                <button class="btn btn-primary" onclick="startAnalysis()" id="analysisBtn">🚀 开始分析</button>
                <button class="btn btn-secondary" onclick="saveAnalysisResult()" id="saveAnalysisBtn" style="display:none;">💾 保存结果</button>
                <span id="analysisStatus" class="status-text"></span>
            </div>

            <div id="analysisResult" class="preview-area" style="display:none;"></div>

            <div style="margin-top:16px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                    <span style="font-size:14px;font-weight:500;">📜 历史分析记录</span>
                    <button class="btn btn-secondary btn-sm" onclick="loadAnalysisHistory()">刷新</button>
                </div>
                <div id="analysisHistory" style="font-size:13px;color:#909296;">暂无分析记录</div>
            </div>
        </div>
    </div>

    <!-- ====== 日报设置弹窗 ====== -->
    <div class="modal-overlay" id="reportSettingsModal" onclick="if(event.target===this)closeReportSettings()">
        <div class="modal" style="width:600px;">
            <h3>⚙️ 综合日报设置</h3>
            <div style="display:flex;flex-direction:column;gap:16px;margin-bottom:20px;">
                <label class="toggle-label">
                    <input type="checkbox" id="autoReportToggle" onchange="saveReportConfig()">
                    <span class="toggle-slider"></span>
                    <span>
                        <span class="toggle-text">每天 9:00 自动生成</span>
                        <span class="toggle-desc">定时任务自动为这个知识库生成综合日报</span>
                    </span>
                </label>
                <label class="toggle-label">
                    <input type="checkbox" id="feishuPushToggle" onchange="saveReportConfig()">
                    <span class="toggle-slider"></span>
                    <span>
                        <span class="toggle-text">推送飞书通知</span>
                        <span class="toggle-desc">日报生成后通过飞书 Webhook 推送</span>
                    </span>
                </label>
            </div>
            <div class="form-group">
                <label>日报生成提示词</label>
                <div class="toolbar">
                    <button class="btn btn-primary btn-sm" onclick="saveReportPrompt()">保存提示词</button>
                    <span id="reportPromptStatus" class="status-text"></span>
                </div>
                <textarea id="reportPrompt" rows="8" style="width:100%;padding:10px;border:1px solid #e1e3e6;border-radius:6px;font-size:13px;outline:none;resize:vertical;box-sizing:border-box;font-family:monospace;margin-top:4px;"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeReportSettings()">关闭</button>
            </div>
        </div>
    </div>
</div>

<style>
    .toggle-label { display:inline-flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
    .toggle-label input[type="checkbox"] { display:none; }
    .toggle-slider { width:36px; height:20px; background:#ccc; border-radius:10px; position:relative; transition:all .2s; display:inline-block; }
    .toggle-slider::after { content:''; width:16px; height:16px; background:#fff; border-radius:50%; position:absolute; top:2px; left:2px; transition:all .2s; }
    .toggle-label input:checked + .toggle-slider { background:#7c5cfc; }
    .toggle-label input:checked + .toggle-slider::after { left:18px; }
    .toggle-text { font-size:14px; color:#1a1b1e; }
    .toggle-desc { font-size:12px; color:#909296; margin-left:4px; }
    .form-group { margin-bottom:12px; }
    .form-group label { display:block; font-size:12px; font-weight:500; color:#5c5f66; margin-bottom:4px; }
</style>

<!-- Memory Edit Modal -->
<div class="modal-overlay" id="memoryModal">
    <div class="modal">
        <h3 id="memoryModalTitle">✏️ 编辑记忆</h3>
        <input type="hidden" id="memoryEditName">
        <div class="form-group">
            <label>文件名</label>
            <input type="text" id="memoryFileName" placeholder="xxx.md">
        </div>
        <textarea id="memoryEditor" class="modal-editor" placeholder="记忆内容 (Markdown)..."></textarea>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeMemoryModal()">取消</button>
            <button class="btn btn-danger" id="memoryDeleteBtn" style="display:none;" onclick="deleteMemory()">删除</button>
            <button class="btn btn-primary" onclick="saveMemory()">保存</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
const KB_ID = [[${kb.id}]];
var showingPreview = false;
var currentAnalysisResult = '';

document.querySelectorAll('.modal-overlay').forEach(function(m) {
    m.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
});

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    var tabs = ['daily', 'agents', 'analysis'];
    var idx = tabs.indexOf(tab);
    document.querySelectorAll('.tab-btn')[idx].classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'daily') loadLatestReport();
    if (tab === 'agents') loadMemoryList();
    if (tab === 'analysis') { loadDirs(); loadAnalysisHistory(); }
}

// ==================== Tab 1: AI 指南 ====================

function loadAgents() {
    fetch('/kb/' + KB_ID + '/api/ai-guide/agents')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.ok) {
                document.getElementById('agentsEditor').value = data.content || '';
                if (data.path) document.getElementById('agentsPath').textContent = data.path;
            } else { setStatus('agentsStatus', '加载失败: ' + (data.error || ''), 'error'); }
        })
        .catch(function() { setStatus('agentsStatus', '加载失败', 'error'); });
}

function saveAgents() {
    var btn = document.querySelector('#tab-agents .btn-primary');
    btn.disabled = true; btn.textContent = '⏳ 保存...';
    fetch('/kb/' + KB_ID + '/api/ai-guide/agents', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: document.getElementById('agentsEditor').value })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.ok) { setStatus('agentsStatus', '✅ 已保存', 'success'); toast('✅ AGENTS.md 已保存', 'success'); }
        else { setStatus('agentsStatus', '❌ ' + (data.error || '保存失败'), 'error'); toast('❌ 保存失败', 'error'); }
    })
    .catch(function() { setStatus('agentsStatus', '❌ 请求失败', 'error'); })
    .finally(function() { btn.disabled = false; btn.textContent = '保存'; });
}

function toggleAgentsPreview() {
    showingPreview = !showingPreview;
    var preview = document.getElementById('agentsPreview');
    if (showingPreview) {
        preview.innerHTML = marked.parse(document.getElementById('agentsEditor').value);
        preview.style.display = 'block';
    } else { preview.style.display = 'none'; }
}

// ---- AI 记忆 ----

function loadMemoryList() {
    var c = document.getElementById('memoryList');
    c.innerHTML = '<div style="text-align:center;padding:20px;color:#909296;">⏳ 加载中...</div>';
    fetch('/kb/' + KB_ID + '/api/ai-guide/memory')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (!data.ok) { c.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div>' + (data.error || '') + '</div></div>'; return; }
            if (data.path) document.getElementById('memoryPath').textContent = data.path;
            renderMemoryList(data.files || []);
        })
        .catch(function() { c.innerHTML = '<div class="empty-state"><div class="icon">❌</div><div>加载失败</div></div>'; });
}

function renderMemoryList(files) {
    var c = document.getElementById('memoryList');
    if (files.length === 0) {
        c.innerHTML = '<div class="empty-state"><div class="icon">📁</div><div>暂无记忆文件</div><div style="margin-top:8px;font-size:13px;color:#909296;">点击「+ 新建记忆」创建第一条</div></div>';
        return;
    }
    var html = '<ul class="memory-file-list">';
    files.forEach(function(f) {
        var name = f.name, type = guessMemoryType(name), dn = name.replace(/\.md$/, '');
        html += '<li class="memory-file-item"><span class="memory-file-name" onclick="showMemoryEditor(\'' + escapeJs(name) + '\')">';
        html += '<span class="memory-type-badge badge-' + type + '">' + type + '</span>' + escapeHtml(dn);
        if (name === 'MEMORY.md') html += ' <span style="font-size:11px;color:#909296;">(索引)</span>';
        html += '</span><span style="display:flex;gap:4px;">';
        html += '<button class="btn btn-secondary btn-sm" onclick="showMemoryEditor(\'' + escapeJs(name) + '\')">编辑</button>';
        if (name !== 'MEMORY.md') html += '<button class="btn btn-danger btn-sm" onclick="deleteMemoryConfirm(\'' + escapeJs(name) + '\')">删除</button>';
        html += '</span></li>';
    });
    html += '</ul>';
    c.innerHTML = html;
}

function guessMemoryType(name) {
    if (name === 'MEMORY.md') return 'other';
    var l = name.toLowerCase();
    if (l.includes('user') || l.includes('角色')) return 'user';
    if (l.includes('feedback') || l.includes('反馈')) return 'feedback';
    if (l.includes('project') || l.includes('项目')) return 'project';
    if (l.includes('reference') || l.includes('参考')) return 'reference';
    return 'other';
}

// ---- memory modal functions (showMemoryEditor, showMemoryNew, saveMemory, etc.) ----
// (omitted for brevity - these are the same as before)
function showMemoryEditor(name) {
    document.getElementById('memoryModalTitle').textContent = '✏️ 编辑: ' + name;
    document.getElementById('memoryEditName').value = name;
    document.getElementById('memoryFileName').value = name;
    document.getElementById('memoryEditor').value = '⏳ 加载中...';
    document.getElementById('memoryDeleteBtn').style.display = (name === 'MEMORY.md') ? 'none' : 'inline-block';
    fetch('/kb/' + KB_ID + '/api/ai-guide/memory/' + encodeURIComponent(name))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            document.getElementById('memoryEditor').value = data.ok ? (data.content || '') : '';
            if (!data.ok) toast('加载失败: ' + (data.error || ''), 'error');
        })
        .catch(function() { document.getElementById('memoryEditor').value = ''; toast('加载失败', 'error'); });
    document.getElementById('memoryModal').classList.add('active');
}
function showMemoryNew() {
    document.getElementById('memoryModalTitle').textContent = '➕ 新建记忆';
    document.getElementById('memoryEditName').value = '';
    document.getElementById('memoryFileName').value = '';
    document.getElementById('memoryEditor').value = '---\nname: \ndescription: \nmetadata:\n  type: \n---\n\n';
    document.getElementById('memoryDeleteBtn').style.display = 'none';
    document.getElementById('memoryModal').classList.add('active');
}
function closeMemoryModal() { document.getElementById('memoryModal').classList.remove('active'); }
function saveMemory() {
    var btn = document.querySelector('#memoryModal .btn-primary');
    btn.disabled = true; btn.textContent = '⏳ 保存...';
    var name = document.getElementById('memoryFileName').value.trim();
    var content = document.getElementById('memoryEditor').value;
    var origName = document.getElementById('memoryEditName').value;
    if (!name) { toast('文件名不能为空', 'error'); btn.disabled = false; btn.textContent = '保存'; return; }
    var del = (origName && origName !== name) ? fetch('/kb/' + KB_ID + '/api/ai-guide/memory/' + encodeURIComponent(origName), { method: 'DELETE' }) : Promise.resolve();
    del.then(function() { return fetch('/kb/' + KB_ID + '/api/ai-guide/memory', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name, content: content }) }); })
    .then(function(r) { return r.json(); })
    .then(function(data) { if (data.ok) { toast('✅ 已保存', 'success'); closeMemoryModal(); loadMemoryList(); } else { toast('❌ ' + (data.error || '保存失败'), 'error'); } })
    .catch(function() { toast('❌ 请求失败', 'error'); })
    .finally(function() { btn.disabled = false; btn.textContent = '保存'; });
}
function deleteMemoryConfirm(name) {
    if (!confirm('确定删除 ' + name + '？')) return;
    fetch('/kb/' + KB_ID + '/api/ai-guide/memory/' + encodeURIComponent(name), { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(data) { if (data.ok) { toast('🗑️ 已删除', 'success'); loadMemoryList(); closeMemoryModal(); } else { toast('❌ ' + (data.error || '删除失败'), 'error'); } })
    .catch(function() { toast('❌ 请求失败', 'error'); });
}
function deleteMemory() { deleteMemoryConfirm(document.getElementById('memoryEditName').value); }

// ==================== Tab 2: AI 分析 ====================

var analysisEventSource = null;

function loadDirs() {
    fetch('/kb/' + KB_ID + '/api/dirs')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var sel = document.getElementById('analysisDir');
            sel.innerHTML = '<option value="">-- 请选择目录 --</option>';
            if (data.ok && data.dirs) {
                data.dirs.forEach(function(d) {
                    var opt = document.createElement('option');
                    opt.value = d; opt.textContent = d;
                    sel.appendChild(opt);
                });
            }
        });
}

function startAnalysis() {
    var dir = document.getElementById('analysisDir').value;
    if (!dir) { toast('请先选择分析目标目录', 'error'); return; }

    var prompt = document.getElementById('analysisPrompt').value.trim();
    var btn = document.getElementById('analysisBtn');
    btn.disabled = true; btn.textContent = '⏳ 分析中...';
    document.getElementById('analysisStatus').textContent = '';
    document.getElementById('analysisResult').style.display = 'block';
    document.getElementById('analysisResult').innerHTML = '<span style="color:#909296;">⏳ AI 正在分析 ' + dir + '...</span>';
    document.getElementById('saveAnalysisBtn').style.display = 'none';

    var url = '/kb/' + KB_ID + '/api/analyze-dir?dir=' + encodeURIComponent(dir);
    if (prompt) url += '&prompt=' + encodeURIComponent(prompt);

    // SSE stream
    var es = new EventSource(url);
    analysisEventSource = es;
    var fullText = '';

    es.onmessage = function(e) {
        try {
            var d = JSON.parse(e.data);
            if (d.type === 'text') {
                fullText += d.content;
                document.getElementById('analysisResult').innerHTML = marked.parse(fullText);
            } else if (d.type === 'status') {
                document.getElementById('analysisResult').innerHTML = '<span style="color:#909296;">' + d.content + '</span>';
            } else if (d.type === 'done') {
                es.close(); analysisEventSource = null;
                btn.disabled = false; btn.textContent = '🚀 开始分析';
                currentAnalysisResult = fullText;
                document.getElementById('saveAnalysisBtn').style.display = 'inline-block';
                toast('✅ 分析完成', 'success');
            } else if (d.type === 'error') {
                document.getElementById('analysisResult').innerHTML = '<span style="color:#e03131;">❌ ' + d.content + '</span>';
                es.close(); analysisEventSource = null;
                btn.disabled = false; btn.textContent = '🚀 开始分析';
            }
        } catch(e) {}
    };
    es.onerror = function() {
        es.close(); analysisEventSource = null;
        if (btn) { btn.disabled = false; btn.textContent = '🚀 开始分析'; }
    };
}

function saveAnalysisResult() {
    if (!currentAnalysisResult) return;
    var dir = document.getElementById('analysisDir').value;
    var prompt = document.getElementById('analysisPrompt').value.trim();

    fetch('/kb/' + KB_ID + '/api/analysis/save', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dirPath: dir, content: currentAnalysisResult, prompt: prompt })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.ok) { toast('✅ 分析结果已保存'); loadAnalysisHistory(); }
        else { toast('❌ ' + (data.error || '保存失败'), 'error'); }
    })
    .catch(function() { toast('❌ 请求失败', 'error'); });
}

function loadAnalysisHistory() {
    fetch('/kb/' + KB_ID + '/api/analysis/list')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var c = document.getElementById('analysisHistory');
            if (!data.ok || !data.list || data.list.length === 0) {
                c.innerHTML = '<div style="color:#909296;font-size:13px;">暂无分析记录</div>';
                return;
            }
            var html = '';
            data.list.forEach(function(item) {
                var preview = (item.content || '').substring(0, 100) + '...';
                html += '<div style="border:1px solid #eef0f4;border-radius:8px;padding:10px;margin-bottom:6px;">';
                html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">';
                html += '<span style="font-weight:500;font-size:13px;">📂 ' + escapeHtml(item.dirPath || '根目录') + '</span>';
                html += '<span style="font-size:11px;color:#909296;">' + escapeHtml(item.createdAt || '') + '</span>';
                html += '</div>';
                html += '<div style="font-size:12px;color:#5c5f66;">' + escapeHtml(preview) + '</div>';
                html += '<button class="btn btn-secondary btn-sm" style="margin-top:6px;" onclick="showHistoryDetail(' + item.id + ')">查看详情</button>';
                html += '</div>';
            });
            c.innerHTML = html;
        });
}

function showHistoryDetail(aid) {
    fetch('/kb/' + KB_ID + '/api/analysis/get?aid=' + aid)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.ok && data.content) {
                document.getElementById('analysisResult').style.display = 'block';
                document.getElementById('analysisResult').innerHTML = marked.parse(data.content);
                document.getElementById('tab-analysis').scrollTop = 0;
            } else { toast('加载失败', 'error'); }
        });
}

// ==================== Tab 3: 综合日报 ====================

function loadReportPrompt() {
    fetch('/kb/' + KB_ID + '/api/report/prompt')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.ok) document.getElementById('reportPrompt').value = data.prompt || '';
        });
}

function saveReportPrompt() {
    fetch('/kb/' + KB_ID + '/api/report/prompt', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: document.getElementById('reportPrompt').value })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.ok) { setStatus('reportPromptStatus', '✅ 已保存', 'success'); toast('✅ 提示词已保存'); }
        else { setStatus('reportPromptStatus', '❌ ' + (data.error || '失败'), 'error'); }
    })
    .catch(function() { setStatus('reportPromptStatus', '❌ 请求失败', 'error'); });
}

function loadReportContent() {
    var c = document.getElementById('reportContent');
    c.style.display = 'none';
    document.getElementById('reportStatus').textContent = '';
}

function generateReport() {
    var btn = document.getElementById('genReportBtn');
    btn.disabled = true; btn.textContent = '⏳ 生成中...';
    document.getElementById('reportContent').innerHTML = '<div style="text-align:center;padding:30px;color:#909296;">⏳ AI 正在生成日报...</div>';

    fetch('/kb/' + KB_ID + '/api/generate', { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.ok) { toast('✅ 日报生成成功'); loadLatestReport(); }
            else { document.getElementById('reportContent').innerHTML = '<div style="text-align:center;padding:30px;color:#e03131;">❌ ' + (data.error || '生成失败') + '</div>'; }
        })
        .catch(function() { document.getElementById('reportContent').innerHTML = '<div style="text-align:center;padding:30px;color:#e03131;">❌ 请求失败</div>'; })
        .finally(function() { btn.disabled = false; btn.textContent = '🔄 重新生成'; });
}

function loadLatestReport() {
    fetch('/kb/' + KB_ID + '/api/report/latest')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var c = document.getElementById('reportContent');
            if (data.ok && data.content) {
                c.innerHTML = marked.parse(data.content);
            } else {
                c.innerHTML = '<div style="text-align:center;padding:30px;color:#909296;">暂无日报数据，点击「重新生成」创建今日日报</div>';
            }
        })
        .catch(function() { document.getElementById('reportContent').innerHTML = '<div style="text-align:center;padding:30px;color:#909296;">加载失败</div>'; });
}

function closeReportSettings() {

}

function saveReportConfig() {

        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            autoReport: document.getElementById('autoReportToggle').checked,

        })

    .catch(function() { toast('❌ 请求失败', 'error'); });
}

function saveReportPrompt() {
    fetch('/kb/' + KB_ID + '/api/report/prompt', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: document.getElementById('reportPrompt').value })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.ok) { toast('✅ 提示词已保存'); }
        else { toast('❌ ' + (data.error || '保存失败'), 'error'); }
    })
    .catch(function() { toast('❌ 请求失败', 'error'); });
}

// ==================== Utils ====================

function setStatus(id, text, type) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = 'status-text' + (type ? ' ' + type : '');
    if (type === 'success' || type === 'error') {
        setTimeout(function() { el.textContent = ''; el.className = 'status-text'; }, 3000);
    }
}
function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeJs(str) { return String(str).replace(/'/g, "\\'").replace(/"/g, '\\"'); }

document.addEventListener('DOMContentLoaded', function() {
    loadAgents();
    loadLatestReport();
});
