<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title layout:fragment="title">识图</title>
</head>
<body>
<th:block layout:fragment="content">

<div class="card">
    <h2>📷 图片识别</h2>
    <p class="text-muted mb-2">上传图片或从笔记库选择图片，AI 自动识别并给出解答</p>

    <div style="display:flex; gap:8px; margin-bottom:16px;">
        <button class="btn btn-primary" onclick="switchTab('upload')" id="tabUpload">📤 上传图片</button>
        <button class="btn btn-secondary" onclick="switchTab('browse')" id="tabBrowse">📚 笔记库图片</button>
    </div>

    <div id="panelUpload">
        <form id="recognizeForm">
            <div style="margin-bottom:16px;">
                <div id="dropZone" style="border:2px dashed #d0d5dd; border-radius:12px; padding:40px 20px; text-align:center; cursor:pointer; transition:all .2s; background:#fafafa;" onclick="document.getElementById('fileInput').click()">
                    <div id="dropHint" style="color:#909296; font-size:14px;">
                        <div style="font-size:32px; margin-bottom:8px;">📁</div>
                        点击选择图片 或 拖拽图片到此处<br>
                        <span style="font-size:12px;">支持 jpg / png / gif / webp / bmp，最大 10MB</span>
                    </div>
                    <div id="preview" style="display:none;">
                        <img id="previewImg" style="max-height:300px; border-radius:8px; margin-bottom:8px;" />
                        <div id="fileName" style="font-size:13px; color:#5c5f66;"></div>
                    </div>
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="previewImage(this)" />
            </div>

            <div style="margin-bottom:16px;">
                <label style="font-size:13px; color:#5c5f66; font-weight:500; display:block; margin-bottom:4px;">识别提示词（可修改）</label>
                <textarea id="uploadPrompt" rows="3" style="width:100%; padding:10px 12px; border:1px solid #e1e3e6; border-radius:8px; font-size:14px; resize:vertical; outline:none; font-family:inherit;">请识别这张图片中的内容。</textarea>
            </div>

            <button type="button" class="btn btn-primary" id="submitBtn" style="width:100%;" onclick="uploadAndRecognize()">🔍 开始识别</button>
        </form>
    </div>

    <div id="panelBrowse" style="display:none;">
        <div style="margin-bottom:12px;">
            <div style="display:flex; gap:8px; align-items:center; margin-bottom:12px;">
                <input type="text" id="searchInput" placeholder="搜索文件名..." oninput="filterImages()" style="flex:1; padding:8px 12px; border:1px solid #e1e3e6; border-radius:8px; font-size:13px; outline:none;" />
                <button class="btn btn-secondary" onclick="loadImages()">🔄 刷新</button>
            </div>
            <div id="imageGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:12px; max-height:400px; overflow-y:auto; padding:4px;">
                <div style="text-align:center; color:#909296; grid-column:1/-1; padding:40px 0;">加载中...</div>
            </div>
        </div>

        <div style="margin-bottom:12px;">
            <label style="font-size:13px; color:#5c5f66; font-weight:500; display:block; margin-bottom:4px;">识别提示词（可修改）</label>
            <textarea id="browsePrompt" rows="3" style="width:100%; padding:10px 12px; border:1px solid #e1e3e6; border-radius:8px; font-size:14px; resize:vertical; outline:none; font-family:inherit;">请识别这张图片中的内容。</textarea>
        </div>

        <button class="btn btn-primary" id="browseSubmitBtn" onclick="recognizeFile()" style="width:100%;" disabled>🔍 识别选中图片</button>
    </div>
</div>

<div id="resultArea" style="display:none;">
    <div class="card">
        <h2>📸 识别的图片</h2>
        <div style="text-align:center; padding:12px 0;">
            <img id="resultImg" style="max-width:100%; max-height:400px; border-radius:8px; border:1px solid #e1e3e6;" />
        </div>
    </div>
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <h2 style="margin:0;">💡 识别结果</h2>
            <div style="display:flex; gap:8px; align-items:center;">
                <span id="saveStatus" style="font-size:13px;"></span>
                <button class="btn btn-primary" id="saveBtn" onclick="saveResult()">💾 保存到笔记库</button>
            </div>
        </div>
        <div id="resultText" class="report"></div>
    </div>
</div>

<!-- Save Path Modal -->
<div class="modal-overlay" id="saveModal">
    <div class="modal" style="width:500px;">
        <h3>💾 保存到笔记库</h3>
        <div class="form-group" style="margin-bottom:12px;">
            <label style="font-size:12px; color:#5c5f66; font-weight:500;">文件名</label>
            <input type="text" id="saveFilename" style="width:100%; padding:8px 10px; border:1px solid #e1e3e6; border-radius:6px; font-size:13px;" />
        </div>
        <div class="form-group" style="margin-bottom:12px;">
            <label style="font-size:12px; color:#5c5f66; font-weight:500;">保存路径</label>
            <div style="display:flex; gap:6px;">
                <input type="text" id="savePathInput" readonly style="flex:1; padding:8px 10px; border:1px solid #e1e3e6; border-radius:6px; font-size:13px;" />
                <button class="btn btn-secondary btn-sm" onclick="openPathBrowser()">选择</button>
            </div>
        </div>
        <div id="pathBrowser" style="display:none; margin-bottom:12px;">
            <div id="pathBreadcrumb" style="font-size:12px; margin-bottom:8px;"></div>
            <div id="pathList" style="max-height:200px; overflow-y:auto; border:1px solid #e1e3e6; border-radius:6px;"></div>
        </div>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
            <button class="btn btn-secondary" onclick="closeSaveModal()">取消</button>
            <button class="btn btn-primary" onclick="confirmSave()">保存</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let allImages = [];
let selectedImage = null;
let currentResultMd = '';
let currentImageSrc = '';
let selectedSaveDir = '';

function switchTab(tab) {
    document.getElementById('panelUpload').style.display = tab === 'upload' ? 'block' : 'none';
    document.getElementById('panelBrowse').style.display = tab === 'browse' ? 'block' : 'none';
    document.getElementById('tabUpload').className = tab === 'upload' ? 'btn btn-primary' : 'btn btn-secondary';
    document.getElementById('tabBrowse').className = tab === 'browse' ? 'btn btn-primary' : 'btn btn-secondary';
    if (tab === 'browse' && allImages.length === 0) loadImages();
}

function previewImage(input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('dropHint').style.display = 'none';
        document.getElementById('preview').style.display = 'block';
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('fileName').textContent = file.name + ' (' + (file.size/1024).toFixed(1) + 'KB)';
    };
    reader.readAsDataURL(file);
}

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); this.style.borderColor = '#7c5cfc'; this.style.background = '#f0edff'; });
dropZone.addEventListener('dragleave', function(e) { this.style.borderColor = '#d0d5dd'; this.style.background = '#fafafa'; });
dropZone.addEventListener('drop', function(e) {
    e.preventDefault(); this.style.borderColor = '#d0d5dd'; this.style.background = '#fafafa';
    if (e.dataTransfer.files.length > 0) {
        document.getElementById('fileInput').files = e.dataTransfer.files;
        previewImage(document.getElementById('fileInput'));
    }
});

async function uploadAndRecognize() {
    const input = document.getElementById('fileInput');
    if (!input.files || !input.files[0]) { toast('请先选择图片', 'error'); return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '⏳ 识别中，请稍候...';

    const fd = new FormData();
    fd.append('image', input.files[0]);
    fd.append('prompt', document.getElementById('uploadPrompt').value);

    try {
        const resp = await fetch('/image-recognition/recognize-sync', { method: 'POST', body: fd });
        const data = await resp.json();
        if (data.ok) {
            showResult(data.image_url, data.result);
        } else {
            toast('识别失败: ' + (data.error || '未知错误'), 'error');
        }
    } catch(e) {
        toast('请求失败', 'error');
    }
    btn.disabled = false; btn.textContent = '🔍 开始识别';
}

async function loadImages() {
    const grid = document.getElementById('imageGrid');
    grid.innerHTML = '<div style="text-align:center; color:#909296; grid-column:1/-1; padding:40px 0;">加载中...</div>';
    try {
        const resp = await fetch('/image-recognition/api/images');
        const data = await resp.json();
        if (data.ok) {
            allImages = data.images;
            renderImages(allImages);
        } else {
            grid.innerHTML = '<div style="text-align:center; color:#909296; grid-column:1/-1;">加载失败</div>';
        }
    } catch(e) {
        grid.innerHTML = '<div style="text-align:center; color:#909296; grid-column:1/-1;">请求失败</div>';
    }
}

function renderImages(images) {
    const grid = document.getElementById('imageGrid');
    if (images.length === 0) {
        grid.innerHTML = '<div style="text-align:center; color:#909296; grid-column:1/-1; padding:40px 0;">笔记库中暂无图片</div>';
        return;
    }
    grid.innerHTML = images.map(img => `
        <div onclick="selectImage('${img.path.replace(/'/g, "\\'")}', this)" style="border:2px solid #e1e3e6; border-radius:8px; overflow:hidden; cursor:pointer; transition:all .15s; text-align:center; background:#fafafa;" onmouseover="this.style.borderColor='#7c5cfc'" onmouseout="if(!this.classList.contains('sel'))this.style.borderColor='#e1e3e6'">
            <img src="/image-recognition/thumb?path=${encodeURIComponent(img.path)}" style="width:100%; height:100px; object-fit:cover;" loading="lazy" onerror="this.style.display='none'" />
            <div style="padding:6px 8px; font-size:11px; color:#5c5f66; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${img.path}">${img.name}</div>
        </div>
    `).join('');
}

function selectImage(path, el) {
    document.querySelectorAll('#imageGrid > div').forEach(d => { d.classList.remove('sel'); d.style.borderColor = '#e1e3e6'; });
    el.classList.add('sel');
    el.style.borderColor = '#7c5cfc';
    selectedImage = path;
    document.getElementById('browseSubmitBtn').disabled = false;
}

function filterImages() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allImages.filter(img => img.name.toLowerCase().includes(q) || img.path.toLowerCase().includes(q));
    renderImages(filtered);
}

async function recognizeFile() {
    if (!selectedImage) return;
    const btn = document.getElementById('browseSubmitBtn');
    btn.disabled = true; btn.textContent = '⏳ 识别中，请稍候...';

    try {
        const resp = await fetch('/image-recognition/recognize-file', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({path: selectedImage, prompt: document.getElementById('browsePrompt').value})
        });
        const data = await resp.json();
        if (data.ok) {
            showResult(data.image_url, data.result);
        } else {
            toast('识别失败: ' + (data.error || '未知错误'), 'error');
        }
    } catch(e) {
        toast('请求失败', 'error');
    }
    btn.disabled = false; btn.textContent = '🔍 识别选中图片';
}

function showResult(imageUrl, resultMd) {
    currentResultMd = resultMd;
    currentImageSrc = imageUrl;
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('resultImg').src = imageUrl;
    document.getElementById('resultText').innerHTML = marked.parse(resultMd);
    document.getElementById('saveStatus').textContent = '';
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('saveBtn').textContent = '💾 保存到笔记库';
    document.getElementById('resultArea').scrollIntoView({behavior: 'smooth'});
}

function saveResult() {
    if (!currentResultMd) return;
    const now = new Date();
    const dateStr = now.getFullYear() + '' + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
    document.getElementById('saveFilename').value = '识图分析_' + dateStr + '.md';
    document.getElementById('savePathInput').value = '';
    document.getElementById('saveModal').classList.add('active');
}

function closeSaveModal() {
    document.getElementById('saveModal').classList.remove('active');
}

function openPathBrowser() {
    document.getElementById('pathBrowser').style.display = 'block';
    browsePath('');
}

async function browsePath(dir) {
    try {
        const resp = await fetch('/image-recognition/subdirs?dir=' + encodeURIComponent(dir));
        const data = await resp.json();
        const bc = document.getElementById('pathBreadcrumb');
        let html = '<span style="cursor:pointer;color:#7c5cfc;" onclick="browsePath(\'\')">根目录</span>';
        if (dir) {
            const parts = dir.split('/');
            let accum = '';
            for (let i = 0; i < parts.length; i++) {
                accum = accum ? accum + '/' + parts[i] : parts[i];
                const d = accum;
                html += ' / <span style="cursor:pointer;color:#7c5cfc;" onclick="browsePath(\'' + d.replace(/'/g, "\\'") + '\')">' + parts[i] + '</span>';
            }
        }
        bc.innerHTML = html;

        const list = document.getElementById('pathList');
        if (data.ok && data.subdirs.length > 0) {
            list.innerHTML = data.subdirs.map(d =>
                '<div class="path-item" onclick="browsePath(\'' + d.path.replace(/'/g, "\\'") + '\')" style="padding:8px 12px; cursor:pointer; border-radius:6px; font-size:13px;">📁 ' + d.name + '</div>'
            ).join('');
        } else {
            list.innerHTML = '<div style="padding:12px;color:#909296;font-size:13px;">无子目录</div>';
        }
        selectedSaveDir = dir;
    } catch(e) { toast('加载目录失败', 'error'); }
}

async function confirmSave() {
    const filename = document.getElementById('saveFilename').value.trim();
    const subdir = document.getElementById('savePathInput').value.trim();
    if (!filename) { toast('请输入文件名', 'error'); return; }

    let fullPath = subdir ? subdir + '/' + filename : filename;

    try {
        const resp = await fetch('/image-recognition/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({path: fullPath, content: currentResultMd})
        });
        const data = await resp.json();
        if (data.ok) {
            toast('保存成功: ' + data.path);
            document.getElementById('saveStatus').textContent = '✅ 已保存';
            document.getElementById('saveStatus').style.color = '#2b8a3e';
            closeSaveModal();
        } else {
            toast('保存失败: ' + (data.error || ''), 'error');
        }
    } catch(e) { toast('保存失败', 'error'); }
}
</script>

</th:block>
</body>
</html>
