<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>笔记库</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .kb-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:16px; }
        .kb-card { background:#fff; border:1px solid #e1e3e6; border-radius:12px; padding:20px; transition:all .2s; position:relative; }
        .kb-card:hover { border-color:#d9d0ff; box-shadow:0 4px 16px rgba(0,0,0,0.06); }
        .kb-card .kb-name { font-size:16px; font-weight:600; color:#1a1b1e; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
        .kb-card .kb-path { font-size:12px; color:#909296; margin-bottom:12px; word-break:break-all; font-family:monospace; }
        .kb-card .kb-card-actions { position:absolute; top:12px; right:12px; display:flex; gap:4px; opacity:0; transition:opacity .15s; }
        .kb-card:hover .kb-card-actions { opacity:1; }
        .kb-card .kb-card-actions button { border:none; background:#fff; border:1px solid #e1e3e6; border-radius:6px; padding:4px 8px; font-size:12px; cursor:pointer; color:#5c5f66; }
        .kb-card .kb-card-actions button:hover { background:#f0edff; color:#7c5cfc; }
        .kb-card .kb-card-actions button.del:hover { background:#ffe0e0; color:#e03131; }
        .kb-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
        .kb-stat { text-align:center; padding:8px; background:#fafafe; border-radius:8px; }
        .kb-stat .num { font-size:20px; font-weight:700; color:#7c5cfc; }
        .kb-stat .label { font-size:11px; color:#909296; margin-top:2px; }
        .kb-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .kb-actions a { flex:1; text-align:center; padding:8px 12px; border-radius:6px; font-size:13px; text-decoration:none; transition:all .15s; }
        .kb-actions .btn-kb { background:#f0edff; color:#7c5cfc; }
        .kb-actions .btn-kb:hover { background:#e0dcff; }
        .kb-actions .btn-outline { border:1px solid #e1e3e6; color:#5c5f66; }
        .kb-actions .btn-outline:hover { border-color:#7c5cfc; color:#7c5cfc; }
        .kb-empty { text-align:center; padding:60px 20px; border:2px dashed #d9d0ff; background:#fafafe; border-radius:12px; }
        .kb-empty .icon { font-size:48px; margin-bottom:12px; }
        .kb-empty .text { font-size:16px; font-weight:600; color:#7c5cfc; margin-bottom:8px; }
        .kb-mgmt-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding:12px 16px; background:#fff; border:1px solid #e1e3e6; border-radius:12px; }
        .kb-mgmt-bar .info { font-size:13px; color:#5c5f66; }
        .data-tabs { display:flex; gap:0; border-bottom:2px solid #e1e3e6; margin-bottom:20px; background:#fff; border-radius:12px 12px 0 0; padding:0 20px; }
        .data-tab { padding:12px 20px; font-size:14px; cursor:pointer; transition:all .15s; border:none; background:transparent; color:#5c5f66; border-bottom:2px solid transparent; margin-bottom:-2px; font-weight:500; }
        .data-tab:hover { color:#1a1b1e; background:#f5f5f7; border-radius:6px 6px 0 0; }
        .data-tab.active { color:#7c5cfc; border-bottom-color:#7c5cfc; font-weight:600; }
        .data-panel { background:#fff; border:1px solid #e1e3e6; border-radius:0 0 12px 12px; padding:20px; min-height:200px; }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h1 style="font-size:22px;font-weight:600;margin:0;">📚 笔记库</h1>
            <button class="btn btn-primary" onclick="showAddKbModal()">+ 添加笔记库</button>
        </div>

        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;">
            <div style="background:#fff;border:1px solid #e1e3e6;border-radius:10px;padding:16px;text-align:center;">
                <div style="font-size:28px;font-weight:700;color:#7c5cfc;" th:text="${totalKbs}">0</div>
                <div style="font-size:12px;color:#5c5f66;margin-top:4px;">笔记库</div>
            </div>
            <div style="background:#fff;border:1px solid #e1e3e6;border-radius:10px;padding:16px;text-align:center;">
                <div style="font-size:28px;font-weight:700;color:#7c5cfc;" th:text="${totalDirs}">0</div>
                <div style="font-size:12px;color:#5c5f66;margin-top:4px;">目录</div>
            </div>
            <div style="background:#fff;border:1px solid #e1e3e6;border-radius:10px;padding:16px;text-align:center;">
                <div style="font-size:28px;font-weight:700;color:#7c5cfc;" th:text="${totalFiles}">0</div>
                <div style="font-size:12px;color:#5c5f66;margin-top:4px;">文件</div>
            </div>
            <div style="background:#fff;border:1px solid #e1e3e6;border-radius:10px;padding:16px;text-align:center;">
                <div style="font-size:28px;font-weight:700;color:#f59e0b;" th:text="${totalTasks}">0</div>
                <div style="font-size:12px;color:#5c5f66;margin-top:4px;">待办任务</div>
            </div>
            <div style="background:#fff;border:1px solid #e1e3e6;border-radius:10px;padding:16px;text-align:center;">
                <div style="font-size:28px;font-weight:700;color:#10b981;" th:text="${totalReminders}">0</div>
                <div style="font-size:12px;color:#5c5f66;margin-top:4px;">提醒</div>
            </div>
        </div>

        <div class="data-tabs">
            <button class="data-tab active" onclick="switchTab('analysis', this)">📊 AI 分析</button>
            <button class="data-tab" onclick="switchTab('data', this)">📈 数据概览</button>
            <button class="data-tab" onclick="switchTab('list', this)">📋 笔记库管理</button>
        </div>

        <!-- AI 分析 Tab -->
        <div id="panelAnalysis" class="data-panel">
            <div th:if="${#lists.size(kbInfos) == 0}" class="exam-empty">
                暂无笔记库，请先添加
            </div>
            <div th:if="${#lists.size(kbInfos) > 0}">
                <div th:each="kb : ${kbInfos}" style="margin-bottom:20px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                        <h3 style="margin:0;font-size:15px;">📂 <span th:text="${kb.name}">笔记库</span></h3>
                        <button class="btn btn-secondary" style="font-size:12px;padding:4px 12px;" onclick="startKbAnalysis(${kb.id}, '${kb.name}')">🤖 AI 分析</button>
                    </div>
                    <div th:if="${kb.hasReport}" class="kb-report-preview" th:attr="data-report=${kb.latestReport}" style="padding:16px;background:linear-gradient(135deg,#f0edff,#fafafe);border:1px solid #d9d0ff;border-radius:10px;cursor:pointer;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                            <span style="font-size:12px;color:#7c5cfc;font-weight:500;">📊 综合日报</span>
                            <span style="font-size:11px;color:#909296;" th:text="${kb.reportDate}">日期</span>
                        </div>
                        <div class="kb-report-content report" style="font-size:13px;line-height:1.8;"></div>
                    </div>
                    <div th:unless="${kb.hasReport}" style="padding:20px;text-align:center;color:#909296;font-size:13px;border:1px dashed #d9d0ff;border-radius:10px;">
                        暂无分析报告，点击「AI 分析」生成
                    </div>
                </div>
            </div>
        </div>

        <!-- 数据概览 Tab -->
        <div id="panelData" class="data-panel" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h3 style="margin:0;font-size:15px;">📈 数据概览</h3>
                <div style="display:flex;gap:8px;">
                    <button class="data-refresh-btn" onclick="loadDataOverview()">🔄 刷新</button>
                    <a href="/tools" class="data-refresh-btn" style="text-decoration:none;">🧰 数据工具</a>
                </div>
            </div>
            <div id="dataOverviewContent">
                <div class="data-loading">⏳ 加载中...</div>
            </div>
        </div>

        <!-- 笔记库管理 Tab -->
        <div id="panelList" class="data-panel" style="display:none;">
            <div th:if="${#lists.size(kbInfos) == 0}" class="kb-empty">
                <div class="icon">📚</div>
                <div class="text">尚未配置笔记库</div>
                <div class="text-muted" style="margin-bottom:16px;">点击上方「添加笔记库」创建一个</div>
            </div>
            <div th:if="${#lists.size(kbInfos) > 0}" class="kb-grid">
                <div th:each="kb : ${kbInfos}" class="kb-card" th:attr="data-kb-id=${kb.id}">
                    <div class="kb-card-actions">
                        <button onclick="showEditKbModal(this)" title="编辑">✏️</button>
                        <button class="del" onclick="deleteKb(this)" title="删除">🗑️</button>
                    </div>
                    <div class="kb-name">📂 <span th:text="${kb.name}">知识库</span></div>
                    <div class="kb-path" th:text="${kb.notesDir}">路径</div>
                    <div class="kb-stats">
                        <div class="kb-stat"><div class="num" th:text="${kb.dirCount}">0</div><div class="label">目录</div></div>
                        <div class="kb-stat"><div class="num" th:text="${kb.fileCount}">0</div><div class="label">文件</div></div>
                        <div class="kb-stat"><div class="num" th:text="${kb.taskCount}">0</div><div class="label" th:text="${kb.labels != null ? kb.labels.get('tasks') : '任务'}">任务</div></div>
                        <div class="kb-stat"><div class="num" th:text="${kb.reminderCount}">0</div><div class="label" th:text="${kb.labels != null ? kb.labels.get('reminders') : '提醒'}">提醒</div></div>
                    </div>
                    <div class="kb-actions">
                        <a th:href="@{/kb/{id}(id=${kb.id})}" class="btn-kb">📊 概览</a>
                        <a th:href="@{/kb/{id}/notes(id=${kb.id})}" class="btn-outline" th:text="'📂 ' + ${kb.labels != null ? kb.labels.get('notes') : '笔记'}">📂 笔记</a>
                        <a th:href="@{/kb/{id}/config(id=${kb.id})}" class="btn-outline">⚙️ 配置</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 添加/编辑笔记库弹窗 -->
        <div class="modal-overlay" id="kbModal">
            <div class="modal" style="width:560px;">
                <h3 id="kbModalTitle">添加笔记库</h3>
                <input type="hidden" id="kbEditId">
                <div class="form-row">
                    <div class="form-group" style="flex:1;">
                        <label>名称 *</label>
                        <input type="text" id="kbName" placeholder="如 工作" style="width:100%;">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex:1;">
                        <label>笔记库路径 *</label>
                        <input type="text" id="kbNotesDir" placeholder="D:\projects\notes" style="width:100%;font-family:monospace;">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex:1;">
                        <label>任务菜单名</label>
                        <input type="text" id="kbLabelTasks" value="任务" style="width:100%;">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>提醒菜单名</label>
                        <input type="text" id="kbLabelReminders" value="提醒" style="width:100%;">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex:1;">
                        <label>笔记菜单名</label>
                        <input type="text" id="kbLabelNotes" value="笔记" style="width:100%;">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>配置菜单名</label>
                        <input type="text" id="kbLabelConfig" value="配置" style="width:100%;">
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="closeKbModal()">取消</button>
                    <button class="btn btn-primary" onclick="submitKb()">保存</button>
                </div>
            </div>
        </div>

        <!-- 删除确认弹窗 -->
        <div class="modal-overlay" id="deleteKbModal">
            <div class="modal" style="width:400px;">
                <h3>确认删除</h3>
                <p id="deleteKbText" style="font-size:14px;color:#5c5f66;margin:12px 0;"></p>
                <input type="hidden" id="deleteKbId">
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="closeModal('deleteKbModal')">取消</button>
                    <button class="btn btn-danger" onclick="confirmDeleteKb()">删除</button>
                </div>
            </div>
        </div>

        <!-- AI分析报告预览弹窗 -->
        <div class="modal-overlay" id="reportModal">
            <div class="modal" style="width:80%;max-width:800px;max-height:85vh;display:flex;flex-direction:column;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h3 style="margin:0;">📊 AI 分析报告</h3>
                    <button class="btn btn-secondary" onclick="closeModal('reportModal')" style="padding:4px 12px;">✕</button>
                </div>
                <div id="reportContent" style="overflow:auto;flex:1;padding:16px;background:#fafafe;border-radius:8px;" class="report"></div>
            </div>
        </div>

        <!-- AI分析弹窗 -->
        <div class="modal-overlay" id="analysisModal">
            <div class="modal" style="width:80%;max-width:800px;max-height:85vh;display:flex;flex-direction:column;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h3 style="margin:0;">📊 综合日报 - <span id="analysisKbName"></span></h3>
                    <button class="btn btn-secondary" onclick="closeModal('analysisModal')" style="padding:4px 12px;">✕</button>
                </div>
                <div id="analysisResult" style="overflow:auto;flex:1;padding:16px;background:#fafafe;border-radius:8px;" class="report"></div>
                <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;">
                    <button class="btn btn-secondary" onclick="closeModal('analysisModal')">关闭</button>
                    <button class="btn btn-primary" id="analysisBtn" onclick="runKbAnalysis()">🚀 开始生成</button>
                </div>
            </div>
        </div>

        <script>
            function switchTab(tab, btn) {
                document.querySelectorAll('.data-tab').forEach(function(t) { t.classList.remove('active'); });
                btn.classList.add('active');
                document.getElementById('panelAnalysis').style.display = tab === 'analysis' ? '' : 'none';
                document.getElementById('panelData').style.display = tab === 'data' ? '' : 'none';
                document.getElementById('panelList').style.display = tab === 'list' ? '' : 'none';
                if (tab === 'data') loadDataOverview();
            }

            async function loadDataOverview() {
                var container = document.getElementById('dataOverviewContent');
                container.innerHTML = '<div class="data-loading">⏳ 正在分析笔记库数据...</div>';
                try {
                    var resp = await fetch('/data/api/overview');
                    var result = await resp.json();
                    if (!result.ok) {
                        container.innerHTML = '<div class="data-empty">分析失败: ' + (result.error || '') + '</div>';
                        return;
                    }
                    var ov = result.overview;
                    var html = '';
                    if (ov.metrics && ov.metrics.length > 0) {
                        html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;">';
                        for (var i = 0; i < ov.metrics.length; i++) {
                            var m = ov.metrics[i];
                            html += '<div style="background:#f8f7ff;border-radius:10px;padding:16px;text-align:center;">';
                            html += '<div style="font-size:24px;font-weight:700;color:#7c5cfc;">' + (m.icon || '') + ' ' + escapeHtml(m.value) + '</div>';
                            html += '<div style="font-size:12px;color:#5c5f66;margin-top:4px;">' + escapeHtml(m.label) + '</div>';
                            html += '</div>';
                        }
                        html += '</div>';
                    }
                    if (ov.insights && ov.insights.length > 0) {
                        html += '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:16px;">';
                        html += '<h4 style="font-size:14px;font-weight:600;margin:0 0 8px;color:#166534;">💡 AI 洞察</h4>';
                        for (var i = 0; i < ov.insights.length; i++) {
                            html += '<p style="font-size:13px;color:#166534;margin:4px 0;">' + escapeHtml(ov.insights[i]) + '</p>';
                        }
                        html += '</div>';
                    }
                    container.innerHTML = html || '<div class="data-empty">暂无数据</div>';
                } catch(e) {
                    container.innerHTML = '<div class="data-empty">加载失败</div>';
                }
            }

            function escapeHtml(t) { if (!t) return ''; var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

            function showKbReport(el) {
                var report = el.getAttribute('data-report');
                if (report) {
                    document.getElementById('reportContent').innerHTML = marked.parse(report, {breaks: true});
                    document.getElementById('reportModal').classList.add('active');
                }
            }

            document.querySelectorAll('.kb-report-preview').forEach(function(el) {
                var contentEl = el.querySelector('.kb-report-content');
                if (contentEl) {
                    var markdown = el.getAttribute('data-report');
                    if (markdown) {
                        contentEl.innerHTML = marked.parse(markdown, {breaks: true});
                    }
                }
                el.addEventListener('click', function(e) {
                    if (e.target.tagName === 'BUTTON') return;
                    showKbReport(this);
                });
            });

            var currentAnalysisKbId = null;
            var currentAnalysisEventSource = null;

            function startKbAnalysis(kbId, kbName) {
                currentAnalysisKbId = kbId;
                document.getElementById('analysisKbName').textContent = kbName;
                document.getElementById('analysisPrompt').value = '';
                document.getElementById('analysisResult').style.display = 'none';
                document.getElementById('analysisResult').innerHTML = '';
                document.getElementById('analysisBtn').disabled = false;
                document.getElementById('analysisBtn').textContent = '🚀 开始生成';
                document.getElementById('analysisModal').classList.add('active');
            }

            async function runKbAnalysis() {
                if (!currentAnalysisKbId) return;
                var btn = document.getElementById('analysisBtn');
                var resultDiv = document.getElementById('analysisResult');

                btn.disabled = true;
                btn.textContent = '⏳ 生成中...';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<div style="text-align:center;color:#909296;padding:20px;">AI 正在生成综合日报...</div>';

                try {
                    var resp = await fetch('/kb/' + currentAnalysisKbId + '/api/generate', { method: 'POST' });
                    var data = await resp.json();
                    if (data.ok && data.report) {
                        resultDiv.innerHTML = marked.parse(data.report, {breaks: true});
                        btn.textContent = '✅ 生成完成';
                        setTimeout(function() { location.reload(); }, 1500);
                    } else {
                        resultDiv.innerHTML = '<div style="color:#e03131;">' + (data.error || '生成失败') + '</div>';
                        btn.disabled = false;
                        btn.textContent = '🚀 重新生成';
                    }
                } catch(e) {
                    resultDiv.innerHTML = '<div style="color:#e03131;">请求失败: ' + e.message + '</div>';
                    btn.disabled = false;
                    btn.textContent = '🚀 重新生成';
                }
            }

            // ====== 弹窗通用 ======
            function closeModal(id) { document.getElementById(id).classList.remove('active'); }
            document.querySelectorAll('.modal-overlay').forEach(function(m) {
                m.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
            });
            function closeKbModal() { closeModal('kbModal'); }

            // ====== 刷新笔记库列表 ======
            function refreshKbList() { location.reload(); }

            // ====== 添加弹窗 ======
            function showAddKbModal() {
                document.getElementById('kbModalTitle').textContent = '添加笔记库';
                document.getElementById('kbEditId').value = '';
                document.getElementById('kbName').value = '';
                document.getElementById('kbNotesDir').value = '';
                document.getElementById('kbLabelTasks').value = '任务';
                document.getElementById('kbLabelReminders').value = '提醒';
                document.getElementById('kbLabelNotes').value = '笔记';
                document.getElementById('kbLabelConfig').value = '配置';
                document.getElementById('kbModal').classList.add('active');
                setTimeout(function(){ document.getElementById('kbName').focus(); }, 100);
            }

            // ====== 编辑弹窗 ======
            function showEditKbModal(btn) {
                var card = btn.closest('.kb-card');
                var name = card.querySelector('.kb-name span').textContent;
                var path = card.querySelector('.kb-path').textContent;
                var kbId = card.dataset.kbId;

                document.getElementById('kbModalTitle').textContent = '编辑笔记库';
                document.getElementById('kbEditId').value = kbId;
                document.getElementById('kbName').value = name;
                document.getElementById('kbNotesDir').value = path;
                // Load labels from data attribute / API
                var kb = kbList.find(function(k) { return k.id == kbId; });
                if (kb && kb.labels) {
                    try {
                        var labels = typeof kb.labels === 'string' ? JSON.parse(kb.labels) : kb.labels;
                        document.getElementById('kbLabelTasks').value = labels.tasks || '任务';
                        document.getElementById('kbLabelReminders').value = labels.reminders || '提醒';
                        document.getElementById('kbLabelNotes').value = labels.notes || '笔记';
                        document.getElementById('kbLabelConfig').value = labels.config || '配置';
                    } catch(e) {}
                } else {
                    document.getElementById('kbLabelTasks').value = '任务';
                    document.getElementById('kbLabelReminders').value = '提醒';
                    document.getElementById('kbLabelNotes').value = '笔记';
                    document.getElementById('kbLabelConfig').value = '配置';
                }
                document.getElementById('kbModal').classList.add('active');
            }

            // ====== 提交保存 ======
            async function submitKb() {
                var name = document.getElementById('kbName').value.trim();
                var notesDir = document.getElementById('kbNotesDir').value.trim();
                if (!name || !notesDir) { toast('名称和路径不能为空', 'error'); return; }

                var editId = document.getElementById('kbEditId').value;
                var labels = {
                    tasks: document.getElementById('kbLabelTasks').value.trim() || '任务',
                    reminders: document.getElementById('kbLabelReminders').value.trim() || '提醒',
                    notes: document.getElementById('kbLabelNotes').value.trim() || '笔记',
                    config: document.getElementById('kbLabelConfig').value.trim() || '配置'
                };
                var body = { name: name, notesDir: notesDir, labels: JSON.stringify(labels) };
                if (editId) body.id = editId;

                try {
                    var r = await fetch('/api/kb/save', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
                    });
                    var d = await r.json();
                    if (d.ok) {
                        toast(editId ? '✅ 笔记库已更新' : '✅ 笔记库已添加');
                        closeKbModal();
                        location.reload();
                    } else {
                        toast('❌ ' + (d.error || '保存失败'), 'error');
                    }
                } catch(e) { toast('❌ 请求失败: ' + e.message, 'error'); }
            }

            // ====== 删除 ======
            function deleteKb(btn) {
                var card = btn.closest('.kb-card');
                var name = card.querySelector('.kb-name span').textContent;
                var kbId = card.dataset.kbId;
                document.getElementById('deleteKbId').value = kbId;
                document.getElementById('deleteKbText').textContent = '确定删除笔记库「' + name + '」？相关聊天记录和配置不会被删除，仅移除笔记库配置。';
                document.getElementById('deleteKbModal').classList.add('active');
            }

            async function confirmDeleteKb() {
                var id = document.getElementById('deleteKbId').value;
                try {
                    var r = await fetch('/api/kb/' + id, { method: 'DELETE' });
                    var d = await r.json();
                    if (d.ok) {
                        toast('🗑️ 笔记库已删除');
                        closeModal('deleteKbModal');
                        location.reload();
                    } else {
                        toast('❌ ' + (d.error || '删除失败'), 'error');
                    }
                } catch(e) { toast('❌ 请求失败: ' + e.message, 'error'); }
            }
        </script>
    </div>
</body>
</html>
