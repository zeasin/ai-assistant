<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>长期记忆 - AI 助理</title>
    <style>
        .memory-card {
            background: #fff; border: 1px solid #e1e3e6; border-radius: 10px;
            padding: 16px; margin-bottom: 10px; transition: all .15s;
        }
        .memory-card:hover { border-color: #7c5cfc; box-shadow: 0 2px 8px rgba(124,92,252,0.08); }
        .memory-card .meta {
            font-size: 11px; color: #909296; display: flex; gap: 12px; margin-bottom: 6px;
        }
        .memory-card .meta .tag {
            background: #f0edff; color: #5c3dcf; padding: 1px 6px; border-radius: 4px;
        }
        .memory-card .content {
            font-size: 14px; line-height: 1.6; color: #1a1b1e; margin-bottom: 8px;
        }
        .memory-card .actions { display: flex; gap: 6px; justify-content: flex-end; }
        .memory-card .actions button {
            border: none; background: #f5f5f7; padding: 4px 10px; border-radius: 6px;
            font-size: 12px; cursor: pointer; color: #5c5f66; transition: all .15s;
        }
        .memory-card .actions button:hover { background: #ffe0e0; color: #c92a2a; }

        .search-bar {
            display: flex; gap: 8px; margin-bottom: 16px;
        }
        .search-bar input {
            flex: 1; padding: 10px 14px; border: 1px solid #e1e3e6; border-radius: 8px;
            font-size: 14px; outline: none; background: #fff; color: #1a1b1e;
        }
        .search-bar input:focus { border-color: #7c5cfc; }

        .stats-bar {
            display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .stats-bar .stat {
            background: #fff; border: 1px solid #e1e3e6; border-radius: 8px;
            padding: 12px 16px; flex: 1; min-width: 100px;
        }
        .stats-bar .stat .label { font-size: 11px; color: #5c5f66; }
        .stats-bar .stat .value { font-size: 20px; font-weight: 600; margin-top: 4px; color: #1a1b1e; }

        .empty-state {
            text-align: center; padding: 60px 20px; color: #909296;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="flex" style="justify-content:space-between;margin-bottom:16px;">
        <h2 style="font-size:18px;">🧠 长期记忆</h2>
        <div class="flex">
            <button class="btn btn-secondary" onclick="toggleRemember()">➕ 添加记忆</button>
            <button class="btn btn-danger" onclick="forgetAll()">🗑️ 全部遗忘</button>
        </div>
    </div>

    <!-- 统计 -->
    <div class="stats-bar">
        <div class="stat">
            <div class="label">总记忆</div>
            <div class="value" id="totalCount" th:text="${total}">0</div>
        </div>
        <div class="stat">
            <div class="label">搜索耗时</div>
            <div class="value" id="searchTime" style="font-size:14px;">-</div>
        </div>
    </div>

    <!-- 搜索 -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜索记忆..." onkeyup="if(event.key==='Enter') searchMemories()">
        <button class="btn btn-primary" onclick="searchMemories()">🔍 搜索</button>
        <button class="btn btn-secondary" onclick="clearSearch()">清除</button>
    </div>

    <!-- 添加区域 -->
    <div id="rememberForm" style="display:none;" class="card">
        <h2>📝 添加记忆</h2>
        <div class="modal" style="box-shadow:none;padding:0;max-width:100%;width:100%;">
            <div class="form-group" style="margin-bottom:12px;">
                <label>记忆内容</label>
                <textarea id="newContent" rows="3" style="padding:8px 10px;border:1px solid #e1e3e6;border-radius:6px;font-size:13px;width:100%;outline:none;" placeholder="例如：张三的电话是 138xxxxx"></textarea>
            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <label>标签（逗号分隔）</label>
                <input id="newTags" style="padding:8px 10px;border:1px solid #e1e3e6;border-radius:6px;font-size:13px;width:100%;outline:none;" placeholder="例如：客户,电话">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="toggleRemember()">取消</button>
                <button class="btn btn-primary" onclick="saveMemory()">保存</button>
            </div>
        </div>
    </div>

    <!-- 记忆列表 -->
    <div id="memoryList">
        <div th:if="${#lists.isEmpty(memories)}" class="empty-state">
            <div class="icon">🧠</div>
            <p>还没有记忆。在飞书对话中说「记住...」或点击上方按钮添加。</p>
        </div>
        <div th:each="m : ${memories}" class="memory-card" th:id="'memory-' + ${m.id}">
            <div class="meta">
                <span th:text="${m.createdAt}">2026-06-10</span>
                <span th:text="${m.source}">user</span>
                <span class="tag" th:if="${m.tags != null and m.tags != '[]'}" th:text="${m.tags}">[标签]</span>
            </div>
            <div class="content" th:text="${m.content}">记忆内容</div>
            <div class="actions">
                <button th:attr="data-id=${m.id}" onclick="forget(this.dataset.id)">🗑️ 遗忘</button>
            </div>
        </div>
    </div>

<script>
    function toggleRemember() {
        const form = document.getElementById('rememberForm');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    function saveMemory() {
        const content = document.getElementById('newContent').value.trim();
        if (!content) { toast('请输入记忆内容', 'error'); return; }
        const tags = document.getElementById('newTags').value.trim();
        const params = new URLSearchParams();
        params.append('content', content);
        params.append('source', 'user');
        if (tags) tags.split(',').forEach(t => params.append('tags', t.trim()));

        fetch('/memory/api/remember', { method: 'POST', body: params })
            .then(r => r.json()).then(d => {
                if (d.ok) {
                    toast('✅ 已记住', 'success');
                    toggleRemember();
                    document.getElementById('newContent').value = '';
                    document.getElementById('newTags').value = '';
                    refreshList();
                } else {
                    toast('❌ 保存失败', 'error');
                }
            }).catch(() => toast('❌ 请求失败', 'error'));
    }

    function searchMemories() {
        const q = document.getElementById('searchInput').value.trim();
        const start = performance.now();
        if (!q) { refreshList(); return; }

        fetch('/memory/api/search?q=' + encodeURIComponent(q) + '&topK=50')
            .then(r => r.json()).then(d => {
                const elapsed = ((performance.now() - start) / 1000).toFixed(2);
                document.getElementById('searchTime').textContent = elapsed + 's';
                renderList(d.data || []);
            }).catch(() => toast('❌ 搜索失败', 'error'));
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('searchTime').textContent = '-';
        refreshList();
    }

    function refreshList() {
        fetch('/memory/api/list').then(r => r.json()).then(d => {
            document.getElementById('totalCount').textContent = d.total || 0;
            renderList(d.data || []);
        });
    }

    function renderList(items) {
        const container = document.getElementById('memoryList');
        if (!items.length) {
            container.innerHTML = '<div class="empty-state"><div class="icon">🧠</div><p>无匹配结果</p></div>';
            return;
        }
        container.innerHTML = items.map(m => `
            <div class="memory-card" id="memory-${m.id}">
                <div class="meta">
                    <span>${m.createdAt || ''}</span>
                    <span>${m.source || ''}</span>
                    ${(m.tags && m.tags !== '[]') ? `<span class="tag">${m.tags}</span>` : ''}
                </div>
                <div class="content">${escapeHtml(m.content || '')}</div>
                <div class="actions">
                    <button onclick="forget(${m.id})">\u{1F5D1}️ 遗忘</button>
                </div>
            </div>
        `).join('');
    }

    function forget(id) {
        if (!confirm('确定遗忘这条记忆？')) return;
        fetch('/memory/api/forget/' + id, { method: 'DELETE' })
            .then(r => r.json()).then(d => {
                if (d.ok) { toast('✅ 已遗忘', 'success'); refreshList(); }
                else { toast('❌ 操作失败', 'error'); }
            }).catch(() => toast('❌ 请求失败', 'error'));
    }

    function forgetAll() {
        if (!confirm('确定清除所有记忆？此操作不可撤销！')) return;
        fetch('/memory/api/forgetAll', { method: 'DELETE' })
            .then(r => r.json()).then(d => {
                if (d.ok) { toast('✅ 已全部遗忘', 'success'); refreshList(); }
                else { toast('❌ 操作失败', 'error'); }
            }).catch(() => toast('❌ 请求失败', 'error'));
    }

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }
</script>
</div>
</body>
</html>
