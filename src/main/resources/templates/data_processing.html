<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <style>
        .data-tabs { display:flex; gap:0; border-bottom:2px solid #e1e3e6; margin-bottom:20px; background:#fff; border-radius:12px 12px 0 0; padding:0 20px; }
        .data-tab { padding:12px 20px; font-size:14px; cursor:pointer; transition:all .15s; border:none; background:transparent; color:#5c5f66; border-bottom:2px solid transparent; margin-bottom:-2px; font-weight:500; }
        .data-tab:hover { color:#1a1b1e; background:#f5f5f7; border-radius:6px 6px 0 0; }
        .data-tab.active { color:#7c5cfc; border-bottom-color:#7c5cfc; font-weight:600; }

        .dc-layout { display:flex; gap:0; height:calc(100vh - 200px); overflow:hidden; background:#fff; border:1px solid #e1e3e6; border-radius:12px; }
        .dc-sidebar { width:260px; min-width:260px; border-right:1px solid #e1e3e6; display:flex; flex-direction:column; background:#fafbfc; }
        .dc-sidebar-header { padding:14px 16px; border-bottom:1px solid #e1e3e6; display:flex; justify-content:space-between; align-items:center; }
        .dc-sidebar-header h2 { font-size:15px; font-weight:600; margin:0; }
        .dc-ds-list { flex:1; overflow-y:auto; padding:4px 0; }
        .dc-ds-item { display:flex; align-items:center; padding:10px 14px; cursor:pointer; transition:all .1s; gap:8px; border-left:3px solid transparent; }
        .dc-ds-item:hover { background:#f0edff; }
        .dc-ds-item.active { background:#f0edff; border-left-color:#7c5cfc; }
        .dc-ds-item .icon { font-size:16px; flex-shrink:0; }
        .dc-ds-item .info { flex:1; min-width:0; }
        .dc-ds-item .name { font-size:13px; font-weight:500; display:block; }
        .dc-ds-item .meta { font-size:11px; color:#909296; }

        .dc-main { flex:1; display:flex; flex-direction:column; min-width:0; }
        .dc-header { padding:14px 20px; border-bottom:1px solid #e1e3e6; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
        .dc-header-left h2 { margin:0; font-size:16px; font-weight:600; }
        .dc-header-left .desc { font-size:12px; color:#909296; margin-top:2px; }
        .dc-header-actions { display:flex; gap:6px; flex-wrap:wrap; }
        .dc-content { flex:1; overflow-y:auto; padding:14px 20px; }

        .dc-empty { text-align:center; color:#909296; padding:60px; font-size:14px; }
        .dc-empty .icon { font-size:40px; margin-bottom:8px; }

        .dc-search-bar { display:flex; gap:8px; margin-bottom:12px; }
        .dc-search-bar input { flex:1; padding:7px 12px; border:1px solid #e1e3e6; border-radius:6px; font-size:13px; outline:none; }
        .dc-search-bar input:focus { border-color:#7c5cfc; }

        .dc-table-wrap { overflow-x:auto; }
        .dc-table { width:100%; border-collapse:collapse; font-size:13px; }
        .dc-table th { text-align:left; padding:8px 12px; border-bottom:2px solid #e1e3e6; color:#5c5f66; font-weight:600; font-size:12px; background:#fafbfc; white-space:nowrap; }
        .dc-table td { padding:7px 12px; border-bottom:1px solid #f0f0f0; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .dc-table tr:hover td { background:#fafafe; }

        .badge { padding:2px 8px; border-radius:4px; font-size:11px; }
        .badge-purple { background:#e8dff5; color:#7c5cfc; }
        .badge-gray { background:#f0f0f0; color:#909296; }
        .badge-green { background:#d3f9d8; color:#2b8a3e; }

        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; justify-content:center; align-items:center; }
        .modal-overlay.active { display:flex; }
        .modal { background:#fff; border-radius:12px; padding:24px; width:640px; max-width:92vw; max-height:88vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.15); }
        .modal h3 { font-size:16px; margin:0 0 16px; }
        .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; padding-top:12px; border-top:1px solid #e1e3e6; }

        .btn { padding:6px 14px; border-radius:6px; font-size:13px; cursor:pointer; border:1px solid #e1e3e6; background:#fff; color:#5c5f66; transition:all .15s; }
        .btn:hover { border-color:#7c5cfc; color:#7c5cfc; }
        .btn-primary { background:#7c5cfc; color:#fff; border-color:#7c5cfc; }
        .btn-primary:hover { background:#6a4ae0; border-color:#6a4ae0; color:#fff; }
        .btn-sm { padding:4px 10px; font-size:12px; }
        .btn-danger { color:#d32f2f; border-color:#ffcdd2; }
        .btn-danger:hover { background:#ffebee; border-color:#d32f2f; }

        .toast-box { position:fixed; top:20px; right:20px; z-index:10001; }
        .toast-item { background:#333; color:#fff; padding:10px 18px; border-radius:8px; margin-bottom:8px; font-size:13px; }
        .toast-item.success { background:#27ae60; }
        .toast-item.error { background:#e74c3c; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h1 style="font-size:22px;font-weight:600;margin:0;">📋 数据加工</h1>
        <a href="/tools" style="font-size:13px;color:#7c5cfc;text-decoration:none;">🧰 工具箱</a>
    </div>

    <div class="dc-layout">
        <!-- 左侧：数据集列表 -->
        <div class="dc-sidebar">
            <div class="dc-sidebar-header">
                <h2>📦 数据集</h2>
                <button class="btn btn-primary btn-sm" onclick="showCreateDataset()">+ 新建</button>
            </div>
            <div class="dc-ds-list" id="dsSidebarList">
                <div class="dc-empty" style="padding:30px;">加载中...</div>
            </div>
        </div>

        <!-- 右侧：选中数据集的详情 + 数据 -->
        <div class="dc-main" id="dsMainPanel">
            <div class="dc-empty" style="padding:80px;">
                <div class="icon">📦</div>
                <p>从左侧选择一个数据集</p>
            </div>
        </div>
    </div>

    <!-- Create/Edit Dataset Modal -->
    <div class="modal-overlay" id="datasetModal">
        <div class="modal" style="width:600px;">
            <h3 id="dsModalTitle">新建数据集</h3>
            <form id="datasetForm" onsubmit="return saveDataset(event)">
                <input type="hidden" id="dsId">
                <div style="display:flex;flex-direction:column;gap:12px;">
                    <div>
                        <label style="font-size:12px;color:#5c5f66;font-weight:500;display:block;margin-bottom:4px;">数据集名称 *</label>
                        <input type="text" id="dsName" required placeholder="例如：CSDN文章数据" style="width:100%;padding:8px 10px;border:1px solid #e1e3e6;border-radius:6px;font-size:13px;box-sizing:border-box;">
                    </div>
                    <div>
                        <label style="font-size:12px;color:#5c5f66;font-weight:500;display:block;margin-bottom:4px;">描述</label>
                        <textarea id="dsDescription" rows="2" placeholder="数据集用途说明" style="width:100%;padding:8px 10px;border:1px solid #e1e3e6;border-radius:6px;font-size:13px;box-sizing:border-box;resize:vertical;"></textarea>
                    </div>
                    <div>
                        <label style="font-size:12px;color:#5c5f66;font-weight:500;display:block;margin-bottom:4px;">存储目录</label>
                        <input type="text" id="dsOutputDir" placeholder="相对于笔记库根目录（可选）" style="width:100%;padding:8px 10px;border:1px solid #e1e3e6;border-radius:6px;font-size:13px;box-sizing:border-box;">
                    </div>
                    <div>
                        <label style="font-size:12px;color:#5c5f66;font-weight:500;display:block;margin-bottom:4px;">Schema字段定义</label>
                        <div id="schemaFields" style="display:flex;flex-direction:column;gap:6px;"></div>
                        <button type="button" class="btn btn-sm" style="margin-top:6px;" onclick="addSchemaField()">+ 添加字段</button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn" onclick="closeModal('datasetModal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Export Modal -->
    <div class="modal-overlay" id="exportModal">
        <div class="modal" style="width:650px;">
            <h3>导出到业务目录</h3>
            <div style="display:flex;flex-direction:column;gap:12px;">
                <div>
                    <label style="font-size:12px;color:#5c5f66;font-weight:500;display:block;margin-bottom:4px;">目标模块 *</label>
                    <select id="exportModuleId" style="width:100%;padding:8px 10px;border:1px solid #e1e3e6;border-radius:6px;font-size:13px;"></select>
                </div>
                <div>
                    <label style="font-size:12px;color:#5c5f66;font-weight:500;display:block;margin-bottom:4px;">导出范围</label>
                    <select id="exportScope" style="width:100%;padding:8px 10px;border:1px solid #e1e3e6;border-radius:6px;font-size:13px;">
                        <option value="all">全部数据</option>
                        <option value="filtered">当前筛选结果</option>
                        <option value="selected">已选中的记录</option>
                    </select>
                </div>
                <div>
                    <label style="font-size:12px;color:#5c5f66;font-weight:500;display:block;margin-bottom:4px;">AI转换提示词</label>
                    <textarea id="exportPrompt" rows="4" style="width:100%;padding:8px 10px;border:1px solid #e1e3e6;border-radius:6px;font-size:13px;box-sizing:border-box;resize:vertical;">请将以下数据转换为业务数据格式。参考现有业务数据格式样例，将待导出数据转换为相同格式。直接输出JSON数组，用 ```json 包裹。</textarea>
                </div>
            </div>
            <div style="font-size:12px;color:#5c5f66;margin-bottom:12px;margin-top:8px;">AI会读取目标模块目录下的现有数据文件作为格式参考，然后将选中数据转换为相同格式后保存。</div>
            <div class="modal-actions">
                <button type="button" class="btn" onclick="closeModal('exportModal')">取消</button>
                <button type="button" class="btn btn-primary" id="exportBtn" onclick="executeExport()">AI转换并导出</button>
            </div>
        </div>
    </div>

    <div class="toast-box" id="toastBox"></div>

    <script>
    let allDatasets = [];
    let currentDsId = null;
    let selectedRecordIds = [];

    // ========== 加载 ==========
    async function loadDatasets() {
        try {
            const res = await fetch('/api/datacenter/datasets');
            const data = await res.json();
            if (data.ok) {
                allDatasets = data.data || [];
                renderSidebar();
                if (currentDsId && allDatasets.find(d => d.id === currentDsId)) {
                    selectDataset(currentDsId);
                }
            }
        } catch (e) {
            document.getElementById('dsSidebarList').innerHTML = '<div class="dc-empty" style="padding:30px;">⚠️ 加载失败</div>';
        }
    }

    function renderSidebar() {
        const container = document.getElementById('dsSidebarList');
        if (!allDatasets || allDatasets.length === 0) {
            container.innerHTML = '<div class="dc-empty" style="padding:30px;"><div class="icon">📭</div><p>暂无数据集</p></div>';
            return;
        }
        let html = '';
        for (let i = 0; i < allDatasets.length; i++) {
            const ds = allDatasets[i];
            const active = ds.id === currentDsId ? ' active' : '';
            html += '<div class="dc-ds-item' + active + '" onclick="selectDataset(\'' + ds.id + '\')" data-id="' + ds.id + '">';
            html += '<span class="icon">📦</span>';
            html += '<div class="info"><span class="name">' + esc(ds.name) + '</span>';
            html += '<span class="meta">' + (ds.recordCount || 0) + '条记录' + (ds.lastImportTime ? ' · ' + ds.lastImportTime : '') + '</span></div>';
            html += '</div>';
        }
        container.innerHTML = html;
    }

    // ========== 选中数据集 ==========
    async function selectDataset(id) {
        currentDsId = id;
        document.querySelectorAll('.dc-ds-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
        const main = document.getElementById('dsMainPanel');
        main.innerHTML = '<div class="dc-empty" style="padding:40px;">⏳ 加载中...</div>';

        try {
            const res = await fetch('/api/datacenter/datasets/' + id);
            const data = await res.json();
            if (!data.ok) { main.innerHTML = '<div class="dc-empty">加载失败</div>'; return; }
            const ds = data.data;
            renderDsDetail(ds);
            loadRecords(id, '');
        } catch (e) {
            main.innerHTML = '<div class="dc-empty">加载失败</div>';
        }
    }

    function renderDsDetail(ds) {
        const main = document.getElementById('dsMainPanel');
        let schemaHtml = '';
        if (ds.schema && ds.schema.fields && ds.schema.fields.length > 0) {
            schemaHtml = ds.schema.fields.map(f => esc(f.displayName || f.name)).join(' · ');
        }

        main.innerHTML = ''
            + '<div class="dc-header">'
            + '  <div class="dc-header-left">'
            + '    <h2>' + esc(ds.name) + '</h2>'
            + '    <div class="desc">' + (ds.description ? esc(ds.description) : '无描述') + ' · ' + (ds.recordCount || 0) + '条记录'
            + (schemaHtml ? ' · Schema: ' + schemaHtml : '') + '</div>'
            + '  </div>'
            + '  <div class="dc-header-actions">'
            + '    <button class="btn btn-sm" onclick="showExportForCurrent()">📤 导出</button>'
            + '    <button class="btn btn-sm" onclick="editDataset(\'' + ds.id + '\')">✏️ 编辑</button>'
            + '    <button class="btn btn-sm btn-danger" onclick="deleteDataset(\'' + ds.id + '\')">🗑️ 删除</button>'
            + '  </div>'
            + '</div>'
            + '<div class="dc-content">'
            + '  <div class="dc-search-bar">'
            + '    <input type="text" id="recordSearchInput" placeholder="搜索记录..." onkeydown="if(event.key===\'Enter\')doSearch()">'
            + '    <button class="btn btn-sm" onclick="doSearch()">🔍 搜索</button>'
            + '  </div>'
            + '  <div id="recordTableContainer"><div class="dc-empty" style="padding:30px;">⏳ 加载数据...</div></div>'
            + '</div>';

        document.getElementById('recordSearchInput').focus();
    }

    // ========== 搜索 ==========
    let searchKeyword = '';
    function doSearch() {
        searchKeyword = document.getElementById('recordSearchInput').value.trim();
        loadRecords(currentDsId, searchKeyword);
    }

    // ========== 加载记录 ==========
    async function loadRecords(dsId, keyword) {
        const container = document.getElementById('recordTableContainer');
        container.innerHTML = '<div class="dc-empty" style="padding:30px;">⏳ 加载数据...</div>';
        try {
            let url = '/api/datacenter/datasets/' + dsId + '/records';
            if (keyword) url += '?keyword=' + encodeURIComponent(keyword);
            const res = await fetch(url);
            const data = await res.json();
            if (data.ok) {
                renderRecords(data.data, dsId);
            } else {
                container.innerHTML = '<div class="dc-empty">' + esc(data.error || '加载失败') + '</div>';
            }
        } catch (e) {
            container.innerHTML = '<div class="dc-empty">加载失败</div>';
        }
    }

    function renderRecords(records, dsId) {
        const container = document.getElementById('recordTableContainer');
        if (!records || records.length === 0) {
            container.innerHTML = '<div class="dc-empty" style="padding:30px;"><div class="icon">📭</div><p>暂无数据</p></div>';
            selectedRecordIds = [];
            return;
        }

        selectedRecordIds = [];
        const allKeys = new Set();
        records.forEach(r => { Object.keys(r).forEach(k => { if (!k.startsWith('_')) allKeys.add(k); }); });
        const cols = [...allKeys];

        let h = '<div style="font-size:12px;color:#5c5f66;margin-bottom:8px;display:flex;align-items:center;gap:12px;">';
        h += '<span>共 ' + records.length + ' 条记录</span>';
        h += '<label style="cursor:pointer;"><input type="checkbox" id="selectAllCb" onchange="toggleSelectAll(this)"> 全选</label>';
        h += '<span id="selectedCount" style="color:#7c5cfc;"></span></div>';

        h += '<div class="dc-table-wrap"><table class="dc-table"><thead><tr>';
        h += '<th style="width:30px;"><input type="checkbox" onchange="toggleSelectAll(this)"></th>';
        h += '<th style="width:50px;">#</th>';
        cols.forEach(c => { h += '<th>' + esc(c) + '</th>'; });
        h += '<th style="width:60px;">操作</th></tr></thead><tbody>';

        records.forEach(function(r, idx) {
            h += '<tr>';
            h += '<td><input type="checkbox" class="record-cb" data-id="' + esc(r._id || '') + '" onchange="updateSelectedCount()"></td>';
            h += '<td style="color:#909296;font-size:11px;">' + (idx + 1) + '</td>';
            cols.forEach(function(c) {
                const v = r[c];
                const text = v === null || v === undefined ? '' : String(v);
                h += '<td title="' + esc(text) + '">' + esc(text.length > 60 ? text.substring(0, 60) + '...' : text) + '</td>';
            });
            h += '<td><button class="btn btn-sm btn-danger" onclick="deleteRecord(\'' + dsId + '\',\'' + esc(r._id || '') + '\')" style="padding:2px 6px;font-size:11px;">删</button></td>';
            h += '</tr>';
        });
        h += '</tbody></table></div>';
        container.innerHTML = h;
    }

    function toggleSelectAll(cb) {
        document.querySelectorAll('.record-cb').forEach(c => { c.checked = cb.checked; });
        updateSelectedCount();
    }

    function updateSelectedCount() {
        selectedRecordIds = [];
        document.querySelectorAll('.record-cb:checked').forEach(c => { selectedRecordIds.push(c.dataset.id); });
        const el = document.getElementById('selectedCount');
        if (el) el.textContent = selectedRecordIds.length > 0 ? '已选 ' + selectedRecordIds.length + ' 条' : '';
    }

    // ========== 快速导入 ==========
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;gap:6px;align-items:center;';
        div.innerHTML = '<input type="text" placeholder="字段名" value="' + esc(name || '') + '" style="flex:2;padding:6px 8px;border:1px solid #e1e3e6;border-radius:4px;font-size:12px;" class="field-name">'
            + '<select class="field-type" style="flex:1;padding:6px 8px;border:1px solid #e1e3e6;border-radius:4px;font-size:12px;">'
            + '<option value="string"' + (type === 'string' ? ' selected' : '') + '>文本</option>'
            + '<option value="number"' + (type === 'number' ? ' selected' : '') + '>数字</option>'
            + '<option value="date"' + (type === 'date' ? ' selected' : '') + '>日期</option>'
            + '<option value="url"' + (type === 'url' ? ' selected' : '') + '>链接</option>'
            + '</select>'
            + '<input type="text" placeholder="显示名" value="' + esc(displayName || '') + '" style="flex:2;padding:6px 8px;border:1px solid #e1e3e6;border-radius:4px;font-size:12px;" class="field-display">'
            + '<button type="button" onclick="this.parentElement.remove()" style="background:#ffe0e0;color:#c92a2a;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:12px;">✕</button>';
        container.appendChild(div);
    }

    function getSchemaFields() {
        const fields = [];
        document.querySelectorAll('#schemaFields .schema-field').forEach(function(row) {
            const name = row.querySelector('.field-name').value.trim();
            if (name) fields.push({ name: name, type: row.querySelector('.field-type').value, displayName: row.querySelector('.field-display').value.trim() || name });
        });
        return fields;
    }

    async function editDataset(id) {
        try {
            const res = await fetch('/api/datacenter/datasets/' + id);
            const data = await res.json();
            if (!data.ok) { toast(data.error, 'error'); return; }
            const ds = data.data;
            document.getElementById('dsModalTitle').textContent = '编辑数据集';
            document.getElementById('dsId').value = ds.id;
            document.getElementById('dsName').value = ds.name;
            document.getElementById('dsDescription').value = ds.description || '';
            document.getElementById('dsOutputDir').value = ds.outputDir || '';
            document.getElementById('schemaFields').innerHTML = '';
            if (ds.schema && ds.schema.fields) ds.schema.fields.forEach(function(f) { addSchemaField(f.name, f.type, f.displayName); });
            if (!ds.schema || !ds.schema.fields || ds.schema.fields.length === 0) { addSchemaField(); }
            document.getElementById('datasetModal').classList.add('active');
        } catch (e) { toast('加载失败: ' + e.message, 'error'); }
    }

    async function saveDataset(e) {
        e.preventDefault();
        const id = document.getElementById('dsId').value;
        const ds = {
            name: document.getElementById('dsName').value,
            description: document.getElementById('dsDescription').value || null,
            outputDir: document.getElementById('dsOutputDir').value || null,
            schema: { fields: getSchemaFields() }
        };
        try {
            const url = id ? '/api/datacenter/datasets/' + id : '/api/datacenter/datasets';
            const method = id ? 'PUT' : 'POST';
            const res = await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(ds) });
            const data = await res.json();
            if (data.ok) {
                toast(id ? '✅ 数据集更新成功' : '✅ 数据集创建成功', 'success');
                closeModal('datasetModal');
                await loadDatasets();
                if (currentDsId) selectDataset(currentDsId);
            } else { toast(data.error || '操作失败', 'error'); }
        } catch (e) { toast('保存失败: ' + e.message, 'error'); }
    }

    async function deleteDataset(id) {
        if (!confirm('确定删除这个数据集吗？所有数据将被永久删除。')) return;
        try {
            const res = await fetch('/api/datacenter/datasets/' + id, { method: 'DELETE' });
            const data = await res.json();
            if (data.ok) {
                toast('✅ 数据集已删除', 'success');
                if (currentDsId === id) {
                    currentDsId = null;
                    document.getElementById('dsMainPanel').innerHTML = '<div class="dc-empty" style="padding:80px;"><div class="icon">📦</div><p>从左侧选择一个数据集</p></div>';
                }
                loadDatasets();
            } else { toast(data.error || '删除失败', 'error'); }
        } catch (e) { toast('删除失败: ' + e.message, 'error'); }
    }

    async function deleteRecord(dsId, recordId) {
        if (!confirm('确定删除这条记录？')) return;
        try {
            const res = await fetch('/api/datacenter/datasets/' + dsId + '/records/' + recordId, { method: 'DELETE' });
            const data = await res.json();
            if (data.ok) {
                toast('✅ 记录已删除', 'success');
                loadRecords(currentDsId, searchKeyword);
                loadDatasets();
            } else { toast(data.error || '删除失败', 'error'); }
        } catch (e) { toast('删除失败: ' + e.message, 'error'); }
    }

    // ========== 导出 ==========
    function showExportForCurrent() {
        if (!currentDsId) { toast('请先选择数据集', 'error'); return; }
        fetch('/api/datacenter/modules').then(function(r) { return r.json(); }).then(function(data) {
            if (data.ok && data.data) {
                const sel = document.getElementById('exportModuleId');
                sel.innerHTML = '<option value="">选择目标模块...</option>' + data.data.map(function(m) { return '<option value="' + m.id + '">' + esc(m.name) + ' (' + m.dir + ')</option>'; }).join('');
            }
        }).catch(function() {});
        document.getElementById('exportModal').classList.add('active');
    }

    async function executeExport() {
        if (!currentDsId) { toast('请先选择数据集', 'error'); return; }
        const moduleId = document.getElementById('exportModuleId').value;
        const scope = document.getElementById('exportScope').value;
        const prompt = document.getElementById('exportPrompt').value;
        if (!moduleId) { toast('请选择目标模块', 'error'); return; }

        const btn = document.getElementById('exportBtn');
        btn.disabled = true; btn.textContent = '⏳ AI转换中...';

        try {
            let recordIds = null;
            if (scope === 'selected' && selectedRecordIds.length > 0) recordIds = selectedRecordIds;
            const body = { dir: '', moduleId: moduleId, recordIds: recordIds, prompt: prompt || null };
            const res = await fetch('/api/datacenter/datasets/' + currentDsId + '/export', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            const data = await res.json();
            if (data.ok) { toast('✅ ' + data.message, 'success'); closeModal('exportModal'); }
            else { toast(data.error || '导出失败', 'error'); }
        } catch (e) { toast('导出失败: ' + e.message, 'error'); }
        finally { btn.disabled = false; btn.textContent = 'AI转换并导出'; }
    }

    // ========== 工具 ==========
    function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function toast(msg, type) {
        const box = document.getElementById('toastBox');
        const t = document.createElement('div');
        t.className = 'toast-item' + (type ? ' ' + type : '');
        t.textContent = msg;
        box.appendChild(t);
        setTimeout(function() { t.remove(); }, 3000);
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    document.querySelectorAll('.modal-overlay').forEach(function(m) {
        m.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            document.querySelectorAll('.modal-overlay').forEach(function(m) { m.classList.remove('active'); });
        }
    });

    loadDatasets();
    </script>
</div>
</body>
</html>
