<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${kb.name} + ' - 笔记目录'">笔记目录</title>
</head>
<body>
<th:block layout:fragment="content">

<th:block th:replace="~{kb_tab_bar :: kb-tabs('notes', ${kb}, ${labels})}" />

<!-- 目录列表视图 -->
<div th:if="${currentDir == null || currentDir.isEmpty()}">
    <div class="card">
        <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2 style="margin:0;">📂 笔记目录</h2>
            <button class="btn btn-secondary" id="editDirBtn" style="font-size:12px;">✏️ 编辑排序</button>
        </div>

        <div id="dirToolbar" style="display:none;margin-bottom:12px;padding:12px;background:#f9f9fb;border-radius:8px;">
            <div class="text-muted" style="font-size:12px;margin-bottom:8px;">拖拽排序，点击 👁️/👁️‍🗨️ 切换显示/隐藏</div>
            <button class="btn btn-primary" id="saveDirBtn" style="font-size:12px;">💾 保存排序</button>
        </div>

        <!-- 目录列表容器（由 JS 动态渲染） -->
        <div id="dirListContainer" style="min-height:80px;"></div>
    </div>
</div>

<!-- 目录详情视图 -->
<div th:if="${currentDir != null && !currentDir.isEmpty()}">
    <!-- 面包屑 -->
    <div style="margin-bottom:16px;font-size:13px;">
        <a th:href="@{/kb/{id}/notes(id=${kb.id})}" style="color:#7c5cfc;text-decoration:none;">📂 全部目录</a>
        <span style="color:#999;"> / </span>
        <span th:text="${currentDir}" style="font-weight:600;">当前目录</span>
    </div>

    <div style="display:flex;gap:20px;">
        <!-- 左侧：文件列表 -->
        <div style="flex:1;">
            <div class="card">
                <div class="flex" style="justify-content:space-between;align-items:center;">
                    <h2 th:text="'📁 ' + ${currentDir}" style="margin:0;">目录名</h2>
                    <button class="btn btn-primary" onclick="openAnalyzeModal()">🤖 AI 分析</button>
                </div>
                <div style="margin-top:12px;">
                    <div th:each="f : ${files}" style="padding:8px 0;border-bottom:1px solid #f0f0f0;">
                        <a th:if="${!f.is_dir}"
                           th:href="@{/kb/{id}/notes/view(path=${currentDir + '/' + f.name})}"
                           style="text-decoration:none;color:#333;">
                            <span>📄</span> <span th:text="${f.name}">文件名</span>
                        </a>
                        <a th:if="${f.is_dir}"
                           th:href="@{/kb/{id}/notes(dir=${currentDir + '/' + f.name}, id=${kb.id})}"
                           style="text-decoration:none;color:#333;">
                            <span>📁</span> <span th:text="${f.name}">目录名</span>
                        </a>
                        <span class="text-muted" style="font-size:12px;margin-left:8px;" th:text="${f.modified}"></span>
                    </div>
                    <div th:if="${files.isEmpty()}" class="text-muted" style="padding:20px;text-align:center;">
                        目录为空
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧：AI 分析结果 + 原始数据 -->
        <div style="flex:0 0 420px;">
            <!-- AI 分析报告 -->
            <div class="card" th:if="${latestReport != null}"
                 style="background:linear-gradient(135deg,#f0edff,#fafafe);border:1px solid #d9d0ff;margin-bottom:16px;">
                <h2 style="margin-bottom:8px;">📊 AI 分析报告</h2>
                <div class="report" th:utext="${latestReport}"></div>
            </div>

            <!-- 原始数据 (JSON) -->
            <div class="card" th:if="${jsonFiles != null && !jsonFiles.isEmpty()}">
                <h2 style="margin-bottom:8px;">📋 原始数据</h2>
                <div th:each="jf : ${jsonFiles}" style="padding:8px 0;border-bottom:1px solid #f0f0f0;">
                    <a href="#" th:attr="data-file=${jf.fileName}"
                       onclick="loadJsonData(this.getAttribute('data-file'));return false;"
                       style="text-decoration:none;color:#7c5cfc;font-weight:500;"
                       th:text="${jf.fileName}">文件名</a>
                    <span class="text-muted" style="font-size:11px;margin-left:6px;">.json</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- AI 分析弹窗 -->
<div id="analyzeModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
     background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;">
    <div style="background:#fff;border-radius:12px;padding:24px;width:90%;max-width:700px;max-height:80vh;overflow-y:auto;">
        <h3 style="margin:0 0 16px;">🤖 AI 分析 - <span id="analyzeDirName"></span></h3>
        <textarea id="analyzePrompt" rows="4" placeholder="输入分析提示词（可留空，AI 将自行决定分析内容）"
            style="width:100%;padding:10px;border:1px solid #e1e3e6;border-radius:8px;font-size:13px;
                   font-family:monospace;resize:vertical;box-sizing:border-box;"></textarea>
        <div id="analyzeResult" style="margin-top:12px;display:none;">
            <div style="max-height:400px;overflow-y:auto;padding:12px;background:#f9f9fb;border-radius:8px;"
                 id="analyzeResultContent"></div>
        </div>
        <div class="flex" style="gap:8px;margin-top:12px;justify-content:flex-end;">
            <button class="btn btn-secondary" onclick="closeAnalyzeModal()">取消</button>
            <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalysis()">🚀 开始分析</button>
        </div>
    </div>
</div>

<script>
var KB_ID = [[${kb.id}]];
var CURRENT_DIR = /*[[${currentDir}]]*/ '';
var dirData = [];
var isEditing = false;
var dragItem = null;

// ====== 加载目录数据 ======
function loadDirData() {
    var container = document.getElementById('dirListContainer');
    container.innerHTML = '<div class="text-muted" style="padding:20px;text-align:center;">⏳ 加载中...</div>';

    Promise.all([
        fetch('/kb/' + KB_ID + '/api/dirs').then(function(r) { return r.json(); }),
        fetch('/kb/' + KB_ID + '/api/dir-settings').then(function(r) { return r.json(); })
    ]).then(function(results) {
        var dirsRes = results[0];
        var settingsRes = results[1];
        if (!dirsRes.ok) { container.innerHTML = '<div class="text-muted" style="padding:40px;text-align:center;">加载失败</div>'; return; }

        var allDirs = dirsRes.dirs || [];
        var settings = settingsRes.ok ? (settingsRes.settings || {}) : {};
        var hidden = settings.hidden || [];
        var sort = settings.sort || [];

        var orderMap = {};
        sort.forEach(function(name, i) { orderMap[name] = i; });

        dirData = allDirs.map(function(name) {
            return { name: name, hidden: hidden.indexOf(name) !== -1, sortOrder: orderMap[name] !== undefined ? orderMap[name] : 999 };
        });
        dirData.sort(function(a, b) { return a.sortOrder - b.sortOrder; });

        renderDirs();
    }).catch(function() {
        container.innerHTML = '<div class="text-muted" style="padding:40px;text-align:center;">网络错误</div>';
    });
}

// ====== 渲染目录列表 ======
function renderDirs() {
    var container = document.getElementById('dirListContainer');
    if (!dirData.length) {
        container.innerHTML = '<div class="text-muted" style="padding:40px;text-align:center;">笔记库为空，请先添加笔记文件</div>';
        return;
    }
    if (isEditing) {
        renderEditMode(container);
    } else {
        renderNormalMode(container);
    }
}

function renderNormalMode(container) {
    var visible = dirData.filter(function(d) { return !d.hidden; });
    if (!visible.length) {
        container.innerHTML = '<div class="text-muted" style="padding:40px;text-align:center;">所有目录已隐藏，点击「编辑排序」可重新显示</div>';
        return;
    }
    var html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">';
    visible.forEach(function(d) {
        html += '<a href="/kb/' + KB_ID + '/notes?dir=' + encodeURIComponent(d.name) + '" class="dir-card" style="display:flex;align-items:center;gap:10px;padding:16px;background:#f5f6f8;border-radius:10px;text-decoration:none;color:inherit;transition:all .15s;">'
            + '<span style="font-size:24px;">📁</span>'
            + '<span style="font-size:14px;font-weight:500;">' + escapeHtml(d.name) + '</span>'
            + '</a>';
    });
    html += '</div>';
    container.innerHTML = html;
}

function renderEditMode(container) {
    var html = '';
    dirData.forEach(function(d) {
        var hiddenStyle = d.hidden ? 'opacity:0.5;background:#e8e8ed;' : '';
        var dragStyle = d._dragging ? 'opacity:0.4;transform:scale(0.98);' : '';
        html += '<div class="dir-item" data-dir="' + escapeHtml(d.name) + '" data-hidden="' + d.hidden + '" draggable="true"'
            + ' style="display:flex;align-items:center;gap:10px;padding:14px 16px;margin-bottom:6px;background:#fff;border:1px solid #e8eaed;border-radius:10px;transition:all .15s;cursor:default;' + hiddenStyle + dragStyle + '">'
            + '<span class="dir-handle" style="cursor:grab;color:#bbb;font-size:16px;user-select:none;" title="拖拽排序">⠿</span>'
            + '<span style="font-size:18px;">📁</span>'
            + '<span class="dir-name" style="font-size:14px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(d.name) + '</span>';
        if (d.hidden) {
            html += '<span style="font-size:11px;color:#909296;background:#e8e8ed;padding:2px 8px;border-radius:4px;">已隐藏</span>';
        }
        html += '<button class="dir-toggle-btn" data-dir="' + escapeHtml(d.name) + '" data-hidden="' + d.hidden + '"'
            + ' style="padding:4px 10px;font-size:12px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;transition:all .15s;"'
            + ' onmouseenter="this.style.background=\'#f0edff\'" onmouseleave="this.style.background=\'#fff\'">'
            + (d.hidden ? '👁️ 显示' : '👁️‍🗨️ 隐藏')
            + '</button>'
            + '<button class="dir-rename-btn" data-dir="' + escapeHtml(d.name) + '"'
            + ' style="padding:4px 10px;font-size:12px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;transition:all .15s;"'
            + ' onmouseenter="this.style.background=\'#fff3e0\'" onmouseleave="this.style.background=\'#fff\'"'
            + ' title="重命名">✏️</button>'
            + '<button class="dir-delete-btn" data-dir="' + escapeHtml(d.name) + '"'
            + ' style="padding:4px 10px;font-size:12px;border:1px solid #ffcdd2;border-radius:6px;background:#fff;color:#d32f2f;cursor:pointer;transition:all .15s;"'
            + ' onmouseenter="this.style.background=\'#ffebee\'" onmouseleave="this.style.background=\'#fff\'"'
            + ' title="删除">🗑️</button>'
            + '</div>';
    });
    container.innerHTML = html;
    setupDragDrop();
}

// ====== 编辑模式开关 ======
function toggleEditDirs() {
    isEditing = !isEditing;
    var toolbar = document.getElementById('dirToolbar');
    var btn = document.getElementById('editDirBtn');
    toolbar.style.display = isEditing ? 'block' : 'none';
    btn.textContent = isEditing ? '✕ 完成编辑' : '✏️ 编辑排序';
    btn.className = isEditing ? 'btn btn-secondary' : 'btn btn-secondary';
    renderDirs();
}

// ====== 切换隐藏/显示 ======
function toggleDir(name) {
    for (var i = 0; i < dirData.length; i++) {
        if (dirData[i].name === name) {
            dirData[i].hidden = !dirData[i].hidden;
            break;
        }
    }
    renderDirs();
}

// ====== 重命名目录 ======
function renameDir(oldName) {
    var newName = prompt('重命名目录', oldName);
    if (!newName || newName === oldName) return;
    newName = newName.trim();
    if (!newName) return;

    var exists = dirData.some(function(d) { return d.name === newName; });
    if (exists) { toast('❌ 目录名已存在'); return; }

    fetch('/kb/' + KB_ID + '/api/dir-rename', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({oldName: oldName, newName: newName})
    }).then(function(r) { return r.json(); })
      .then(function(data) {
          if (data.ok) {
              toast('✅ 重命名成功');
              loadDirData();
          } else {
              toast('❌ ' + (data.error || '重命名失败'));
          }
      });
}

// ====== 删除目录 ======
function deleteDir(name) {
    if (!confirm('确定要删除目录「' + name + '」吗？\n目录下的所有文件将被永久删除！')) return;

    fetch('/kb/' + KB_ID + '/api/dir-delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: name})
    }).then(function(r) { return r.json(); })
      .then(function(data) {
          if (data.ok) {
              toast('✅ 已删除');
              loadDirData();
          } else {
              toast('❌ ' + (data.error || '删除失败'));
          }
      });
}

// ====== 保存设置 ======
function saveDirSettings() {
    var items = document.querySelectorAll('.dir-item');
    var order = [];
    var hidden = [];
    items.forEach(function(el) {
        var d = el.getAttribute('data-dir');
        order.push(d);
        if (el.getAttribute('data-hidden') === 'true') {
            hidden.push(d);
        }
    });

    var btn = document.getElementById('saveDirBtn');
    btn.disabled = true;
    btn.textContent = '⏳ 保存中...';

    fetch('/kb/' + KB_ID + '/api/dir-settings', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({sort: order, hidden: hidden})
    }).then(function(r) { return r.json(); })
      .then(function(data) {
          btn.disabled = false;
          btn.textContent = '💾 保存排序';
          if (data.ok) {
              toast('✅ 已保存');
              isEditing = false;
              document.getElementById('dirToolbar').style.display = 'none';
              document.getElementById('editDirBtn').textContent = '✏️ 编辑排序';
              loadDirData();
          } else {
              toast('❌ 保存失败');
          }
      }).catch(function() {
          btn.disabled = false;
          btn.textContent = '💾 保存排序';
          toast('❌ 网络错误');
      });
}

// ====== 拖拽排序 ======
function setupDragDrop() {
    var container = document.getElementById('dirListContainer');
    if (!container) return;

    container.ondragstart = function(e) {
        var item = e.target.closest('.dir-item');
        if (!item) return;
        dragItem = item;
        item.style.opacity = '0.4';
        item.style.transform = 'scale(0.98)';
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', '');
    };

    container.ondragend = function(e) {
        if (dragItem) {
            dragItem.style.opacity = '1';
            dragItem.style.transform = '';
        }
        document.querySelectorAll('.dir-item').forEach(function(el) {
            el.style.borderTop = '';
            el.style.borderBottom = '';
        });
        dragItem = null;
    };

    container.ondragover = function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        var target = e.target.closest('.dir-item');
        if (!target || target === dragItem) return;

        document.querySelectorAll('.dir-item').forEach(function(el) {
            el.style.borderTop = '';
            el.style.borderBottom = '';
        });

        var rect = target.getBoundingClientRect();
        var midY = rect.top + rect.height / 2;
        if (e.clientY < midY) {
            target.style.borderTop = '2px solid #7c5cfc';
        } else {
            target.style.borderBottom = '2px solid #7c5cfc';
        }
    };

    container.ondrop = function(e) {
        e.preventDefault();
        var target = e.target.closest('.dir-item');
        if (!target || target === dragItem) return;

        var rect = target.getBoundingClientRect();
        var midY = rect.top + rect.height / 2;
        if (e.clientY < midY) {
            container.insertBefore(dragItem, target);
        } else {
            container.insertBefore(dragItem, target.nextSibling);
        }

        document.querySelectorAll('.dir-item').forEach(function(el) {
            el.style.borderTop = '';
            el.style.borderBottom = '';
        });
    };
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ====== AI 分析 ======
function openAnalyzeModal() {
    document.getElementById('analyzeDirName').textContent = CURRENT_DIR;
    document.getElementById('analyzePrompt').value = '';
    document.getElementById('analyzeResult').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('analyzeBtn').textContent = '🚀 开始分析';
    document.getElementById('analyzeModal').style.display = 'flex';
}

function closeAnalyzeModal() {
    document.getElementById('analyzeModal').style.display = 'none';
}

function startAnalysis() {
    var btn = document.getElementById('analyzeBtn');
    btn.disabled = true; btn.textContent = '⏳ 分析中...';
    var resultDiv = document.getElementById('analyzeResult');
    var resultContent = document.getElementById('analyzeResultContent');
    resultDiv.style.display = 'block';
    resultContent.innerHTML = '<span class="text-muted">AI 正在探索目录并分析内容...</span>';

    var prompt = document.getElementById('analyzePrompt').value;
    var url = '/kb/' + KB_ID + '/api/analyze-dir?dir=' + encodeURIComponent(CURRENT_DIR)
              + '&prompt=' + encodeURIComponent(prompt);

    var evtSource = new EventSource(url);
    evtSource.onmessage = function(e) {
        var data = JSON.parse(e.data);
        if (data.type === 'text') {
            resultContent.innerHTML = data.content.replace(/\n/g, '<br>');
            btn.textContent = '✅ 分析完成';
            setTimeout(function() { location.reload(); }, 1000);
        } else if (data.type === 'error') {
            resultContent.innerHTML = '<span style="color:red;">' + data.content + '</span>';
            btn.disabled = false; btn.textContent = '🚀 重新分析';
        } else if (data.type === 'done') {
            evtSource.close();
        }
    };
    evtSource.onerror = function() {
        evtSource.close();
        btn.disabled = false; btn.textContent = '🚀 重新分析';
    };
}

// JSON 数据管理
function loadJsonData(fileName) {
    fetch('/kb/' + KB_ID + '/api/data/read?dir=' + encodeURIComponent(CURRENT_DIR) + '&file=' + encodeURIComponent(fileName))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.ok) {
                var groups = data.data.groups;
                var html = '<h3>' + fileName + '</h3>';
                for (var g in groups) {
                    html += '<div style="margin:8px 0;"><strong>' + g + '</strong> (' + groups[g].count + ' 条)</div>';
                }
                document.getElementById('analyzeResultContent').innerHTML = html;
                document.getElementById('analyzeResult').style.display = 'block';
                document.getElementById('analyzeModal').style.display = 'flex';
            }
        });
}

// ====== 初始化 ======
document.addEventListener('DOMContentLoaded', function() {
    loadDirData();

    document.getElementById('editDirBtn').addEventListener('click', toggleEditDirs);
    document.getElementById('saveDirBtn').addEventListener('click', saveDirSettings);

    document.addEventListener('click', function(e) {
        var btn = e.target.closest('.dir-toggle-btn');
        if (btn) {
            toggleDir(btn.getAttribute('data-dir'));
            return;
        }
        var renameBtn = e.target.closest('.dir-rename-btn');
        if (renameBtn) {
            renameDir(renameBtn.getAttribute('data-dir'));
            return;
        }
        var deleteBtn = e.target.closest('.dir-delete-btn');
        if (deleteBtn) {
            deleteDir(deleteBtn.getAttribute('data-dir'));
            return;
        }
    });
});
</script>

</th:block>
</body>
</html>
