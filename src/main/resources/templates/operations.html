<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title layout:fragment="title">运营看板</title>
    <style>
        .data-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .data-header h4 {
            margin: 0;
        }
        .hidden-rows {
            display: none;
        }
        .col-settings-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .col-settings-popup {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            min-width: 260px;
            max-width: 400px;
            max-height: 80vh;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .col-settings-popup h3 {
            margin: 0 0 12px 0;
            font-size: 15px;
        }
        .col-settings-item {
            display: flex;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
        }
        .col-settings-item input[type="checkbox"] {
            margin-right: 8px;
        }
        .col-settings-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid #e1e3e6;
        }
        .col-settings-actions .btn {
            padding: 6px 16px;
            font-size: 13px;
        }
        .col-settings-btn {
            cursor: pointer;
            font-size: 14px;
            color: #909296;
            padding: 2px 6px;
            border-radius: 4px;
            background: none;
            border: none;
            margin-left: 8px;
        }
        .col-settings-btn:hover {
            color: #7c5cfc;
            background: #f0edff;
        }
    </style>
</head>
<body>
<th:block layout:fragment="content">

<div class="card">
    <h2>📊 自媒体运营看板</h2>
    <div class="text-muted mb-2">
        数据来源：<code>自媒体/data/</code> | 
        <span id="last-collect-time" class="text-muted">CSDN采集：加载中...</span>
        <button class="btn btn-secondary" style="margin-left:12px;padding:4px 12px;font-size:12px;" onclick="manualCollect()">🔄 手动采集</button>
    </div>
    <div class="flex" style="gap:8px;margin-top:12px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="showAddDailyStatsModal()">📊 公众号日统计</button>
        <button class="btn btn-primary" onclick="showAddArticleModal()">📝 添加文章</button>
        <button class="btn btn-primary" onclick="showSaveAccountModal()">📋 添加账号</button>
    </div>
</div>

<div class="card" id="config-card" style="display:none;text-align:center;padding:30px 20px;border:2px dashed #d9d0ff;background:#fafafe;">
    <div style="font-size:16px;font-weight:600;color:#7c5cfc;margin-bottom:8px;">📁 尚未配置运营数据目录</div>
    <div class="text-muted" style="margin-bottom:16px;">请在 <a href="/config" style="color:#7c5cfc;">配置页面</a> 中设置「运营数据目录」，程序将自动读取该目录下所有 JSON 文件。</div>
    <a href="/config" class="btn btn-primary">去配置</a>
</div>

<div class="card" style="background:linear-gradient(135deg,#f0edff,#fafafe);border:1px solid #d9d0ff;">
    <h2 style="margin-bottom:4px;">🤖 AI 运营分析报告</h2>
    <div class="text-muted mb-2" style="font-size:12px;">
        基于 <code>自媒体/data/(自动发现目录下所有 JSON 文件)</code> 实时生成 |
        最后更新：<span th:text="${last_updated}">未知</span>
        <span id="ai-analysis-elapsed" style="display:none;margin-left:8px;"></span>
    </div>
    <div id="ai-analysis-status" class="text-muted" style="padding:20px 0;text-align:center;">
        ⏳ 正在生成 AI 分析报告...
    </div>
    <div id="ai-analysis-result" class="report"></div>
    <div style="margin-top:12px;text-align:right;">
        <button id="ai-analyze-btn" class="btn btn-secondary" onclick="startAiAnalysis(true)" style="font-size:12px;">🔄 重新分析</button>
    </div>
</div>

<div id="raw-data-container" style="margin-bottom:16px;"></div>

</details>

<script>
const DATA_TYPE = 'operations';
let appData = null;
let columnSettings = {};

async function loadLastCollectTime() {
    try {
        const res = await fetch('/api/operations/last-collect');
        const data = await res.json();
        document.getElementById('last-collect-time').textContent = 'CSDN采集：' + (data.lastCollectTime || '从未采集');
    } catch (e) {
        document.getElementById('last-collect-time').textContent = 'CSDN采集：加载失败';
    }
}

async function manualCollect() {
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '⏳ 采集中...';
    try {
        const res = await fetch('/api/operations/collect', { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
            toast('✅ 采集完成');
            loadLastCollectTime();
            setTimeout(() => { window.location.reload(); }, 1000);
        } else {
            toast('❌ ' + (data.error || '采集失败'), 'error');
        }
    } catch (e) {
        toast('❌ 请求失败', 'error');
    }
    btn.disabled = false;
    btn.textContent = '🔄 手动采集';
}

document.addEventListener('DOMContentLoaded', function() {
    loadLastCollectTime();
});

// 检测并按照时间字段倒序排列
function compareByTime(a, b) {
    var timeField = null;
    var timeKeywords = ['时间', '日期', '创建时间', '更新时间', '发布时间', 'date', 'created', 'updated', 'timestamp', 'publish', 'lastContact'];
    for (var k = 0; k < timeKeywords.length; k++) {
        for (var key in a) {
            if (key.indexOf(timeKeywords[k]) !== -1) {
                timeField = key;
                break;
            }
        }
        if (timeField) break;
    }
    if (!timeField) {
        for (var key in a) {
            if (typeof a[key] === 'string' && /^\d{4}[-\/]\d{1,2}[-\/]\d/.test(a[key])) {
                timeField = key;
                break;
            }
        }
    }
    if (!timeField) return 0;
    var ta = a[timeField] || '';
    var tb = b[timeField] || '';
    return String(tb).localeCompare(String(ta));
}

async function loadOperationsData() {
    try {
        const response = await fetch('/api/data/list?type=' + DATA_TYPE + '&includeData=true');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const apiResult = await response.json();

        if (!apiResult.ok) {
            // 未配置数据目录时显示 config-card
            if (apiResult.error && apiResult.error.indexOf('未配置') !== -1) {
                document.getElementById('config-card').style.display = 'block';
            } else {
                document.getElementById('raw-data-container').innerHTML = '<div class="text-muted" style="padding:20px;text-align:center;">' + (apiResult.error || '暂无数据') + '</div>';
            }
            return;
        }

        if (apiResult.fileCount === 0) {
            document.getElementById('raw-data-container').innerHTML = '<div class="text-muted" style="padding:20px;text-align:center;">暂无数据</div>';
            return;
        }

        appData = { rawDataGroups: {}, tableColumns: {} };

        for (let fileData of apiResult.dataGroups) {
            let fileName = fileData.fileName;
            appData.rawDataGroups[fileName] = {};

            for (let groupKey in fileData.groups) {
                let groupInfo = fileData.groups[groupKey];
                if (groupInfo.type === 'array') {
                    let groupResp = await fetch('/api/data/group?type=' + DATA_TYPE + '&fileName=' + encodeURIComponent(fileName) + '&group=' + encodeURIComponent(groupKey));
                    let groupData = await groupResp.json();
                    if (groupData.ok && Array.isArray(groupData.data)) {
                        let entries = [];
                        for (let item of groupData.data) {
                            if (typeof item === 'object' && item !== null) entries.push(item);
                        }
                        entries.sort(compareByTime);
                        appData.rawDataGroups[fileName][groupKey] = entries;

                        let tableId = fileName + '_' + groupKey;
                        let colSet = new Set();
                        for (let row of entries) {
                            Object.keys(row).forEach(function(key) { colSet.add(key); });
                        }
                        appData.tableColumns[tableId] = Array.from(colSet);
                    }
                }
            }

            if (Object.keys(appData.rawDataGroups[fileName]).length === 0) {
                delete appData.rawDataGroups[fileName];
            }
        }

        // 加载列设置
        try {
            let settingsResp = await fetch('/api/data/column-settings?type=' + DATA_TYPE);
            if (settingsResp.ok) {
                let settingsData = await settingsResp.json();
                if (settingsData.ok && settingsData.settings) {
                    columnSettings = settingsData.settings;
                }
            }
        } catch (e) {
            console.warn('加载列设置失败:', e);
        }

        renderData();
    } catch (e) {
        console.error('加载运营数据失败:', e);
        document.getElementById('raw-data-container').innerHTML = '<div class="text-muted" style="padding:20px;text-align:center;">加载失败: ' + e.message + '</div>';
    }
}

function renderData() {
    const container = document.getElementById('raw-data-container');
    container.innerHTML = '';

    var hasData = false;
    for (let fileKey in appData.rawDataGroups) { hasData = true; break; }
    if (!hasData) {
        container.innerHTML = '<div class="text-muted" style="padding:20px;text-align:center;">暂无数据</div>';
        return;
    }

    let html = '<details style="background:#fff;border:1px solid #e1e3e6;border-radius:12px;padding:16px 20px;margin-bottom:16px;" open>' +
        '<summary style="cursor:pointer;font-size:14px;font-weight:600;color:#5c5f66;outline:none;">📁 原始数据详情</summary>' +
        '<div style="margin-top:12px;">'

    for (let fileKey in appData.rawDataGroups) {
        let fileGroups = appData.rawDataGroups[fileKey];
        html += '<div style="margin-bottom:20px;">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
        html += '<h3 style="margin:0;">' + fileKey + '</h3>';
        html += '<a href="/data-editor?type=operations&data=' + encodeURIComponent(fileKey) + '" class="btn btn-secondary" style="font-size:12px;">更多数据</a>';
        html += '</div>';

        for (let groupKey in fileGroups) {
            let rows = fileGroups[groupKey];
            let tableId = fileKey + '_' + groupKey;
            let allColumns = appData.tableColumns[tableId] || [];
            let savedCols = columnSettings[tableId];
            let columns = savedCols && savedCols.length > 0
                ? allColumns.filter(function(c) { return savedCols.indexOf(c) !== -1; })
                : allColumns;

            html += '<div class="card" style="margin-bottom:12px;">';
            html += '<div class="data-header"><h4>' + groupKey + '<button class="col-settings-btn" onclick="showColumnSettings(\'' + tableId + '\')" title="列设置">⚙️</button></h4></div>';
            html += '<div style="overflow-x:auto;">';
            html += '<table class="log-table" id="table_' + tableId + '">';
            html += '<thead><tr>';
            for (let col of columns) {
                html += '<th>' + col + '</th>';
            }
            html += '</tr></thead>';
            html += '<tbody>';
            for (let i = 0; i < rows.length; i++) {
                let row = rows[i];
                let rowClass = i >= 6 ? 'hidden-rows' : '';
                html += '<tr class="' + rowClass + '">';
                for (let col of columns) {
                    let val = row[col] != null ? row[col] : '—';
                    if (typeof val === 'object') {
                        val = JSON.stringify(val);
                    }
                    html += '<td>' + val + '</td>';
                }
                html += '</tr>';
            }
            if (rows.length === 0) {
                html += '<tr><td colspan="' + columns.length + '" style="text-align:center;color:#909296;">暂无数据</td></tr>';
            }
            html += '</tbody>';
            html += '</table>';

            if (rows.length > 6) {
                html += '<div style="text-align:center;padding:8px 0 4px;"><a href="#" onclick="toggleRows(\'table_' + tableId + '\', this);return false;" style="color:#7c5cfc;font-size:13px;text-decoration:none;">展开全部 ' + rows.length + ' 条 ▼</a></div>';
            }

            html += '</div></div>';
        }
        html += '</div>';
    }

    html += '</div></details>';
    container.innerHTML = html;
}

function toggleRows(tableId, link) {
    var table = document.getElementById(tableId);
    if (!table) return;
    var hidden = table.querySelectorAll('.hidden-rows');
    if (hidden.length > 0) {
        hidden.forEach(function(r) { r.classList.remove('hidden-rows'); });
        link.textContent = '收起 ▲';
    } else {
        var rows = table.querySelectorAll('tbody tr');
        for (var i = 6; i < rows.length; i++) {
            rows[i].classList.add('hidden-rows');
        }
        link.textContent = '展开全部 ' + rows.length + ' 条 ▼';
    }
}

function showColumnSettings(tableId) {
    var allColumns = appData.tableColumns[tableId] || [];
    if (allColumns.length === 0) return;

    var savedCols = columnSettings[tableId];
    var selected = savedCols && savedCols.length > 0
        ? savedCols.slice()
        : allColumns.slice();

    var popup = document.createElement('div');
    popup.className = 'col-settings-overlay';
    popup.onclick = function(e) { if (e.target === popup) popup.remove(); };

    var html = '<div class="col-settings-popup" onclick="event.stopPropagation();">';
    html += '<h3>选择要显示的列</h3>';
    html += '<div style="max-height:50vh;overflow-y:auto;">';
    for (var i = 0; i < allColumns.length; i++) {
        var col = allColumns[i];
        var checked = selected.indexOf(col) !== -1;
        html += '<label class="col-settings-item">';
        html += '<input type="checkbox" value="' + col.replace(/"/g, '&quot;') + '" ' + (checked ? 'checked' : '') + '>';
        html += col;
        html += '</label>';
    }
    html += '</div>';
    html += '<div class="col-settings-actions">';
    html += '<button class="btn btn-secondary" onclick="this.closest(\'.col-settings-overlay\').remove()">取消</button>';
    html += '<button class="btn btn-primary" onclick="saveColumnSettings(\'' + tableId + '\', this)">确认</button>';
    html += '</div></div>';

    popup.innerHTML = html;
    document.body.appendChild(popup);
}

async function saveColumnSettings(tableId, btn) {
    var popup = btn.closest('.col-settings-overlay');
    var checkboxes = popup.querySelectorAll('input[type="checkbox"]');
    var selected = [];
    for (var i = 0; i < checkboxes.length; i++) {
        if (checkboxes[i].checked) {
            selected.push(checkboxes[i].value);
        }
    }

    columnSettings[tableId] = selected;

    try {
        var resp = await fetch('/api/data/column-settings?type=' + DATA_TYPE, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(columnSettings)
        });
        var data = await resp.json();
        if (data.ok) {
            renderData();
        } else {
            alert('保存失败: ' + (data.error || '未知错误'));
        }
    } catch (e) {
        alert('保存失败: ' + e.message);
    }

    popup.remove();
}

var startTime;
function startAiAnalysis(force) {
    var btn = document.getElementById('ai-analyze-btn');
    var status = document.getElementById('ai-analysis-status');
    var result = document.getElementById('ai-analysis-result');
    var elapsed = document.getElementById('ai-analysis-elapsed');
    var url = '/api/operations/ai-analysis' + (force ? '?force=true' : '');

    btn.disabled = true;
    btn.textContent = '⏳ 分析中...';
    status.style.display = 'block';
    status.textContent = '⏳ AI 正在分析运营数据...';
    result.innerHTML = '';
    elapsed.style.display = 'none';
    startTime = Date.now();

    var eventSource = new EventSource(url);

    eventSource.onmessage = function(event) {
        try {
            var data = JSON.parse(event.data);
            if (data.type === 'status') {
                status.textContent = data.content;
            } else if (data.type === 'text') {
                status.style.display = 'none';
                result.innerHTML = marked.parse(data.content);
                var sec = Math.round((Date.now() - startTime) / 1000);
                elapsed.style.display = 'inline';
                elapsed.textContent = '⏱️ ' + sec + 's';
            } else if (data.type === 'error') {
                status.style.display = 'none';
                result.innerHTML = '<div style="color:#e03131;padding:20px;text-align:center;">❌ ' + data.content + '</div>';
            } else if (data.type === 'done') {
                eventSource.close();
                btn.disabled = false;
                btn.textContent = '🔄 重新分析';
            }
        } catch (e) {
            result.innerHTML += event.data + '<br>';
        }
    };

    eventSource.onerror = function() {
        eventSource.close();
        btn.disabled = false;
        btn.textContent = '🔄 重新分析';
        if (result.innerHTML === '') {
            status.style.display = 'none';
            result.innerHTML = '<div style="color:#e03131;padding:20px;text-align:center;">❌ AI 分析连接中断，请重试</div>';
        }
    };
}

// Auto-load on page load — read saved report
window.addEventListener('DOMContentLoaded', function() {
    loadOperationsData();
    loadAiReport();
});

async function loadAiReport() {
    var status = document.getElementById('ai-analysis-status');
    var result = document.getElementById('ai-analysis-result');
    var elapsed = document.getElementById('ai-analysis-elapsed');
    var btn = document.getElementById('ai-analyze-btn');

    try {
        const res = await fetch('/api/operations/ai-report');
        const data = await res.json();
        if (data.ok && data.report) {
            status.style.display = 'none';
            result.innerHTML = marked.parse(data.report);
            elapsed.style.display = 'inline';
            elapsed.textContent = '📄 今日已生成';
            btn.textContent = '🔄 重新分析';
            return;
        }
    } catch (e) {}

    // No report yet — show placeholder
    status.style.display = 'block';
    status.innerHTML = '暂无AI分析报告。点击「生成分析」手动生成，或等待每天早上 8:00 自动生成。';
    btn.textContent = '🚀 生成分析';
}

/* ===== 数据录入弹窗 ===== */
function showAddArticleModal() {
    document.getElementById('modal-article').classList.add('active');
}
function showAddDailyStatsModal() {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    document.querySelector('#modal-daily-stats input[name="date"]').value = y + '-' + m + '-' + day;
    document.getElementById('modal-daily-stats').classList.add('active');
}
function showSaveAccountModal() {
    document.getElementById('modal-account').classList.add('active');
}
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
});

async function aiSend(msg) {
    const resp = await fetch('/api/ai/send?message=' + encodeURIComponent(msg), { method: 'POST' });
    return resp.json();
}

async function submitArticle(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const msg = '记录文章：账号=' + fd.get('accountName')
        + '，标题=' + fd.get('topic')
        + '，日期=' + fd.get('publishDate')
        + (fd.get('series') ? '，系列=' + fd.get('series') : '')
        + (fd.get('fansGained') && fd.get('fansGained') !== '0' ? '，增粉=' + fd.get('fansGained') : '')
        + (fd.get('notes') ? '，备注=' + fd.get('notes') : '')
        + '，阅读=' + fd.get('reads') + ' 点赞=' + fd.get('likes') + ' 分享=' + fd.get('shares') + ' 收藏=' + fd.get('favorites')
        + ' 评论=' + fd.get('comments') + ' 推荐=' + fd.get('recommend');
    try {
        const resp = await fetch('/api/ai/send-async?message=' + encodeURIComponent(msg), { method: 'POST' });
        const res = await resp.json();
        if (res.ok) { toast('✅ 已提交，AI 后台处理中'); } else { toast(res.error || '添加失败', 'error'); }
    } catch(e) { toast('网络错误', 'error'); }
    closeModal('modal-article');
    location.reload();
}

async function submitDailyStats(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const msg = '记录日统计：账号=' + fd.get('accountName')
        + '，日期=' + fd.get('date')
        + '，粉丝=' + fd.get('fans')
        + '，阅读=' + fd.get('reads')
        + '，分享收藏=' + fd.get('shareFav')
        + '，文章数=' + fd.get('readArticles')
        + '，推荐来源=' + fd.get('sourceRecommend')
        + '，搜一搜=' + fd.get('sourceSearch')
        + '，主页=' + fd.get('sourceHome')
        + '，消息=' + fd.get('sourceMessage')
        + '，聊天会话=' + fd.get('sourceChat')
        + '，朋友圈=' + fd.get('sourceMoments')
        + '，其他=' + fd.get('sourceOther');
    // 异步提交，不等待 AI 处理完成
    try {
        const resp = await fetch('/api/ai/send-async?message=' + encodeURIComponent(msg), { method: 'POST' });
        const res = await resp.json();
        if (res.ok) {
            toast('✅ 已提交，AI 后台处理中');
        } else {
            toast(res.error || '提交失败', 'error');
        }
    } catch(e) {
        toast('网络错误', 'error');
    }
    closeModal('modal-daily-stats');
    location.reload();
}

async function submitAccount(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const msg = '记录账号：账号名=' + fd.get('accountName')
        + '，平台=' + fd.get('platformKey')
        + (fd.get('name') ? '，名称=' + fd.get('name') : '')
        + '，粉丝=' + fd.get('fans')
        + '，总访问=' + fd.get('totalViews')
        + '，总文章=' + fd.get('totalArticles');
    try {
        const resp = await fetch('/api/ai/send-async?message=' + encodeURIComponent(msg), { method: 'POST' });
        const res = await resp.json();
        if (res.ok) { toast('✅ 已提交，AI 后台处理中'); } else { toast(res.error || '添加失败', 'error'); }
    } catch(e) { toast('网络错误', 'error'); }
    closeModal('modal-account');
    location.reload();
}
</script>

<!-- 添加文章弹窗 -->
<div class="modal-overlay" id="modal-article">
    <div class="modal">
        <h3>📝 添加文章</h3>
        <form onsubmit="return submitArticle(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>账号-平台 *</label>
                    <select name="accountName" required>
                        <optgroup label="码农老齐">
                            <option value="码农老齐-公众号">码农老齐-公众号</option>
                            <option value="码农老齐-CSDN">码农老齐-CSDN</option>
                            <option value="码农老齐-知乎">码农老齐-知乎</option>
                        </optgroup>
                        <optgroup label="启航电商ERP">
                            <option value="启航电商ERP-公众号">启航电商ERP-公众号</option>
                        </optgroup>
                        <optgroup label="老齐二三事">
                            <option value="老齐二三事-公众号">老齐二三事-公众号</option>
                        </optgroup>
                    </select>
                </div>
                <div class="form-group">
                    <label>发布日期 *</label>
                    <input type="date" name="publishDate" required>
                </div>
            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <label>文章标题 *</label>
                <input type="text" name="topic" required placeholder="文章标题">
            </div>
            <div class="form-row">
                <div class="form-group"><label>系列</label><input type="text" name="series" placeholder="如 OpenCode系列"></div>
                <div class="form-group"><label>增粉</label><input type="number" name="fansGained" value="0"></div>
            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <label>备注</label>
                <input type="text" name="notes" placeholder="可选">
            </div>
            <div style="background:#f8f7ff;border-radius:8px;padding:12px;margin-bottom:12px;">
                <div style="font-size:12px;font-weight:600;margin-bottom:8px;">文章数据（所有平台统一）</div>
                <div class="form-row">
                    <div class="form-group"><label>阅读</label><input type="number" name="reads" value="0"></div>
                    <div class="form-group"><label>点赞</label><input type="number" name="likes" value="0"></div>
                    <div class="form-group"><label>分享</label><input type="number" name="shares" value="0"></div>
                    <div class="form-group"><label>收藏</label><input type="number" name="favorites" value="0"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>评论</label><input type="number" name="comments" value="0"></div>
                    <div class="form-group"><label>推荐</label><input type="number" name="recommend" value="0"></div>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('modal-article')">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 添加日统计弹窗 -->
<div class="modal-overlay" id="modal-daily-stats">
    <div class="modal" style="max-width: 960px;">
        <h3>📊 添加每日统计</h3>
        <form onsubmit="return submitDailyStats(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>账号 *</label>
                    <select name="accountName" required>
                        <option value="码农老齐">码农老齐</option>
                        <option value="启航电商ERP">启航电商ERP</option>
                        <option value="老齐二三事">老齐二三事</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>日期 *</label>
                    <input type="date" name="date" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>粉丝数</label><input type="number" name="fans" value="0"></div>
                <div class="form-group"><label>阅读量</label><input type="number" name="reads" value="0"></div>
                <div class="form-group"><label>分享收藏</label><input type="number" name="shareFav" value="0"></div>
            </div>
            <div class="form-row">

                <div class="form-group"><label>被阅读文章数</label><input type="number" name="readArticles" value="0"></div>
            </div>
            <div style="background:#f8f7ff;border-radius:8px;padding:12px;margin-bottom:12px;">
                <div style="font-size:12px;font-weight:600;margin-bottom:8px;">流量来源</div>
                <div class="form-row">
                    <div class="form-group"><label>推荐</label><input type="number" step="0.1" name="sourceRecommend" value="0"></div>
                    <div class="form-group"><label>搜一搜</label><input type="number" step="0.1" name="sourceSearch" value="0"></div>
                    <div class="form-group"><label>主页</label><input type="number" step="0.1" name="sourceHome" value="0"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>聊天会话</label><input type="number" step="0.1" name="sourceChat" value="0"></div>
                    <div class="form-group"><label>朋友圈</label><input type="number" step="0.1" name="sourceMoments" value="0"></div>
                    <div class="form-group"><label>消息</label><input type="number" step="0.1" name="sourceMessage" value="0"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>其他</label><input type="number" step="0.1" name="sourceOther" value="0"></div>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('modal-daily-stats')">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 保存账号弹窗 -->
<div class="modal-overlay" id="modal-account">
    <div class="modal">
        <h3>📋 添加/更新账号</h3>
        <form onsubmit="return submitAccount(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>账号名 *</label>
                    <select name="accountName" required>
                        <option value="码农老齐">码农老齐</option>
                        <option value="启航电商ERP">启航电商ERP</option>
                        <option value="老齐二三事">老齐二三事</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>平台 *</label>
                    <select name="platformKey" required>
                        <option value="wechat">微信</option>
                        <option value="csdn">CSDN</option>
                        <option value="zhihu">知乎</option>
                    </select>
                </div>
            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <label>平台显示名称</label>
                <input type="text" name="name" placeholder="如 码农老齐">
            </div>
            <div class="form-row">
                <div class="form-group"><label>粉丝数</label><input type="number" name="fans" value="0"></div>
                <div class="form-group"><label>总访问</label><input type="number" name="totalViews" value="0"></div>
                <div class="form-group"><label>总文章</label><input type="number" name="totalArticles" value="0"></div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('modal-account')">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
