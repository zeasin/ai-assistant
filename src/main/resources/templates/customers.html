<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title layout:fragment="title">客户看板</title>
    <style>
        .data-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .data-header h4 {
            margin: 0;
        }
        .hidden-rows {
            display: none;
        }
        .col-settings-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .col-settings-popup {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            min-width: 260px;
            max-width: 400px;
            max-height: 80vh;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .col-settings-popup h3 {
            margin: 0 0 12px 0;
            font-size: 15px;
        }
        .col-settings-item {
            display: flex;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
        }
        .col-settings-item input[type="checkbox"] {
            margin-right: 8px;
        }
        .col-settings-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid #e1e3e6;
        }
        .col-settings-actions .btn {
            padding: 6px 16px;
            font-size: 13px;
        }
        .col-settings-btn {
            cursor: pointer;
            font-size: 14px;
            color: #909296;
            padding: 2px 6px;
            border-radius: 4px;
            background: none;
            border: none;
            margin-left: 8px;
        }
        .col-settings-btn:hover {
            color: #7c5cfc;
            background: #f0edff;
        }
    </style>
</head>
<body>
<th:block layout:fragment="content">

<div class="card">
    <h2>📊 客户管理看板</h2>
    <div class="text-muted mb-2" id="data-source-info">数据来源：<code>加载中...</code> /data/(自动发现目录下所有 JSON 文件) | 最后更新：<span>加载中...</span></div>
</div>

<div class="card" id="config-card" style="display:none;text-align:center;padding:30px 20px;border:2px dashed #d9d0ff;background:#fafafe;">
    <div style="font-size:16px;font-weight:600;color:#7c5cfc;margin-bottom:8px;">📁 尚未配置客户数据目录</div>
    <div class="text-muted" style="margin-bottom:16px;">请在 <a href="/config" style="color:#7c5cfc;">配置页面</a> 中设置「客户数据目录」，程序将自动读取该目录下所有 JSON 文件。</div>
    <a href="/config" class="btn btn-primary">去配置</a>
</div>

<div class="card" style="background:linear-gradient(135deg,#f0edff,#fafafe);border:1px solid #d9d0ff;">
    <h2 style="margin-bottom:4px;">🤖 AI 客户分析报告</h2>
    <div class="text-muted mb-2" style="font-size:12px;">
        基于客户数据实时生成
        <span id="customer-ai-elapsed" style="display:none;margin-left:8px;"></span>
    </div>
    <div id="customer-ai-status" class="text-muted" style="padding:20px 0;text-align:center;">
        ⏳ 加载中...
    </div>
    <div id="customer-ai-result" class="report"></div>
    <div style="margin-top:12px;text-align:right;">
        <button id="customer-ai-btn" class="btn btn-secondary" onclick="startCustomerAnalysis(true)" style="font-size:12px;">🔄 重新分析</button>
    </div>
</div>

<div id="raw-data-container"></div>

<script>
let appData = null;
let currentEventSource = null;
let customerDataDir = null;
let columnSettings = {};
	const DATA_TYPE = 'customer';

	// 检测并按照时间字段倒序排列
	function compareByTime(a, b) {
	    var timeField = null;
	    var timeKeywords = ['时间', '日期', '创建时间', '更新时间', '发布时间', 'date', 'created', 'updated', 'timestamp', 'publish', 'lastContact'];
	    for (var k = 0; k < timeKeywords.length; k++) {
	        for (var key in a) {
	            if (key.indexOf(timeKeywords[k]) !== -1) {
	                timeField = key;
	                break;
	            }
	        }
	        if (timeField) break;
	    }
	    // Fallback: 检查值是否为日期格式的字段
	    if (!timeField) {
	        for (var key in a) {
	            if (typeof a[key] === 'string' && /^\d{4}[-\/]\d{1,2}[-\/]\d/.test(a[key])) {
	                timeField = key;
	                break;
	            }
	        }
	    }
	    if (!timeField) return 0;
	    var ta = a[timeField] || '';
	    var tb = b[timeField] || '';
	    return String(tb).localeCompare(String(ta));
	}

document.addEventListener('DOMContentLoaded', function() {
    loadCustomerData();
});

async function loadCustomerData() {
    try {
        const response = await fetch('/api/data/list?type=' + DATA_TYPE + '&includeData=true');
        if (!response.ok) {
            throw new Error('HTTP ' + response.status + ': ' + response.statusText);
        }
        const apiResult = await response.json();
        
        if (!apiResult.ok) {
            document.getElementById('config-card').style.display = 'block';
            document.getElementById('customer-ai-status').textContent = '⚠️ ' + apiResult.error;
            document.getElementById('data-source-info').innerHTML = '数据来源：<code>未配置</code>';
            return;
        }
        
        customerDataDir = apiResult.directory;
        appData = {
            isDataDirConfigured: true,
            customerDataDir: apiResult.directory,
            dataDirEmpty: apiResult.fileCount === 0,
            rawDataGroups: {},
            tableColumns: {},
            lastUpdated: '未知'
        };
        
        for (let fileData of apiResult.dataGroups) {
            let fileName = fileData.fileName;
            appData.rawDataGroups[fileName] = {};
            
            for (let groupKey in fileData.groups) {
                let groupInfo = fileData.groups[groupKey];
                if (groupInfo.type === 'array') {
                    let groupResp = await fetch('/api/data/group?type=' + DATA_TYPE + '&fileName=' + encodeURIComponent(fileName) + '&group=' + encodeURIComponent(groupKey));
                    let groupData = await groupResp.json();
                    if (groupData.ok && Array.isArray(groupData.data)) {
                        let entries = [];
                        for (let item of groupData.data) {
                            if (typeof item === 'object' && item !== null) {
                                entries.push(item);
                            }
                        }
                        entries.sort(compareByTime);
                        appData.rawDataGroups[fileName][groupKey] = entries;
                        
                        let tableId = fileName + '_' + groupKey;
                        let colSet = new Set();
                        for (let row of entries) {
                            Object.keys(row).forEach(function(key) { colSet.add(key); });
                        }
                        appData.tableColumns[tableId] = Array.from(colSet);
                    }
                }
            }
            
            if (Object.keys(appData.rawDataGroups[fileName]).length === 0) {
                delete appData.rawDataGroups[fileName];
            }
        }
        
        let firstFile = Object.keys(appData.rawDataGroups)[0] || '客户数据';
        let metaResp = await fetch('/api/data/group?type=' + DATA_TYPE + '&fileName=' + encodeURIComponent(firstFile) + '&group=meta');
        if (metaResp.ok) {
            let metaData = await metaResp.json();
            if (metaData.ok && metaData.data && metaData.data.lastUpdated) {
                appData.lastUpdated = metaData.data.lastUpdated;
            }
        }
        
        // 加载保存的列设置
        try {
            let settingsResp = await fetch('/api/data/column-settings?type=customer');
            if (settingsResp.ok) {
                let settingsData = await settingsResp.json();
                if (settingsData.ok && settingsData.settings) {
                    columnSettings = settingsData.settings;
                }
            }
        } catch (e) {
            console.warn('加载列设置失败:', e);
        }

        renderData();
        setTimeout(function() { startCustomerAnalysis(false); }, 300);
    } catch (e) {
        console.error('加载数据失败:', e);
        document.getElementById('data-source-info').innerHTML = '数据加载失败: ' + e.message;
    }
}

function renderData() {
    if (!appData.isDataDirConfigured) {
        document.getElementById('config-card').style.display = 'block';
        document.getElementById('customer-ai-status').textContent = '⚠️ 请先在配置页面设置「客户数据目录」，然后再进行 AI 分析。';
        return;
    }
    
    // 更新数据来源信息
    const dataSourceInfo = document.getElementById('data-source-info');
    dataSourceInfo.innerHTML = '数据来源：<code>' + (appData.customerDataDir || '未配置') + '</code> /data/(自动发现目录下所有 JSON 文件) | 最后更新：<span>' + (appData.lastUpdated || '未知') + '</span>';
    
    // 渲染原始数据
    const container = document.getElementById('raw-data-container');
    container.innerHTML = '';
    
    if (appData.dataDirEmpty) {
        container.innerHTML = '<details style="background:#fff;border:1px solid #e1e3e6;border-radius:12px;padding:16px 20px;margin-bottom:16px;" open>' +
            '<summary style="cursor:pointer;font-size:14px;font-weight:600;color:#5c5f66;outline:none;">📁 原始数据详情</summary>' +
            '<div style="margin-top:12px;"><div class="card"><div style="text-align:center;padding:30px 20px;border:2px dashed #d9d0ff;background:#fafafe;">' +
            '<div style="font-size:16px;font-weight:600;color:#7c5cfc;margin-bottom:8px;">📁 目录为空</div>' +
            '<div class="text-muted">请在配置的目录下添加 JSON 文件</div></div></div></div></details>';
        return;
    }
    
    let html = '<details style="background:#fff;border:1px solid #e1e3e6;border-radius:12px;padding:16px 20px;margin-bottom:16px;" open>' +
        '<summary style="cursor:pointer;font-size:14px;font-weight:600;color:#5c5f66;outline:none;">📁 原始数据详情</summary>' +
        '<div style="margin-top:12px;">';
    
    for (let fileKey in appData.rawDataGroups) {
        let fileGroups = appData.rawDataGroups[fileKey];
        html += '<div style="margin-bottom:20px;">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
        html += '<h3 style="margin:0;">' + fileKey + '</h3>';
        html += '<a href="/data-editor?type=customer&data=' + encodeURIComponent(fileKey) + '" class="btn btn-secondary" style="font-size:12px;">更多数据</a>';
        html += '</div>';
        
        for (let groupKey in fileGroups) {
            let rows = fileGroups[groupKey];
            let tableId = fileKey + '_' + groupKey;
            let allColumns = appData.tableColumns[tableId] || [];
            let savedCols = columnSettings[tableId];
            let columns = savedCols && savedCols.length > 0
                ? allColumns.filter(function(c) { return savedCols.indexOf(c) !== -1; })
                : allColumns;

            html += '<div class="card" style="margin-bottom:12px;">';
            html += '<div class="data-header"><h4>' + groupKey + '<button class="col-settings-btn" onclick="showColumnSettings(\'' + tableId + '\')" title="列设置">⚙️</button></h4></div>';
            
            html += '<div style="overflow-x:auto;">';
            html += '<table class="log-table" id="table_' + tableId + '">';
            
            // 表头
            html += '<thead><tr>';
            for (let col of columns) {
                html += '<th>' + col + '</th>';
            }
            html += '</tr></thead>';
            
            // 表体
            html += '<tbody>';
            for (let i = 0; i < rows.length; i++) {
                let row = rows[i];
                let rowClass = i >= 6 ? 'hidden-rows' : '';
                html += '<tr class="' + rowClass + '">';
                for (let col of columns) {
                    let val = row[col] != null ? row[col] : '—';
                    html += '<td>' + val + '</td>';
                }
                html += '</tr>';
            }
            
            if (rows.length === 0) {
                html += '<tr><td colspan="' + columns.length + '" style="text-align:center;color:#909296;">暂无数据</td></tr>';
            }
            
            html += '</tbody>';
            html += '</table>';
            html += '</div></div>';
        }
        html += '</div>';
    }
    
    html += '</div></details>';
    container.innerHTML = html;
}

function showColumnSettings(tableId) {
    var allColumns = appData.tableColumns[tableId] || [];
    if (allColumns.length === 0) return;

    var savedCols = columnSettings[tableId];
    var selected = savedCols && savedCols.length > 0
        ? savedCols.slice()
        : allColumns.slice();

    var popup = document.createElement('div');
    popup.className = 'col-settings-overlay';
    popup.onclick = function(e) { if (e.target === popup) popup.remove(); };

    var html = '<div class="col-settings-popup" onclick="event.stopPropagation();">';
    html += '<h3>选择要显示的列</h3>';
    html += '<div style="max-height:50vh;overflow-y:auto;">';
    for (var i = 0; i < allColumns.length; i++) {
        var col = allColumns[i];
        var checked = selected.indexOf(col) !== -1;
        html += '<label class="col-settings-item">';
        html += '<input type="checkbox" value="' + col.replace(/"/g, '&quot;') + '" ' + (checked ? 'checked' : '') + '>';
        html += col;
        html += '</label>';
    }
    html += '</div>';
    html += '<div class="col-settings-actions">';
    html += '<button class="btn btn-secondary" onclick="this.closest(\'.col-settings-overlay\').remove()">取消</button>';
    html += '<button class="btn btn-primary" onclick="saveColumnSettings(\'' + tableId + '\', this)">确认</button>';
    html += '</div></div>';

    popup.innerHTML = html;
    document.body.appendChild(popup);
}

async function saveColumnSettings(tableId, btn) {
    var popup = btn.closest('.col-settings-overlay');
    var checkboxes = popup.querySelectorAll('input[type="checkbox"]');
    var selected = [];
    for (var i = 0; i < checkboxes.length; i++) {
        if (checkboxes[i].checked) {
            selected.push(checkboxes[i].value);
        }
    }

    columnSettings[tableId] = selected;

    try {
        var resp = await fetch('/api/data/column-settings?type=customer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(columnSettings)
        });
        var data = await resp.json();
        if (data.ok) {
            renderData();
        } else {
            alert('保存失败: ' + (data.error || '未知错误'));
        }
    } catch (e) {
        alert('保存失败: ' + e.message);
    }

    popup.remove();
}

var customerStartTime;
function startCustomerAnalysis(force) {
    var btn = document.getElementById('customer-ai-btn');
    var status = document.getElementById('customer-ai-status');
    var result = document.getElementById('customer-ai-result');
    var elapsed = document.getElementById('customer-ai-elapsed');
    
    if (!appData || !appData.isDataDirConfigured) {
        status.style.display = 'block';
        status.textContent = '⚠️ 请先在配置页面设置「客户数据目录」，然后再进行 AI 分析。';
        result.innerHTML = '';
        return;
    }
    
    if (currentEventSource) {
        currentEventSource.close();
        currentEventSource = null;
    }

    btn.disabled = true;
    btn.textContent = '⏳ 分析中...';
    status.style.display = 'block';
    status.textContent = '⏳ AI 正在分析客户数据...';
    result.innerHTML = '';
    elapsed.style.display = 'none';
    customerStartTime = Date.now();

    var url = '/api/customers/ai-analysis' + (force ? '?force=true' : '');
    var es = new EventSource(url);
    currentEventSource = es;
    es.onmessage = function(event) {
        try {
            var data = JSON.parse(event.data);
            if (data.type === 'status') {
                status.textContent = data.content;
            } else if (data.type === 'text') {
                status.style.display = 'none';
                result.innerHTML = marked.parse(data.content);
                var sec = Math.round((Date.now() - customerStartTime) / 1000);
                elapsed.style.display = 'inline';
                elapsed.textContent = '⏱️ ' + sec + 's';
            } else if (data.type === 'error') {
                status.style.display = 'none';
                result.innerHTML = '<div style="color:#e03131;padding:20px;text-align:center;">❌ ' + data.content + '</div>';
            } else if (data.type === 'done') {
                es.close();
                currentEventSource = null;
                btn.disabled = false;
                btn.textContent = '🔄 重新分析';
            }
        } catch (e) { result.innerHTML += event.data + '<br>'; }
    };
    es.onerror = function() {
        es.close();
        currentEventSource = null;
        btn.disabled = false;
        btn.textContent = '🔄 重新分析';
        if (result.innerHTML === '') {
            status.style.display = 'none';
            result.innerHTML = '<div style="color:#e03131;padding:20px;text-align:center;">❌ AI 分析连接中断，请重试</div>';
        }
    };
}
</script>

</th:block>
</body>
</html>
