<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${kb.name} + ' - 概览'">知识库</title>
</head>
<body>
<th:block layout:fragment="content">

<div class="status-bar">
    <div class="status-item">
        <div class="label" th:text="${labels.get('notes')} + '库位置'">笔记库位置</div>
        <div class="value" style="font-size:13px;font-weight:400;word-break:break-all;margin-top:6px;" th:text="${kb.notesDir}">路径</div>
    </div>
    <div class="status-item">
        <div class="label" th:text="${labels.get('tasks')}">任务</div>
        <div class="value" style="font-size:28px;" th:text="${taskCount}">0</div>
    </div>
    <div class="status-item">
        <div class="label" th:text="${labels.get('reminders')}">提醒</div>
        <div class="value" style="font-size:28px;" th:text="${reminderCount}">0</div>
    </div>
    <div class="status-item">
        <div class="label" th:text="${labels.get('modules')}">模块</div>
        <div class="value" style="font-size:28px;" th:text="${modules.size()}">0</div>
    </div>
</div>

<div class="card">
    <h2>快速入口</h2>
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <a th:href="@{/kb/{id}/tasks(id=${kb.id})}" class="btn btn-primary"
           style="flex:1;min-width:120px;justify-content:center;"
           th:text="'📋 ' + ${labels.get('tasks')}">任务</a>
        <a th:href="@{/kb/{id}/reminders(id=${kb.id})}" class="btn btn-primary"
           style="flex:1;min-width:120px;justify-content:center;"
           th:text="'🔔 ' + ${labels.get('reminders')}">提醒</a>
        <a th:href="@{/kb/{id}/modules(id=${kb.id})}" class="btn btn-primary"
           style="flex:1;min-width:120px;justify-content:center;"
           th:text="'🤖 ' + ${labels.get('modules')}">模块</a>
        <a th:href="@{/kb/{id}/notes(id=${kb.id})}" class="btn btn-primary"
           style="flex:1;min-width:120px;justify-content:center;"
           th:text="'📄 ' + ${labels.get('notes')}">笔记</a>
        <a th:href="@{/kb/{id}/config(id=${kb.id})}" class="btn btn-primary"
           style="flex:1;min-width:120px;justify-content:center;background:#5c5f66;"
           th:text="'⚙️ ' + ${labels.get('config')}">配置</a>
    </div>
</div>

<div class="card" th:if="${!modules.isEmpty()}">
    <h2 th:text="${labels.get('modules')}">模块/科目</h2>
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <a th:each="m : ${modules}"
           th:href="@{/kb/{id}/modules/{mid}(id=${kb.id}, mid=${m.id})}"
           class="btn btn-secondary"
           style="flex:0 0 auto;padding:12px 20px;font-size:15px;"
           th:text="${m.icon + ' ' + m.name}">模块</a>
    </div>
</div>

<div class="card">
    <div class="flex" style="justify-content:space-between;">
        <h2>📊 AI 综合日报</h2>
        <div class="flex" style="gap:8px;">
            <button class="btn btn-secondary" onclick="openPromptModal()">⚙️ 提示词</button>
            <button class="btn btn-primary" id="genBtn" onclick="generateReport()">
                🔄 重新生成
            </button>
        </div>
    </div>

    <th:block th:if="${report_error != null and !report_error.isEmpty()}">
    <div class="text-muted mb-2" style="color:#ff6b6b;">
        ⚠️ <span th:text="${report_error}"></span>
    </div>
    </th:block>

    <div id="reportContent" class="report">
        <th:block th:if="${report != null and !report.isEmpty()}">
            <div th:utext="${report}"></div>
        </th:block>
        <th:block th:unless="${report != null and !report.isEmpty()}">
            <div class="text-muted">
                暂无日报数据。点击"重新生成"或等待定时任务（每天 09:00）自动推送。
            </div>
        </th:block>
    </div>
</div>

<div id="promptModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;">
    <div style="background:#fff;border-radius:12px;padding:24px;width:90%;max-width:700px;max-height:80vh;overflow-y:auto;">
        <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="margin:0;">⚙️ 日报生成提示词</h3>
            <button class="btn btn-secondary" onclick="closePromptModal()" style="padding:4px 12px;">✕</button>
        </div>
        <div class="text-muted mb-2" style="font-size:12px;">可用变量：<code>{date}</code> 日期，<code>{weekday}</code> 星期</div>
        <textarea id="promptContent" rows="12" style="width:100%;padding:10px;border:1px solid #e1e3e6;border-radius:8px;font-size:13px;font-family:monospace;resize:vertical;box-sizing:border-box;"></textarea>
        <div class="flex" style="gap:8px;margin-top:12px;justify-content:flex-end;">
            <button class="btn btn-secondary" onclick="closePromptModal()">取消</button>
            <button class="btn btn-primary" onclick="savePrompt()">保存</button>
        </div>
    </div>
</div>

<script>
function generateReport() {
    const btn = document.getElementById('genBtn');
    btn.disabled = true; btn.textContent = '⏳ 生成中...';

    fetch('/generate', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            if (data.ok) {
                setTimeout(() => location.reload(), 500);
            } else {
                toast('生成失败：' + (data.error || '未知错误'), 'error');
                btn.disabled = false; btn.textContent = '🔄 重新生成';
            }
        })
        .catch(() => {
            toast('请求失败，请检查服务状态', 'error');
            btn.disabled = false; btn.textContent = '🔄 重新生成';
        });
}

function openPromptModal() {
    fetch('/api/report/prompt')
        .then(r => r.json())
        .then(data => {
            if (data.ok) {
                document.getElementById('promptContent').value = data.prompt;
                document.getElementById('promptModal').style.display = 'flex';
            }
        });
}

function closePromptModal() {
    document.getElementById('promptModal').style.display = 'none';
}

function savePrompt() {
    const prompt = document.getElementById('promptContent').value;
    fetch('/api/report/prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: prompt })
    })
    .then(r => r.json())
    .then(data => {
        if (data.ok) {
            toast('✅ 提示词已保存');
            closePromptModal();
        } else {
            toast('保存失败', 'error');
        }
    });
}
</script>

</th:block>
</body>
</html>
