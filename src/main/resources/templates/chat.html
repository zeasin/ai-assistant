<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title layout:fragment="title">对话</title>
</head>
<body>
<th:block layout:fragment="content">

<div class="chat-layout">
    <div class="chat-sidebar">
        <div class="sidebar-header">
            <h3>💬 历史对话</h3>
            <button class="btn btn-primary" onclick="newSession()" style="padding:6px 12px;font-size:12px;">＋ 新对话</button>
        </div>
        <div class="session-list" id="sessionList">
            <th:block th:if="${#lists.size(sessions) > 0}">
                <th:block th:each="s : ${sessions}">
                <div class="session-item" th:classappend="${#strings.equals(s.id, current_id) ? 'active' : ''}" th:data-sid="${s.id}" th:id="|sess-${s.id}|">
                    <div class="session-title" th:text="${s.title}">会话标题</div>
                    <div class="session-meta" th:text="${s.updated}">时间</div>
                    <button class="session-del" th:data-sid="${s.id}">✕</button>
                </div>
                </th:block>
            </th:block>
            <th:block th:unless="${#lists.size(sessions) > 0}">
                <div class="session-empty">暂无历史对话</div>
            </th:block>
        </div>
    </div>

    <div class="chat-main">
        <div class="chat-header">
            <span>AI 引擎：</span>
            <span th:if="${ai_provider == 'direct'}" style="background:#e6f7e6;color:#1a7a1a;padding:2px 8px;border-radius:4px;font-weight:600;">🧠 LLM 直连</span>
            <span th:unless="${ai_provider == 'direct'}" style="background:#e8f0fe;color:#1a73e8;padding:2px 8px;border-radius:4px;font-weight:600;">🔄 Opencode</span>
        </div>

        <div class="chat-box" id="chatBox">
            <th:block th:if="${current != null and current.messages != null and #lists.size(current.messages) > 0}">
                <th:block th:each="m : ${current.messages}">
                <div class="chat-msg" th:classappend="${m.role}">
<div class="header">
    <div class="avatar" th:if="${m.role == 'user'}" th:text="'👤'">👤</div>
                            <div class="label" th:text="${m.role == 'user' ? '你' : (m.mode == 'coding' ? '💻 编程AI' : '🤖 AI 助理')}">AI 助理</div>
                        </div>
                        <div class="bubble"><div class="text" th:attr="data-content=${m.content}"></div></div>
                    </div>
                    </th:block>
            </th:block>
            <th:block th:unless="${current != null and current.messages != null and #lists.size(current.messages) > 0}">
            <div class="chat-msg ai">
                <div class="header">
                    <div class="label" th:text="${current_mode == 'coding' ? '💻 编程AI' : '🤖 AI 助理'}">AI 助理</div>
                </div>
                <div class="bubble"><div class="text" id="welcomeMsg">你好！有什么我可以帮你的？我可以读取你的笔记库来回答关于项目、客户、计划等方面的问题。</div></div>
            </div>
            </th:block>
        </div>

        <div class="chat-input">
            <div class="input-wrapper">
                <input type="text" id="chatInput" placeholder="给 AI助理 发送消息..."
                       onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="btn-send" id="chatBtn" onclick="sendMessage()" title="发送">↑</button>
            </div>
            <select id="modelSelector">
                <th:block th:if="${#lists.size(llm_models) > 0}">
                    <th:block th:each="m : ${llm_models}">
                        <option th:value="${m.name}" th:selected="${m.name == default_model}" th:text="${m.name}">模型</option>
                    </th:block>
                </th:block>
                <th:block th:unless="${#lists.size(llm_models) > 0}">
                    <option value="">默认模型</option>
                </th:block>
            </select>
        </div>
    </div>
</div>

<style>
.chat-layout {
    display: flex; gap: 0; margin: -24px; height: calc(100vh - 52px); overflow: hidden;
}
.chat-sidebar {
    width: 260px; flex-shrink: 0;
    background: #fff; border-right: 1px solid #e1e3e6;
    display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header {
    padding: 16px; border-bottom: 1px solid #e1e3e6;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.sidebar-header h3 { margin: 0; font-size: 14px; white-space: nowrap; }
.session-list {
    flex: 1; overflow-y: auto; padding: 8px;
}
.session-item {
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    margin-bottom: 4px; position: relative; transition: background .1s;
    display: flex; flex-direction: column; gap: 2px;
}
.session-item:hover { background: #f5f5f7; }
.session-item.active { background: #f0edff; }
.session-title {
    font-size: 13px; font-weight: 500; color: #1a1b1e;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 20px;
}
.session-meta { font-size: 11px; color: #909296; }
.session-del {
    position: absolute; right: 8px; top: 8px;
    border: none; background: none; color: #909296; cursor: pointer;
    font-size: 12px; padding: 2px 4px; border-radius: 4px; display: none;
}
.session-item:hover .session-del { display: block; }
.session-del:hover { background: #ffe0e0; color: #c92a2a; }
.session-empty {
    font-size: 13px; color: #909296; text-align: center; padding: 24px 16px;
}
.chat-main {
    flex: 1; display: flex; flex-direction: column; overflow: hidden; height: 100%;
}
.chat-header {
    padding: 8px 16px; background: #f8f9fa; border-bottom: 1px solid #e1e3e6;
    display: flex; align-items: center; gap: 8px; font-size: 12px; color: #666;
    flex-shrink: 0;
}
.chat-mode-bar {
    background: #fff; border-bottom: 1px solid #e1e3e6;
    padding: 10px 16px; display: flex; align-items: center;
}
.mode-tabs {
    display: flex; gap: 8px;
}
.mode-tab {
    padding: 8px 16px; border: 1px solid #e1e3e6; border-radius: 8px;
    background: #fff; color: #666; cursor: pointer; font-size: 13px;
    transition: all .15s;
}
.mode-tab:hover {
    border-color: #7c5cfc; color: #7c5cfc;
}
.mode-tab.active {
    background: #7c5cfc; border-color: #7c5cfc; color: #fff;
}
.chat-box {
    flex: 1; overflow-y: auto; padding: 16px; min-height: 0;
    border: none !important; border-radius: 0 !important;
    max-height: none !important; margin-bottom: 0 !important;
}
.chat-box .chat-msg { margin-bottom: 16px; max-width: 90%; }
.chat-box .chat-msg.user { margin-left: auto; background: transparent; border: none; }
.chat-box .chat-msg.ai { margin-right: auto; }
.chat-box .chat-msg .header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.chat-box .chat-msg.user .header { flex-direction: row-reverse; }
.chat-box .chat-msg.ai .header { flex-direction: row; }
.chat-box .chat-msg .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.chat-box .chat-msg.user .avatar { background: #7c5cfc; color: #fff; }
.chat-box .chat-msg.ai .avatar { background: #e8e8ed; color: #666; }
.chat-box .chat-msg .label { font-size: 12px; font-weight: 500; }
.chat-box .chat-msg.user .label { color: #666; }
.chat-box .chat-msg.ai .label { color: #7c5cfc; }
.chat-box .chat-msg .bubble { padding: 10px 14px; }
.chat-box .chat-msg.user .bubble { background: transparent; border: none; padding: 10px 14px; text-align: right; }
.chat-box .chat-msg.ai .bubble { background: #fff; border-radius: 16px 16px 16px 4px; border: 1px solid #e1e3e6; }
.chat-box .chat-msg .text { font-size: 14px; line-height: 1.6; }
.chat-box .chat-msg .text pre { background: #1e1e2e; color: #cdd6f4; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 13px; margin: 8px 0; }
.chat-box .chat-msg .text code { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
.chat-box .chat-msg .text :not(pre) > code { background: #e8e8ec; padding: 2px 6px; border-radius: 4px; color: #e03131; }
.chat-box .chat-msg .text table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
.chat-box .chat-msg .text th, .chat-box .chat-msg .text td { border: 1px solid #e1e3e6; padding: 6px 10px; text-align: left; }
.chat-box .chat-msg .text th { background: #f5f5f7; font-weight: 600; }
.chat-box .chat-msg .text ul, .chat-box .chat-msg .text ol { padding-left: 20px; margin: 4px 0; }
.chat-box .chat-msg .text blockquote { border-left: 3px solid #7c5cfc; padding-left: 12px; color: #5c5f66; margin: 8px 0; }
.chat-box .chat-msg .text h1, .chat-box .chat-msg .text h2, .chat-box .chat-msg .text h3 { margin: 12px 0 6px; font-size: inherit; font-weight: 600; }
.chat-box .chat-msg .text p { margin: 4px 0; }
.chat-reasoning {
    font-size: 12px; color: #888; line-height: 1.5; white-space: pre-wrap;
    padding: 8px 10px; margin: 6px 0 4px; background: #fafafa;
    border-left: 2px solid #ccc; border-radius: 4px;
    display: none;
}
.chat-reasoning.visible { display: block; }
.chat-status {
    font-size: 12px; color: #888; line-height: 1.5;
    padding: 6px 0; font-style: italic;
    height: 0; opacity: 0; overflow: hidden;
    transition: all 0.2s;
}
.chat-status.visible {
    height: auto; opacity: 1; padding: 6px 0;
}
.chat-toggle {
    font-size: 11px; color: #7c5cfc; cursor: pointer; user-select: none;
    margin: 2px 0 4px; display: inline-block;
}
.chat-toggle:hover { text-decoration: underline; }
.chat-input { padding: 12px 16px !important; background: #fff !important; border-top: 1px solid #e1e3e6 !important; flex-shrink: 0 !important; display: flex !important; align-items: center !important; gap: 12px !important; }
.chat-input .input-wrapper {
    flex: 1; display: flex; align-items: center; gap: 8px;
    padding: 6px; border: 1px solid #e1e3e6; border-radius: 24px;
    background: #f8f9fa;
}
.chat-input .input-btn {
    padding: 6px 14px; border: none; border-radius: 14px;
    background: transparent; color: #666; font-size: 12px; cursor: pointer;
    transition: all .2s; white-space: nowrap;
}
.chat-input .input-btn:hover { background: #e8e8ec; }
.chat-input .input-btn.active { background: #e6f4ff; color: #1a73e8; }
.chat-input input {
    flex: 1; padding: 10px 14px; border: none; border-radius: 16px;
    background: transparent; color: #1a1b1e; font-size: 14px; outline: none;
}
.chat-input input::placeholder { color: #909296; }
.chat-input input:focus { background: #fff; }
.chat-input .btn-send {
    width: 36px; height: 36px; border: none; border-radius: 50%;
    background: #7c5cfc; color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; flex-shrink: 0;
}
.chat-input .btn-send:hover { background: #6a4cf5; }
.chat-input .btn-send:disabled { background: #ccc; cursor: not-allowed; }
.chat-input select {
    padding: 8px 12px; border: 1px solid #e1e3e6; border-radius: 8px;
    background: #fff; font-size: 13px; outline: none; max-width: 180px;
    flex-shrink: 0;
}
.chat-input select:focus { border-color: #7c5cfc; }
</style>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let currentSessionId = '[[${current_id}]]';
let currentMode = '[[${current_mode}]]';
let replyText = '';

function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

function getAIModeName(mode) {
    return '🤖 AI 助理';
}

// 动态加载左侧会话列表
async function loadSessionList() {
    try {
        const res = await fetch('/chat/history');
        const data = await res.json();
        const list = document.getElementById('sessionList');
        if (!list) return;

        if (!data.sessions || data.sessions.length === 0) {
            list.innerHTML = '<div class="session-empty">暂无历史对话</div>';
            return;
        }

        let html = '';
        for (const s of data.sessions) {
            const activeClass = s.id === currentSessionId ? ' active' : '';
            html += `<div class="session-item${activeClass}" data-sid="${s.id}" id="sess-${s.id}">
                <div class="session-title">${escapeHtml(s.title || '新对话')}</div>
                <div class="session-meta">${escapeHtml(s.updated || '')}</div>
                <button class="session-del" data-sid="${s.id}">✕</button>
            </div>`;
        }
        list.innerHTML = html;
    } catch (e) {
        // 静默失败，不影响主流程
    }
}

async function sendMessage() {
    const input = document.getElementById('chatInput');
    const box = document.getElementById('chatBox');
    const btn = document.getElementById('chatBtn');
    const msg = input.value.trim();
    if (!msg) return;

    input.value = '';
    btn.disabled = true; btn.innerHTML = '⏳';
    replyText = '';

    const isNewSession = !currentSessionId;

    // 消息由后端自动保存，前端无需调用 saveMessage
    const userMode = 'knowledge';
    box.innerHTML += `<div class="chat-msg user"><div class="header"><div class="avatar">👤</div><div class="label">你</div></div><div class="bubble"><div class="text">${escapeHtml(msg)}</div></div></div>`;
    box.scrollTop = box.scrollHeight;

    let aiMode = userMode;
    const aiMsgId = 'ai-' + Date.now();
    box.innerHTML += `<div class="chat-msg ai" id="${aiMsgId}">
        <div class="header">
            <div class="label" id="ai-label-${aiMsgId}">🤖 AI 助理</div>
        </div>
        <div class="bubble">
            <div class="chat-status" id="status-${aiMsgId}">⏳ 处理中...</div>
            <div class="text" id="reply-${aiMsgId}"></div>
        </div>
    </div>`;
    box.scrollTop = box.scrollHeight;

    const modelSelector = document.getElementById('modelSelector');
    const form = new FormData();
    form.append('message', msg);
    form.append('sessionId', currentSessionId);
    if (modelSelector) form.append('modelName', modelSelector.value);

    try {
        const res = await fetch('/chat/send', { method: 'POST', body: form });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });

            const parts = buffer.split('\n\n');
            buffer = parts.pop() || '';

            for (const part of parts) {
                if (!part.startsWith('data:')) continue;
                try {
                    const data = JSON.parse(part.replace(/^data:\s*/, ''));
                    // 处理 sessionId 事件（首次发送时建立 session）
                    if (data.type === 'session' && data.sessionId) {
                        currentSessionId = data.sessionId;
                        // 更新 URL，不刷新页面
                        history.replaceState(null, '', '/chat?id=' + data.sessionId);
                    }
                    // 如果有 mode 信息，更新我们的变量
                    if (data.mode) {
                        aiMode = data.mode;
                        // 更新 label
                        document.getElementById('ai-label-' + aiMsgId).textContent = getAIModeName(aiMode);
                    }
                    if (data.type === 'status') {
                        if (data.tool === 'read' && data.file) {
                            const name = data.file.split('/').pop();
                            document.getElementById('status-' + aiMsgId).textContent = '📖 ' + name;
                        } else if (data.tool === 'write' || data.tool === 'edit') {
                            document.getElementById('status-' + aiMsgId).textContent = '✏️ 正在写入...';
                        } else if (data.tool === 'bash') {
                            document.getElementById('status-' + aiMsgId).textContent = '💻 正在执行...';
                        } else {
                            document.getElementById('status-' + aiMsgId).textContent = '⏳ 处理中...';
                        }
                        document.getElementById('status-' + aiMsgId).classList.add('visible');
                    } else if (data.type === 'reasoning') {
                        document.getElementById('status-' + aiMsgId).textContent = '🧠 思考中...';
                        document.getElementById('status-' + aiMsgId).classList.add('visible');
                    } else if (data.type === 'text') {
                        replyText += data.content;
                        const displayText = replyText.replace(/\n{3,}/g, '\n\n');
                        document.getElementById('reply-' + aiMsgId).innerHTML = marked.parse(displayText, {breaks: true});
                        document.getElementById('status-' + aiMsgId).classList.remove('visible');
                    } else if (data.type === 'error') {
                        document.getElementById('status-' + aiMsgId).classList.remove('visible');
                        document.getElementById('reply-' + aiMsgId).innerHTML = '<span style="color:#ff6b6b;">❌ ' + escapeHtml(data.content) + '</span>';
                    } else if (data.type === 'done') {
                        const statusEl = document.getElementById('status-' + aiMsgId);
                        if (statusEl) {
                            statusEl.classList.remove('visible');
                            statusEl.textContent = '';
                        }
                        loadSessionList();
                    }
                } catch (e) { /* skip malformed events */ }
            }
            box.scrollTop = box.scrollHeight;
        }
    } catch (e) {
        document.getElementById('reply-' + aiMsgId).innerHTML = '<span style="color:#ff6b6b;">❌ 网络错误</span>';
    }

    btn.disabled = false; btn.innerHTML = '↑';
}

function switchSession(id) {
    window.location.href = '/chat?id=' + id;
}

function newSession() {
    window.location.href = '/chat?id=new';
}

async function deleteSession(id) {
    if (!confirm('确定删除该对话？')) return;
    const res = await fetch('/chat/session/' + id, { method: 'DELETE' });
    const data = await res.json();
    if (data.ok) {
        window.location.href = '/chat';
    }
}

addEventListener('DOMContentLoaded', () => {
    const box = document.getElementById('chatBox');
    document.getElementById('sessionList')?.addEventListener('click', e => {
        const item = e.target.closest('.session-item');
        if (!item) return;
        const sid = item.getAttribute('data-sid');
        if (e.target.classList.contains('session-del')) {
            e.stopPropagation();
            deleteSession(sid);
        } else {
            switchSession(sid);
        }
    });
    // 选中默认模型，无默认则选第一条
    const modelSel = document.getElementById('modelSelector');
    if (modelSel && modelSel.options.length > 0 && !modelSel.value) {
        modelSel.selectedIndex = 0;
    }
    // 渲染历史消息 Markdown（先渲染再滚到底）
    document.querySelectorAll('.chat-msg .text[data-content]').forEach(function(el) {
        el.innerHTML = marked.parse(el.getAttribute('data-content'), {breaks: true});
    });
    if (box) box.scrollTop = box.scrollHeight;
});
</script>

</th:block>
</body>
</html>
