<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${kb.name} + ' - 数据 - AI助理'">数据</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .data-table-container { overflow-x:auto; }
        .data-table { width:100%; border-collapse:collapse; font-size:13px; }
        .data-table th { text-align:left; padding:10px 12px; border-bottom:2px solid #7c5cfc; color:#5c5f66; font-weight:600; white-space:nowrap; background:#fafafe; }
        .data-table td { padding:10px 12px; border-bottom:1px solid #e1e3e6; max-width:200px; overflow:hidden; text-ellipsis:ellipsis; white-space:nowrap; }
        .data-table tr:hover { background:#f8f7ff; }
        .data-row-actions { display:flex; gap:6px; white-space:nowrap; }
        .data-row-actions .btn { padding:4px 10px; font-size:12px; }
        .stats-bar { display:flex; gap:16px; margin-bottom:16px; flex-wrap:wrap; }
        .stat-item { background:#fff; border:1px solid #e1e3e6; border-radius:8px; padding:10px 16px; }
        .stat-item .label { font-size:11px; color:#5c5f66; }
        .stat-item .value { font-size:18px; font-weight:600; color:#7c5cfc; }
        .detail-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
        .detail-item { padding:10px 12px; background:#f8f7ff; border-radius:8px; border:1px solid #eef0f4; }
        .detail-item .label { font-size:11px; color:#5c5f66; margin-bottom:4px; }
        .detail-item .value { font-size:14px; color:#1a1b1e; word-break:break-all; }
        .btn { padding:6px 14px; border-radius:6px; font-size:13px; cursor:pointer; border:1px solid #e1e3e6; background:#fff; color:#5c5f66; transition:all .15s; }
        .btn:hover { border-color:#7c5cfc; color:#7c5cfc; }
        .btn-primary { background:#7c5cfc; color:#fff; border-color:#7c5cfc; }
        .btn-primary:hover { background:#6a4ae0; border-color:#6a4ae0; color:#fff; }
        .loading-state { text-align:center; padding:40px 20px; color:#5c5f66; }
        .empty-state { text-align:center; padding:40px 20px; color:#909296; }
        .empty-state .icon { font-size:48px; margin-bottom:12px; }
    </style>
</head>
<body>
<th:block layout:fragment="content">

<th:block th:replace="~{kb_tab_bar :: kb-tabs('data', ${kb}, ${labels})}" />

<!-- 数据概览 -->
<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="margin:0;">📈 数据概览</h2>
        <div style="display:flex;gap:8px;">
            <button class="btn" onclick="loadDataOverview()">🔄 刷新</button>
            <a href="/tools" class="btn" style="text-decoration:none;font-size:12px;">🧰 数据工具</a>
        </div>
    </div>
    <div id="dataOverviewContent">
        <div class="loading-state">⏳ 加载中...</div>
    </div>
</div>

<!-- 原始数据 -->
<div class="card" style="margin-top:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="margin:0;">📋 原始数据</h2>
        <div style="display:flex;gap:8px;">
            <input type="text" id="dataSearch" placeholder="搜索文件..." style="padding:6px 10px;border:1px solid #e1e3e6;border-radius:6px;font-size:13px;outline:none;width:200px;" oninput="filterFiles()" />
            <button class="btn" onclick="loadRawData()">🔄 刷新</button>
        </div>
    </div>
    <div id="rawDataContent">
        <div class="loading-state">加载中...</div>
    </div>
</div>

<!-- 文件详情弹窗 -->
<div class="modal-overlay" id="detailModal">
    <div class="modal" style="width:80%;max-width:900px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="margin:0;" id="detailTitle">数据详情</h3>
            <button class="btn" onclick="closeDetailModal()">✕</button>
        </div>
        <div id="detailContent"></div>
    </div>
</div>

<script th:inline="javascript">
const KB_ID = [[${kb.id}]];
var allFiles = [];

async function loadDataOverview() {
    var container = document.getElementById('dataOverviewContent');
    container.innerHTML = '<div class="loading-state">⏳ 分析中...</div>';
    try {
        var resp = await fetch('/data/api/overview/' + KB_ID);
        var result = await resp.json();
        if (!result.ok) {
            container.innerHTML = '<div class="empty-state">加载失败: ' + (result.error || '') + '</div>';
            return;
        }
        var ov = result.overview;
        var html = '';

        if (ov.metrics && ov.metrics.length > 0) {
            html += '<div class="stats-bar">';
            for (var i = 0; i < ov.metrics.length; i++) {
                var m = ov.metrics[i];
                html += '<div class="stat-item">';
                html += '<div class="label">' + escapeHtml(m.label) + '</div>';
                html += '<div class="value">' + (m.icon || '') + ' ' + escapeHtml(m.value) + '</div>';
                html += '</div>';
            }
            html += '</div>';
        }

        if (ov.charts && ov.charts.length > 0) {
            html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;margin-bottom:16px;">';
            for (var i = 0; i < ov.charts.length; i++) {
                var c = ov.charts[i];
                html += '<div style="background:#fafbfc;border:1px solid #e1e3e6;border-radius:10px;padding:16px;">';
                html += '<h4 style="font-size:14px;font-weight:600;margin:0 0 12px;color:#1a1b1e;">' + escapeHtml(c.title) + '</h4>';
                html += '<canvas id="kbChart' + i + '" style="max-height:200px;"></canvas>';
                html += '</div>';
            }
            html += '</div>';
        }

        if (ov.insights && ov.insights.length > 0) {
            html += '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:16px;">';
            html += '<h4 style="font-size:14px;font-weight:600;margin:0 0 8px;color:#166534;">💡 AI 洞察</h4>';
            for (var i = 0; i < ov.insights.length; i++) {
                html += '<p style="font-size:13px;color:#166534;margin:4px 0;line-height:1.6;">' + escapeHtml(ov.insights[i]) + '</p>';
            }
            html += '</div>';
        }

        container.innerHTML = html || '<div class="empty-state">暂无数据</div>';

        if (ov.charts && ov.charts.length > 0) {
            var colors = ['#7c5cfc','#f59e0b','#10b981','#ef4444','#6366f1','#ec4899','#14b8a6','#f97316'];
            for (var i = 0; i < ov.charts.length; i++) {
                var c = ov.charts[i];
                var ctx = document.getElementById('kbChart' + i);
                if (!ctx) continue;
                var chartType = c.type || 'bar';
                var config = {
                    type: chartType,
                    data: {
                        labels: c.labels || [],
                        datasets: [{
                            label: c.title || '',
                            data: c.data || [],
                            backgroundColor: colors.slice(0, (c.labels || []).length),
                            borderRadius: 6
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { display: chartType === 'pie' || chartType === 'doughnut' } } }
                };
                if (chartType === 'bar' || chartType === 'line') {
                    config.options.scales = { y: { beginAtZero: true } };
                }
                new Chart(ctx, config);
            }
        }
    } catch(e) {
        container.innerHTML = '<div class="empty-state">加载失败</div>';
    }
}

async function loadRawData() {
    var container = document.getElementById('rawDataContent');
    container.innerHTML = '<div class="loading-state">加载中...</div>';
    try {
        var resp = await fetch('/kb/' + KB_ID + '/api/data/list?dir=');
        var data = await resp.json();
        if (!data.ok || !data.files || data.files.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无数据文件</p></div>';
            return;
        }
        allFiles = data.files;
        renderFiles(allFiles);
    } catch(e) {
        container.innerHTML = '<div class="empty-state">加载失败</div>';
    }
}

function renderFiles(files) {
    var container = document.getElementById('rawDataContent');
    if (files.length === 0) {
        container.innerHTML = '<div class="empty-state">没有匹配的文件</div>';
        return;
    }
    var html = '<div class="data-table-container"><table class="data-table">';
    html += '<thead><tr>';
    html += '<th>文件名</th><th>大小</th><th>更新时间</th><th>操作</th>';
    html += '</tr></thead><tbody>';
    for (var i = 0; i < files.length; i++) {
        var f = files[i];
        var size = f.size > 1024 ? (f.size/1024).toFixed(1) + 'KB' : f.size + 'B';
        var date = f.lastModified ? new Date(f.lastModified).toLocaleString() : '';
        var filePath = f.path;
        var dir = filePath.includes('/') ? filePath.substring(0, filePath.lastIndexOf('/')) : '';
        var fileName = f.name.replace('.json', '');
        html += '<tr>';
        html += '<td>📄 ' + escapeHtml(f.name) + '</td>';
        html += '<td>' + size + '</td>';
        html += '<td>' + date + '</td>';
        html += '<td><div class="data-row-actions">';
        html += '<a href="/kb/' + KB_ID + '/data/detail?dir=' + encodeURIComponent(dir) + '&file=' + encodeURIComponent(fileName) + '" class="btn" style="text-decoration:none;">查看</a>';
        html += '</div></td>';
        html += '</tr>';
    }
    html += '</tbody></table></div>';
    container.innerHTML = html;
}

function filterFiles() {
    var query = document.getElementById('dataSearch').value.toLowerCase();
    var filtered = allFiles.filter(function(f) { return f.name.toLowerCase().indexOf(query) >= 0; });
    renderFiles(filtered);
}

async function viewFile(path) {
    document.getElementById('detailTitle').textContent = '数据详情';
    document.getElementById('detailContent').innerHTML = '<div class="loading-state">加载中...</div>';
    document.getElementById('detailModal').classList.add('active');
    
    try {
        var resp = await fetch('/kb/' + KB_ID + '/api/data/read?dir=&file=' + encodeURIComponent(path));
        var data = await resp.json();
        if (!data.ok) {
            document.getElementById('detailContent').innerHTML = '<div class="empty-state">加载失败</div>';
            return;
        }
        var fileData = data.data;
        var html = '';
        
        if (fileData && typeof fileData === 'object') {
            if (fileData.groups) {
                var groups = fileData.groups;
                var groupNames = Object.keys(groups);
                html += '<div class="stats-bar">';
                html += '<div class="stat-item"><div class="label">分组数</div><div class="value">' + groupNames.length + '</div></div>';
                var totalCount = 0;
                groupNames.forEach(function(g) { totalCount += (groups[g].count || 0); });
                html += '<div class="stat-item"><div class="label">总记录数</div><div class="value">' + totalCount + '</div></div>';
                html += '</div>';
                
                for (var i = 0; i < groupNames.length; i++) {
                    var groupName = groupNames[i];
                    var group = groups[groupName];
                    html += '<div style="margin-bottom:16px;">';
                    html += '<h4 style="font-size:14px;margin:0 0 8px;">' + escapeHtml(groupName) + ' (' + (group.count || 0) + ' 条)</h4>';
                    if (group.data && group.data.length > 0) {
                        var keys = Object.keys(group.data[0]);
                        html += '<div class="data-table-container"><table class="data-table"><thead><tr>';
                        keys.forEach(function(k) { html += '<th>' + escapeHtml(k) + '</th>'; });
                        html += '</tr></thead><tbody>';
                        var showData = group.data.slice(0, 10);
                        showData.forEach(function(row) {
                            html += '<tr>';
                            keys.forEach(function(k) {
                                var val = row[k];
                                if (typeof val === 'object') val = JSON.stringify(val);
                                html += '<td title="' + escapeHtml(String(val)) + '">' + escapeHtml(String(val).substring(0, 50)) + '</td>';
                            });
                            html += '</tr>';
                        });
                        html += '</tbody></table></div>';
                        if (group.data.length > 10) {
                            html += '<div style="text-align:center;color:#909296;font-size:12px;padding:8px;">显示前 10 条，共 ' + group.data.length + ' 条</div>';
                        }
                    }
                    html += '</div>';
                }
            } else if (Array.isArray(fileData)) {
                html += '<div class="stats-bar">';
                html += '<div class="stat-item"><div class="label">记录数</div><div class="value">' + fileData.length + '</div></div>';
                html += '</div>';
                if (fileData.length > 0) {
                    var keys = Object.keys(fileData[0]);
                    html += '<div class="data-table-container"><table class="data-table"><thead><tr>';
                    keys.forEach(function(k) { html += '<th>' + escapeHtml(k) + '</th>'; });
                    html += '</tr></thead><tbody>';
                    var showData = fileData.slice(0, 10);
                    showData.forEach(function(row) {
                        html += '<tr>';
                        keys.forEach(function(k) {
                            var val = row[k];
                            if (typeof val === 'object') val = JSON.stringify(val);
                            html += '<td title="' + escapeHtml(String(val)) + '">' + escapeHtml(String(val).substring(0, 50)) + '</td>';
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table></div>';
                }
            } else {
                html += '<pre style="background:#f5f5f5;padding:12px;border-radius:8px;overflow-x:auto;font-size:12px;">' + escapeHtml(JSON.stringify(fileData, null, 2)) + '</pre>';
            }
        }
        
        document.getElementById('detailContent').innerHTML = html || '<div class="empty-state">无数据</div>';
    } catch(e) {
        document.getElementById('detailContent').innerHTML = '<div class="empty-state">加载失败</div>';
    }
}

function closeDetailModal() {
    document.getElementById('detailModal').classList.remove('active');
}

function escapeHtml(t) { if (!t) return ''; var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

document.addEventListener('DOMContentLoaded', function() {
    loadDataOverview();
    loadRawData();
});
</script>

</th:block>
</body>
</html>
