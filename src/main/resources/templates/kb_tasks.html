<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title layout:fragment="title">任务看板</title>
</head>
<body>
<th:block layout:fragment="content">

<div th:if="${kb != null}" style="font-size:13px;color:#909296;margin-bottom:8px;display:flex;align-items:center;gap:4px;">
    <a th:href="@{/kb/{id}(id=${kb.id})}" style="color:#7c5cfc;text-decoration:none;" th:text="${kb.name}">知识库</a>
    <span>›</span>
    <span th:text="${labels.get('tasks')}">任务</span>
</div>

<div th:if="${kb != null}" style="display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid #e1e3e6;">
    <a th:href="@{/kb/{id}/tasks(id=${kb.id})}" style="padding:10px 20px;font-size:14px;text-decoration:none;color:#7c5cfc;border-bottom:2px solid #7c5cfc;font-weight:600;" th:text="${labels.get('tasks')}">任务</a>
    <a th:href="@{/kb/{id}/reminders(id=${kb.id})}" style="padding:10px 20px;font-size:14px;text-decoration:none;color:#5c5f66;border-bottom:2px solid transparent;" th:text="${labels.get('reminders')}">提醒</a>
    <a th:href="@{/kb/{id}/modules(id=${kb.id})}" style="padding:10px 20px;font-size:14px;text-decoration:none;color:#5c5f66;border-bottom:2px solid transparent;" th:text="${labels.get('modules')}">模块</a>
    <a th:href="@{/kb/{id}/notes(id=${kb.id})}" style="padding:10px 20px;font-size:14px;text-decoration:none;color:#5c5f66;border-bottom:2px solid transparent;" th:text="${labels.get('notes')}">笔记</a>
    <a th:href="@{/kb/{id}/config(id=${kb.id})}" style="padding:10px 20px;font-size:14px;text-decoration:none;color:#5c5f66;border-bottom:2px solid transparent;" th:text="${labels.get('config')}">配置</a>
</div>

<div class="card">
    <h2>📋 任务看板</h2>
    <div class="text-muted mb-2">
        管理所有待办任务
        <span th:if="${error}" style="color:#e03131;margin-left:8px;">⚠️ <span th:text="${error}">错误</span></span>
    </div>
</div>

<div class="card" id="config-card" style="display:none;text-align:center;padding:30px 20px;border:2px dashed #d9d0ff;background:#fafafe;">
    <div style="font-size:16px;font-weight:600;color:#7c5cfc;margin-bottom:8px;">📁 尚未配置任务数据目录</div>
    <div class="text-muted" style="margin-bottom:16px;">请在 <a href="/config" style="color:#7c5cfc;">配置页面</a> 中设置「任务数据目录」，程序将读取该目录下的 data.json 文件。</div>
    <a href="/config" class="btn btn-primary">去配置</a>
</div>

<div style="display:flex;gap:8px;margin-bottom:16px;">
    <button class="btn btn-primary" onclick="showAddModal()">+ 添加任务</button>
</div>

<div id="task-board" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
    <!-- 待办 -->
    <div class="task-column">
        <div class="column-header" style="background:#fff3e0;border-bottom:3px solid #ff9800;">
            <span>📋 待办</span>
            <span class="task-count" id="count-pending">0</span>
        </div>
        <div class="task-list" id="column-pending"></div>
    </div>
    <!-- 进行中 -->
    <div class="task-column">
        <div class="column-header" style="background:#e3f2fd;border-bottom:3px solid #2196f3;">
            <span>🔄 进行中</span>
            <span class="task-count" id="count-in_progress">0</span>
        </div>
        <div class="task-list" id="column-in_progress"></div>
    </div>
    <!-- 已完成 -->
    <div class="task-column">
        <div class="column-header" style="background:#e8f5e9;border-bottom:3px solid #4caf50;">
            <span>✅ 已完成</span>
            <span class="task-count" id="count-done">0</span>
        </div>
        <div class="task-list" id="column-done"></div>
    </div>
</div>

<!-- 添加/编辑任务弹窗 -->
<div class="modal-overlay" id="task-modal">
    <div class="modal" style="width:520px;">
        <h3 id="modal-title">添加任务</h3>
        <input type="hidden" id="task-id">
        <div class="form-group" style="margin-bottom:12px;">
            <label>标题 *</label>
            <input type="text" id="task-title" placeholder="任务标题" style="width:100%;">
        </div>
        <div class="form-group" style="margin-bottom:12px;">
            <label>描述</label>
            <textarea id="task-description" rows="3" placeholder="任务描述（可选）" style="width:100%;"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group" style="margin-bottom:12px;">
                <label>优先级</label>
                <select id="task-priority" style="width:100%;">
                    <option value="high">🔴 高优先级</option>
                    <option value="mid" selected>🟡 中优先级</option>
                    <option value="low">🟢 低优先级</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <label>截止日期</label>
                <input type="date" id="task-dueDate" style="width:100%;">
            </div>
        </div>
        <div class="form-group" id="edit-status-group" style="display:none;margin-bottom:12px;">
            <label>状态</label>
            <select id="task-status" style="width:100%;">
                <option value="pending">📋 待办</option>
                <option value="in_progress">🔄 进行中</option>
                <option value="done">✅ 已完成</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('task-modal')">取消</button>
            <button class="btn btn-primary" onclick="saveTask()">保存</button>
        </div>
    </div>
</div>

<style>
.task-column {
    background:#fff;
    border:1px solid #e1e3e6;
    border-radius:12px;
    overflow:hidden;
    min-height:200px;
}
.column-header {
    padding:12px 16px;
    font-size:14px;
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:space-between;
}
.task-count {
    font-size:12px;
    background:rgba(0,0,0,0.08);
    padding:2px 8px;
    border-radius:10px;
}
.task-list {
    padding:8px;
    min-height:120px;
}
.task-card {
    background:#fafafe;
    border:1px solid #eef0f4;
    border-radius:8px;
    padding:12px;
    margin-bottom:8px;
    cursor:pointer;
    transition:all .15s;
    position:relative;
}
.task-card:hover {
    border-color:#d9d0ff;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.task-card .title {
    font-size:14px;
    font-weight:500;
    margin-bottom:4px;
    color:#1a1b1e;
}
.task-card .meta {
    font-size:11px;
    color:#909296;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}
.task-card .priority-dot {
    display:inline-block;
    width:8px;
    height:8px;
    border-radius:50%;
    margin-right:4px;
}
.task-card .priority-high .priority-dot { background:#e03131; }
.task-card .priority-mid .priority-dot { background:#e8590c; }
.task-card .priority-low .priority-dot { background:#2b8a3e; }
.task-card .card-actions {
    position:absolute;
    top:8px;
    right:8px;
    display:none;
    gap:4px;
}
.task-card:hover .card-actions {
    display:flex;
}
.task-card .card-actions button {
    border:none;
    background:#fff;
    border-radius:4px;
    padding:2px 6px;
    font-size:12px;
    cursor:pointer;
    color:#5c5f66;
    border:1px solid #e1e3e6;
}
.task-card .card-actions button:hover {
    background:#f0edff;
    color:#7c5cfc;
}
.task-card .description {
    font-size:12px;
    color:#5c5f66;
    margin-top:4px;
    line-height:1.5;
}
.status-btn {
    display:inline-block;
    padding:2px 8px;
    border-radius:4px;
    font-size:11px;
    cursor:pointer;
    border:1px solid #e1e3e6;
    background:#fff;
    color:#5c5f66;
    margin-top:6px;
}
.status-btn:hover {
    background:#f0edff;
    border-color:#d9d0ff;
}
@media (max-width: 768px) {
    #task-board {
        grid-template-columns:1fr;
    }
}
</style>

<script th:inline="javascript">
var tasks = /*[[${tasks}]]*/ [];
var isEdit = false;
const KB_ID = [[${kb.id}]];

document.addEventListener('DOMContentLoaded', function() {
    if (!tasks || tasks.length === 0) {
        checkConfig();
    }
    renderBoard();
});

async function checkConfig() {
    try {
        var resp = await fetch('/api/config');
        var cfg = await resp.json();
        if (!cfg.todoDataDir) {
            document.getElementById('config-card').style.display = 'block';
            document.getElementById('task-board').style.display = 'none';
        }
    } catch(e) {}
}

function renderBoard() {
    var columns = { pending: [], in_progress: [], done: [] };
    tasks.forEach(function(t) {
        if (columns[t.status]) columns[t.status].push(t);
        else columns['pending'].push(t);
    });

    for (var status in columns) {
        var list = document.getElementById('column-' + status);
        var count = document.getElementById('count-' + status);
        var items = columns[status];
        count.textContent = items.length;

        if (items.length === 0) {
            list.innerHTML = '<div class="text-muted" style="padding:20px;text-align:center;font-size:13px;">暂无任务</div>';
            continue;
        }

        var html = '';
        for (var i = 0; i < items.length; i++) {
            var t = items[i];
            var priorityLabel = {high:'🔴 高', mid:'🟡 中', low:'🟢 低'};
            var pLabel = priorityLabel[t.priority] || '🟡 中';

            html += '<div class="task-card" onclick="editTask(\'' + t.id + '\')">';
            html += '<div class="card-actions">';
            html += '<button onclick="event.stopPropagation();deleteTask(\'' + t.id + '\')" title="删除">🗑️</button>';
            html += '</div>';
            html += '<div class="title">' + escapeHtml(t.title) + '</div>';
            if (t.description) {
                html += '<div class="description">' + escapeHtml(t.description) + '</div>';
            }
            html += '<div class="meta">';
            html += '<span class="priority-' + t.priority + '"><span class="priority-dot"></span>' + pLabel + '</span>';
            if (t.dueDate) html += '<span>📅 ' + t.dueDate + '</span>';
            html += '</div>';

            // Quick status change buttons
            var nextStatuses = getNextStatuses(t.status);
            if (nextStatuses.length > 0) {
                html += '<div style="margin-top:6px;display:flex;gap:4px;">';
                for (var j = 0; j < nextStatuses.length; j++) {
                    var ns = nextStatuses[j];
                    var nsLabel = {pending:'📋 待办', in_progress:'🔄 进行中', done:'✅ 已完成'};
                    html += '<button class="status-btn" onclick="event.stopPropagation();quickChangeStatus(\'' + t.id + '\',\'' + ns + '\')">' + nsLabel[ns] + '</button>';
                }
                html += '</div>';
            }

            html += '</div>';
        }
        list.innerHTML = html;
    }
}

function getNextStatuses(current) {
    if (current === 'pending') return ['in_progress'];
    if (current === 'in_progress') return ['done', 'pending'];
    if (current === 'done') return ['pending'];
    return [];
}

function showAddModal() {
    isEdit = false;
    document.getElementById('modal-title').textContent = '添加任务';
    document.getElementById('task-id').value = '';
    document.getElementById('task-title').value = '';
    document.getElementById('task-description').value = '';
    document.getElementById('task-priority').value = 'mid';
    document.getElementById('task-dueDate').value = '';
    document.getElementById('edit-status-group').style.display = 'none';
    document.getElementById('task-modal').classList.add('active');
    setTimeout(function() { document.getElementById('task-title').focus(); }, 100);
}

function editTask(id) {
    var t = tasks.find(function(x) { return x.id === id; });
    if (!t) return;

    isEdit = true;
    document.getElementById('modal-title').textContent = '编辑任务';
    document.getElementById('task-id').value = t.id;
    document.getElementById('task-title').value = t.title;
    document.getElementById('task-description').value = t.description || '';
    document.getElementById('task-priority').value = t.priority;
    document.getElementById('task-dueDate').value = t.dueDate || '';
    document.getElementById('task-status').value = t.status;
    document.getElementById('edit-status-group').style.display = 'block';
    document.getElementById('task-modal').classList.add('active');
}

function closeModal(id) {
    document.getElementById(id).classList.remove('active');
}
document.querySelectorAll('.modal-overlay').forEach(function(m) {
    m.addEventListener('click', function(e) {
        if (e.target === this) closeModal(this.id);
    });
});

async function saveTask() {
    var title = document.getElementById('task-title').value.trim();
    if (!title) { toast('请输入任务标题', 'error'); return; }

    var id = document.getElementById('task-id').value;
    var description = document.getElementById('task-description').value.trim();
    var priority = document.getElementById('task-priority').value;
    var dueDate = document.getElementById('task-dueDate').value;

    var url, formData;
    if (isEdit) {
        var status = document.getElementById('task-status').value;
        url = '/kb/' + KB_ID + '/api/tasks/update';
        formData = new URLSearchParams();
        formData.append('taskId', id);
        formData.append('title', title);
        formData.append('description', description);
        formData.append('priority', priority);
        formData.append('dueDate', dueDate);
        formData.append('status', status);
    } else {
        url = '/kb/' + KB_ID + '/api/tasks/add';
        formData = new URLSearchParams();
        formData.append('title', title);
        formData.append('description', description);
        formData.append('priority', priority);
        formData.append('dueDate', dueDate);
    }

    try {
        var resp = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });
        var data = await resp.json();
        if (data.ok) {
            toast(isEdit ? '✅ 任务已更新' : '✅ 任务已添加');
            closeModal('task-modal');
            location.reload();
        } else {
            toast('❌ ' + (data.error || '操作失败'), 'error');
        }
    } catch(e) {
        toast('❌ 请求失败: ' + e.message, 'error');
    }
}

async function quickChangeStatus(id, newStatus) {
    var formData = new URLSearchParams();
    formData.append('taskId', id);
    formData.append('status', newStatus);

    try {
        var resp = await fetch('/kb/' + KB_ID + '/api/tasks/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });
        var data = await resp.json();
        if (data.ok) {
            var statusLabel = {pending:'📋 待办', in_progress:'🔄 进行中', done:'✅ 已完成'};
            toast('✅ 状态已变更为: ' + (statusLabel[newStatus] || newStatus));
            location.reload();
        } else {
            toast('❌ ' + (data.error || '更新失败'), 'error');
        }
    } catch(e) {
        toast('❌ 请求失败: ' + e.message, 'error');
    }
}

async function deleteTask(id) {
    if (!confirm('确定要删除这个任务吗？')) return;

    var formData = new URLSearchParams();
    formData.append('taskId', id);

    try {
        var resp = await fetch('/kb/' + KB_ID + '/api/tasks/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });
        var data = await resp.json();
        if (data.ok) {
            toast('🗑️ 任务已删除');
            location.reload();
        } else {
            toast('❌ ' + (data.error || '删除失败'), 'error');
        }
    } catch(e) {
        toast('❌ 请求失败: ' + e.message, 'error');
    }
}

function escapeHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>

</th:block>
</body>
</html>
