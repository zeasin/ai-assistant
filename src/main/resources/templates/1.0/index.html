<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{1.0/layout}">
<head>
    <title layout:fragment="title">首页 - AI 助理</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .home-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:20px; }
        .home-stat { background:#fff; border:1px solid #e1e3e6; border-radius:10px; padding:16px; text-align:center; }
        .home-stat .num { font-size:28px; font-weight:700; color:#7c5cfc; }
        .home-stat .label { font-size:12px; color:#5c5f66; margin-top:4px; }
        .home-section { background:#fff; border:1px solid #e1e3e6; border-radius:12px; padding:20px; margin-bottom:16px; }
        .home-section h2 { font-size:16px; font-weight:600; margin:0 0 16px; color:#1a1b1e; display:flex; align-items:center; gap:8px; }
        .kb-summary { border:1px solid #e1e3e6; border-radius:10px; padding:16px; margin-bottom:12px; }
        .kb-summary:last-child { margin-bottom:0; }
        .kb-summary-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .kb-summary-name { font-size:14px; font-weight:600; color:#1a1b1e; display:flex; align-items:center; gap:6px; }
        .kb-summary-stats { display:flex; gap:12px; font-size:12px; color:#5c5f66; }
        .kb-summary-stats span { display:flex; align-items:center; gap:4px; }
        .kb-report { background:linear-gradient(135deg,#f0edff,#fafafe); border:1px solid #d9d0ff; border-radius:8px; padding:12px; margin-top:8px; cursor:pointer; }
        .kb-report:hover { box-shadow:0 2px 8px rgba(124,92,252,0.1); }
        .kb-report-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:12px; }
        .kb-report-title { color:#7c5cfc; font-weight:500; }
        .kb-report-date { color:#909296; }
        .kb-report-content { font-size:13px; line-height:1.7; color:#3c4043; }
        .kb-report-content h1 { font-size:18px; margin:16px 0 8px; }
        .kb-report-content h2 { font-size:16px; margin:14px 0 6px; }
        .kb-report-content h3 { font-size:14px; margin:12px 0 4px; }
        .kb-report-content p { margin:8px 0; }
        .kb-report-content ul, .kb-report-content ol { padding-left:20px; margin:8px 0; }
        .kb-report-content li { margin:4px 0; }
        .kb-report-content strong { font-weight:600; }
        .kb-report-content hr { border:none; border-top:1px solid #e1e3e6; margin:12px 0; }
        .kb-no-report { text-align:center; color:#909296; font-size:13px; padding:16px; border:1px dashed #d9d0ff; border-radius:8px; }
        .kb-actions { display:flex; gap:8px; margin-top:12px; }
        .kb-actions a { flex:1; text-align:center; padding:8px 12px; border-radius:6px; font-size:12px; text-decoration:none; transition:all .15s; }
        .kb-actions .btn-chat { background:#7c5cfc; color:#fff; }
        .kb-actions .btn-chat:hover { background:#6b4de6; }
        .kb-actions .btn-notes { background:#f0edff; color:#7c5cfc; }
        .kb-actions .btn-notes:hover { background:#e0dcff; }
        .quick-links { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; }
        .quick-link { display:flex; flex-direction:column; align-items:center; gap:8px; padding:16px 12px; background:#fafafe; border:1px solid #e1e3e6; border-radius:10px; text-decoration:none; color:#5c5f66; transition:all .15s; }
        .quick-link:hover { background:#f0edff; border-color:#7c5cfc; color:#7c5cfc; }
        .quick-link .icon { font-size:24px; }
        .quick-link .text { font-size:12px; font-weight:500; }
    </style>
</head>
<body>
<th:block layout:fragment="content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h1 style="font-size:22px;font-weight:600;margin:0;">📊 工作台</h1>
        <button class="btn btn-primary" onclick="showAddKbModal()">+ 添加笔记库</button>
    </div>

    <!-- 统计卡片 -->
    <div class="home-stats">
        <div class="home-stat">
            <div class="num" th:text="${kbCount}">0</div>
            <div class="label">笔记库</div>
        </div>
        <div class="home-stat">
            <div class="num" style="color:#f59e0b;" th:text="${totalTasks}">0</div>
            <div class="label">待办任务</div>
        </div>
        <div class="home-stat">
            <div class="num" style="color:#10b981;" th:text="${totalReminders}">0</div>
            <div class="label">提醒</div>
        </div>
        <div class="home-stat">
            <div class="num" style="color:#7c5cfc;">●</div>
            <div class="label" th:text="${llmConfigured} ? 'AI 已就绪' : 'AI 未配置'">AI 状态</div>
        </div>
    </div>

    <!-- 笔记库卡片 -->
    <div th:if="${#lists.size(kbSummaries) > 0}" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:20px;">
        <div th:each="kb : ${kbSummaries}" style="background:#fff;border:1px solid #e1e3e6;border-radius:12px;padding:16px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <div style="font-size:15px;font-weight:600;color:#1a1b1e;">📂 <span th:text="${kb.name}">笔记库</span></div>
                <div style="font-size:12px;color:#5c5f66;">
                    <span style="margin-right:8px;">📋 <span th:text="${kb.taskCount}">0</span> 待办</span>
                    <span>🔔 <span th:text="${kb.reminderCount}">0</span> 提醒</span>
                </div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <a th:href="@{/chat(kbId=${kb.id})}" style="flex:1;min-width:60px;text-align:center;padding:8px 12px;background:#7c5cfc;color:#fff;border-radius:6px;font-size:12px;text-decoration:none;">💬 对话</a>
                <a th:href="@{/kb/{id}/notes(id=${kb.id})}" style="flex:1;min-width:60px;text-align:center;padding:8px 12px;background:#f0edff;color:#7c5cfc;border-radius:6px;font-size:12px;text-decoration:none;">📂 笔记</a>
                <a th:href="@{/kb/{id}/data(id=${kb.id})}" style="flex:1;min-width:60px;text-align:center;padding:8px 12px;background:#f0edff;color:#7c5cfc;border-radius:6px;font-size:12px;text-decoration:none;">📈 数据</a>
                <a th:href="@{/kb/{id}/ai(id=${kb.id})}" style="flex:1;min-width:60px;text-align:center;padding:8px 12px;background:#f0edff;color:#7c5cfc;border-radius:6px;font-size:12px;text-decoration:none;">🤖 AI 中心</a>
                <a th:href="@{/kb/{id}/ai(id=${kb.id})}" style="flex:1;min-width:60px;text-align:center;padding:8px 12px;background:#f5f5f7;color:#5c5f66;border-radius:6px;font-size:12px;text-decoration:none;">⚙️ 配置</a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.size(kbSummaries) == 0}" class="home-section" style="text-align:center;padding:40px;">
        <div style="font-size:48px;margin-bottom:12px;">📚</div>
        <div style="font-size:16px;font-weight:600;color:#7c5cfc;margin-bottom:8px;">尚未配置笔记库</div>
        <a href="/kb" style="color:#7c5cfc;">前往添加 →</a>
    </div>

    <!-- 笔记库AI概览 -->
    <div th:if="${#lists.size(kbSummaries) > 0}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2 style="margin:0;font-size:18px;font-weight:600;">📚 笔记库AI概览</h2>
        </div>

        <div th:each="kb : ${kbSummaries}" class="home-section" style="margin-bottom:16px;">
            <!-- 笔记库标题 + Tab -->
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <h3 style="margin:0;font-size:15px;">📂 <span th:text="${kb.name}">笔记库</span></h3>
            </div>
            <div th:id="'kb-tabs-' + ${kb.id}" style="display:flex;gap:0;border-bottom:2px solid #e1e3e6;margin-bottom:12px;">
                <button class="kb-home-tab active" th:onclick="'kbHomeSwitchTab(' + ${kb.id} + ', \'ai\', this)'" style="padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#7c5cfc;border-bottom:2px solid #7c5cfc;margin-bottom:-2px;font-weight:600;">📊 AI 分析</button>
                <button class="kb-home-tab" th:onclick="'kbHomeSwitchTab(' + ${kb.id} + ', \'data\', this)'" style="padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#5c5f66;border-bottom:2px solid transparent;margin-bottom:-2px;">📈 数据概览</button>
            </div>

            <!-- AI 分析内容 -->
            <div th:id="'kb-content-ai-' + ${kb.id}" class="kb-home-content">
                <div th:if="${kb.hasReport}" class="kb-report">
                    <div style="font-size:12px;color:#909296;margin-bottom:8px;" th:text="${kb.reportDate}">日期</div>
                    <div class="kb-report-content report" th:utext="${kb.reportHtml}"></div>
                </div>
                <div th:unless="${kb.hasReport}" class="kb-no-report">
                    暂无日报，前往笔记库概览页生成
                </div>
            </div>

            <!-- 数据概览内容 -->
            <div th:id="'kb-content-data-' + ${kb.id}" class="kb-home-content" style="display:none;">
                <div th:id="'home-kb-data-' + ${kb.id}" class="home-kb-data" style="padding:12px;background:#fafafe;border-radius:8px;border:1px solid #e1e3e6;">
                    <div style="padding:16px;text-align:center;font-size:12px;color:#909296;">加载中...</div>
                </div>
                <div style="text-align:right;margin-top:8px;">
                    <a th:href="@{/kb/{id}/data(id=${kb.id})}" style="font-size:12px;color:#7c5cfc;text-decoration:none;">查看详情 →</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑笔记库弹窗 -->
    <div class="modal-overlay" id="kbModal">
        <div class="modal" style="width:560px;">
            <h3 id="kbModalTitle">添加笔记库</h3>
            <input type="hidden" id="kbEditId">
            <div class="form-row">
                <div class="form-group" style="flex:1;">
                    <label>名称 *</label>
                    <input type="text" id="kbName" placeholder="如 工作" style="width:100%;">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group" style="flex:1;">
                    <label>笔记库路径 *</label>
                    <input type="text" id="kbNotesDir" placeholder="D:\projects\notes" style="width:100%;font-family:monospace;">
                </div>
            </div>
            <div class="modal-actions" style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
                <button class="btn btn-secondary" onclick="closeModal('kbModal')">取消</button>
                <button class="btn btn-primary" onclick="submitKb()">保存</button>
            </div>
        </div>
    </div>

    <script>
    function kbHomeSwitchTab(kbId, tab, btn) {
        var tabsContainer = document.getElementById('kb-tabs-' + kbId);
        tabsContainer.querySelectorAll('.kb-home-tab').forEach(function(t) {
            t.classList.remove('active');
            t.style.color = '#5c5f66';
            t.style.borderBottomColor = 'transparent';
            t.style.fontWeight = 'normal';
        });
        btn.classList.add('active');
        btn.style.color = '#7c5cfc';
        btn.style.borderBottomColor = '#7c5cfc';
        btn.style.fontWeight = '600';

        document.getElementById('kb-content-ai-' + kbId).style.display = tab === 'ai' ? '' : 'none';
        document.getElementById('kb-content-data-' + kbId).style.display = tab === 'data' ? '' : 'none';

        if (tab === 'data') {
            var container = document.getElementById('home-kb-data-' + kbId);
            if (container && !container.dataset.loaded) {
                loadHomeKbData(kbId, container);
            }
        }
    }

    async function loadHomeKbData(kbId, container) {
        container.innerHTML = '<div style="padding:16px;text-align:center;font-size:12px;color:#909296;">⏳ 分析中...</div>';
        try {
            var resp = await fetch('/data/api/overview/' + kbId);
            var result = await resp.json();
            if (!result.ok) {
                container.innerHTML = '<div style="padding:16px;text-align:center;font-size:12px;color:#909296;">暂无数据</div>';
                return;
            }
            var ov = result.overview;
            var html = '';
            if (ov.metrics && ov.metrics.length > 0) {
                html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:8px;">';
                for (var i = 0; i < ov.metrics.length; i++) {
                    var m = ov.metrics[i];
                    html += '<div style="text-align:center;padding:8px;background:#fff;border-radius:6px;">';
                    html += '<div style="font-size:16px;font-weight:700;color:#7c5cfc;">' + (m.icon || '') + ' ' + escapeHtml(m.value) + '</div>';
                    html += '<div style="font-size:11px;color:#5c5f66;margin-top:2px;">' + escapeHtml(m.label) + '</div>';
                    html += '</div>';
                }
                html += '</div>';
            }
            if (ov.insights && ov.insights.length > 0) {
                html += '<div style="font-size:12px;color:#166534;padding:8px;background:#f0fdf4;border-radius:6px;">';
                html += '<strong>💡 </strong>' + escapeHtml(ov.insights[0]);
                html += '</div>';
            }
            container.innerHTML = html || '<div style="padding:16px;text-align:center;font-size:12px;color:#909296;">暂无数据</div>';
            container.dataset.loaded = 'true';
        } catch(e) {
            container.innerHTML = '<div style="padding:16px;text-align:center;font-size:12px;color:#909296;">加载失败</div>';
        }
    }

    function escapeHtml(t) { if (!t) return ''; var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    // ====== 笔记库管理 ======
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    document.querySelectorAll('.modal-overlay').forEach(function(m) {
        m.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
    });

    function showAddKbModal() {
        document.getElementById('kbModalTitle').textContent = '添加笔记库';
        document.getElementById('kbEditId').value = '';
        document.getElementById('kbName').value = '';
        document.getElementById('kbNotesDir').value = '';
        document.getElementById('kbModal').classList.add('active');
        setTimeout(function(){ document.getElementById('kbName').focus(); }, 100);
    }

    async function submitKb() {
        var name = document.getElementById('kbName').value.trim();
        var notesDir = document.getElementById('kbNotesDir').value.trim();
        if (!name || !notesDir) { toast('名称和路径不能为空', 'error'); return; }

        var editId = document.getElementById('kbEditId').value;
        var body = { name: name, notesDir: notesDir };
        if (editId) body.id = editId;

        try {
            var r = await fetch('/api/kb/save', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
            });
            var d = await r.json();
            if (d.ok) {
                toast(editId ? '✅ 笔记库已更新' : '✅ 笔记库已添加');
                closeModal('kbModal');
                location.reload();
            } else {
                toast('❌ ' + (d.error || '保存失败'), 'error');
            }
        } catch(e) { toast('❌ 请求失败: ' + e.message, 'error'); }
    }
    </script>
</th:block>
</body>
</html>
