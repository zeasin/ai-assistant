<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{1.0/layout}">
<head>
    <title layout:fragment="title">文件浏览</title>
</head>
<body>
<th:block layout:fragment="content">

<th:block th:replace="~{1.0/kb_tab_bar :: kb-tabs('notes', ${kb}, ${labels})}" />

<div class="card">
    <div th:if="${error != null and !error.isEmpty()}" class="alert alert-error" style="background:#fff0f0;color:#c92a2a;padding:10px 16px;border-radius:8px;margin-bottom:12px;font-size:14px;border:1px solid #ffc9c9;" th:text="${error}">错误</div>
    <div class="flex" style="justify-content:space-between;margin-bottom:16px;">
        <h2>📂 笔记文件浏览</h2>
        <div class="flex">
            <button class="btn btn-primary" onclick="showNewModal()">✏️ 新建</button>
            <button th:if="${rel != null and !rel.isEmpty()}" class="btn btn-secondary" onclick="openAnalyzeModal()">🤖 AI 分析</button>
            <a th:if="${rel != null && !rel.isEmpty()}" class="btn btn-secondary"
               th:with="parentDir=${parent != null && !parent.isEmpty() ? '?dir=' + parent : ''}"
               th:href="@{|/kb/${kb.id}/notes${parentDir}|}">← 上级目录</a>
        </div>
    </div>

    <th:block th:if="${breadcrumbs != null and #lists.size(breadcrumbs) > 0}">
    <div class="text-muted mb-2" style="font-size:13px;">
        / <a th:href="@{|/kb/${kb.id}/notes|}">root</a>
        <th:block th:each="crumb, iterStat : ${breadcrumbs}">
            / <a th:href="@{|/kb/${kb.id}/notes?dir=${breadcrumbPaths[iterStat.index]}|}" th:text="${crumb}">folder</a>
        </th:block>
    </div>
    </th:block>

    <th:block th:if="${dirs != null and files != null and (#lists.size(dirs) > 0 or #lists.size(files) > 0)}">
    <table class="log-table">
        <thead>
            <tr>
                <th>名称</th>
                <th>修改时间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="d : ${dirs}">
                <td>
                    📁 <strong th:text="${d.name}">目录名</strong>
                    <span th:if="${d['hasReport']}" style="background:#e8f5e9;color:#2e7d32;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:6px;">已分析</span>
                </td>
                <td th:text="${d.modified}">时间</td>
                <td>
                    <a class="btn btn-secondary"
                       th:with="dirPath=${rel != null && !rel.isEmpty() ? rel + '/' + d.name : d.name}"
                       th:href="@{|/kb/${kb.id}/notes?dir=${dirPath}|}"
                       style="padding:4px 12px;font-size:12px;">打开</a>
                </td>
            </tr>
            <tr th:each="f : ${files}">
                <td>
                    <span th:if="${#strings.endsWith(f.name, '.md')}">📄</span>
                    <span th:unless="${#strings.endsWith(f.name, '.md')}">📎</span>
                    <span th:text="${f.name}">文件名</span>
                </td>
                <td th:text="${f.modified}">时间</td>
                <td>
                    <a th:if="${#strings.endsWith(f.name, '.md')}" class="btn btn-primary"
                       th:with="filePath=${rel != null && !rel.isEmpty() ? rel + '/' + f.name : f.name}"
                       th:href="@{|/kb/${kb.id}/notes/view?path=${filePath}|}"
                       style="padding:4px 12px;font-size:12px;">查看</a>
                    <button th:if="${#strings.endsWith(f.name, '.md')}" class="btn btn-secondary"
                            th:data-path="${rel != null && !rel.isEmpty() ? rel + '/' + f.name : f.name}"
                            onclick="deleteFile(this.getAttribute('data-path'))"
                            style="padding:4px 12px;font-size:12px;margin-left:4px;">删除</button>
                    <span th:unless="${#strings.endsWith(f.name, '.md')}" class="text-muted">—</span>
                </td>
            </tr>
        </tbody>
    </table>
    </th:block>
    <th:block th:if="${dirs == null or files == null or (#lists.size(dirs) == 0 and #lists.size(files) == 0)}">
    <div class="text-muted">空目录</div>
    </th:block>
</div>

<th:block th:if="${rel != null and !rel.isEmpty() and latestReport != null}">
<div class="card" style="background:linear-gradient(135deg,#f0edff,#fafafe);border:1px solid #d9d0ff;margin-top:16px;">
    <h2 style="margin-bottom:8px;">📊 AI 分析报告</h2>
    <div class="report" th:utext="${latestReport}"></div>
</div>
</th:block>

<div class="modal-overlay" id="newModal" style="display:none;" onclick="if(event.target===this)hideNewModal()">
    <div class="modal">
        <div class="flex" style="justify-content:space-between;margin-bottom:12px;">
            <h3 style="margin:0;">✏️ 新建 Markdown 文件</h3>
            <button class="btn btn-secondary" onclick="hideNewModal()" style="padding:4px 10px;">✕</button>
        </div>
        <form id="newForm" onsubmit="return submitNew(event)">
            <input type="hidden" name="dir" th:value="${rel}">
            <div class="form-group">
                <label>文件名</label>
                <input type="text" id="filename" placeholder="文件名（无需 .md）" required>
            </div>
            <div class="form-group">
                <label>内容 (Markdown)</label>
                <textarea id="content" rows="12" placeholder="在此输入 Markdown 内容…"></textarea>
            </div>
            <div class="flex" style="justify-content:flex-end;gap:8px;margin-top:12px;">
                <button type="button" class="btn btn-secondary" onclick="hideNewModal()">取消</button>
                <button type="submit" class="btn btn-primary">创建</button>
            </div>
        </form>
    </div>
</div>

<div class="modal-overlay" id="analyzeModal" style="display:none;" onclick="if(event.target===this)closeAnalyzeModal()">
    <div class="modal">
        <div class="flex" style="justify-content:space-between;margin-bottom:12px;">
            <h3 style="margin:0;">🤖 AI 分析 - <span id="analyzeDirName"></span></h3>
            <button class="btn btn-secondary" onclick="closeAnalyzeModal()" style="padding:4px 10px;">✕</button>
        </div>
        <textarea id="analyzePrompt" rows="3" placeholder="输入分析提示词（可留空，AI 将自行决定分析内容）"
            style="width:100%;padding:10px;border:1px solid #e1e3e6;border-radius:8px;font-size:13px;
                   font-family:monospace;resize:vertical;box-sizing:border-box;"></textarea>
        <div id="analyzeResult" style="margin-top:12px;display:none;">
            <div style="max-height:400px;overflow-y:auto;padding:12px;background:#f9f9fb;border-radius:8px;"
                 id="analyzeResultContent"></div>
        </div>
        <div class="flex" style="gap:8px;margin-top:12px;justify-content:flex-end;">
            <button class="btn btn-secondary" onclick="closeAnalyzeModal()">取消</button>
            <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalysis()">🚀 开始分析</button>
        </div>
    </div>
</div>

<style>
.modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 100;
    display: flex; align-items: center; justify-content: center;
}
.modal {
    background: #fff; border-radius: 12px; padding: 24px;
    width: 600px; max-width: 90vw; max-height: 80vh; overflow-y: auto;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
}
.form-group { margin-bottom: 12px; }
.form-group label {
    display: block; font-size: 13px; font-weight: 500; color: #5c5f66; margin-bottom: 4px;
}
.form-group input, .form-group textarea {
    width: 100%; padding: 10px 12px; border: 1px solid #e1e3e6; border-radius: 8px;
    font-size: 14px; outline: none; font-family: inherit; box-sizing: border-box;
}
.form-group input:focus, .form-group textarea:focus { border-color: #7c5cfc; }
.form-group textarea { resize: vertical; font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; }
</style>

<script th:inline="javascript">
const KB_ID = [[${kb.id}]];
const CURRENT_DIR = [[${rel}]];

function showNewModal() {
    document.getElementById('newModal').style.display = 'flex';
    document.getElementById('filename').focus();
}
function hideNewModal() {
    document.getElementById('newModal').style.display = 'none';
}
async function submitNew(e) {
    e.preventDefault();
    const filename = document.getElementById('filename').value.trim();
    const content = document.getElementById('content').value;
    if (!filename) { toast('请输入文件名', 'error'); return; }

    const form = new FormData();
    form.set('dir', CURRENT_DIR);
    form.set('filename', filename);
    form.set('content', content);

    const res = await fetch('/kb/' + KB_ID + '/notes/new', { method: 'POST', body: form });
    const data = await res.json();
    if (data.ok) {
        toast('创建成功！', 'success');
        hideNewModal();
        setTimeout(() => location.reload(), 300);
    } else {
        toast('创建失败：' + (data.error || '未知错误'), 'error');
    }
    return false;
}
async function deleteFile(path) {
    if (!confirm('确定要删除这个文件吗？')) return;
    const res = await fetch('/kb/' + KB_ID + '/notes/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'path=' + encodeURIComponent(path),
    });
    const data = await res.json();
    if (data.ok) {
        toast('已删除', 'success');
        location.reload();
    } else {
        toast('删除失败：' + (data.error || '未知错误'), 'error');
    }
}

function openAnalyzeModal() {
    document.getElementById('analyzeDirName').textContent = CURRENT_DIR;
    document.getElementById('analyzePrompt').value = '';
    document.getElementById('analyzeResult').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('analyzeBtn').textContent = '🚀 开始分析';
    document.getElementById('analyzeModal').style.display = 'flex';
}

function closeAnalyzeModal() {
    document.getElementById('analyzeModal').style.display = 'none';
}

function startAnalysis() {
    var btn = document.getElementById('analyzeBtn');
    btn.disabled = true; btn.textContent = '⏳ 分析中...';
    var resultDiv = document.getElementById('analyzeResult');
    var resultContent = document.getElementById('analyzeResultContent');
    resultDiv.style.display = 'block';
    resultContent.innerHTML = '<span class="text-muted">AI 正在探索目录并分析内容...</span>';

    var prompt = document.getElementById('analyzePrompt').value;
    var url = '/kb/' + KB_ID + '/api/analyze-dir?dir=' + encodeURIComponent(CURRENT_DIR)
              + '&prompt=' + encodeURIComponent(prompt);

    var evtSource = new EventSource(url);
    evtSource.onmessage = function(e) {
        var data = JSON.parse(e.data);
        if (data.type === 'text') {
            resultContent.innerHTML = data.content.replace(/\n/g, '<br>');
            btn.textContent = '✅ 分析完成';
            setTimeout(function() { location.reload(); }, 1000);
        } else if (data.type === 'error') {
            resultContent.innerHTML = '<span style="color:red;">' + data.content + '</span>';
            btn.disabled = false; btn.textContent = '🚀 重新分析';
        } else if (data.type === 'done') {
            evtSource.close();
        }
    };
    evtSource.onerror = function() {
        evtSource.close();
        btn.disabled = false; btn.textContent = '🚀 重新分析';
    };
}
</script>

</th:block>
</body>
</html>
