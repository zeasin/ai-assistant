<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${currentDir} + ' - AI 助理'">目录</title>
    <style>
        .tab-bar { display:flex; gap:4px; margin-bottom:20px; border-bottom:2px solid #e1e3e6; padding-bottom:0; }
        .tab-btn {
            padding:10px 20px; border:none; background:none; cursor:pointer;
            font-size:14px; color:#5c5f66; border-bottom:2px solid transparent;
            margin-bottom:-2px; transition:all .15s;
        }
        .tab-btn:hover { color:#1a1b1e; background:#f5f5f7; border-radius:8px 8px 0 0; }
        .tab-btn.active { color:#7c5cfc; border-bottom-color:#7c5cfc; font-weight:600; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        .tree { list-style:none; padding-left:0; margin:0; }
        .tree ul { list-style:none; padding-left:20px; margin:0; }
        .tree li { margin:0; }
        .tree-node {
            display:flex; align-items:center; gap:6px; padding:6px 10px;
            cursor:pointer; border-radius:6px; font-size:13px; user-select:none;
        }
        .tree-node:hover { background:#f0edff; }
        .tree-node.active { background:#e8e3ff; color:#5c3dcf; font-weight:600; }

        .doc-view { background:#fafafe; border:1px solid #eef0f4; border-radius:12px; padding:16px 20px; margin-top:12px; }

        .modal-overlay {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4);
            z-index:100; justify-content:center; align-items:center;
        }
        .modal-overlay.active { display:flex; }
        .modal {
            background:#fff; border-radius:12px; padding:28px; width:640px;
            max-width:92vw; max-height:88vh; overflow-y:auto;
            box-shadow:0 8px 32px rgba(0,0,0,0.15);
        }
        .modal h3 { font-size:16px; margin-bottom:16px; }
    </style>
</head>
<body>
<th:block layout:fragment="content">

<th:block th:replace="~{kb_tab_bar :: kb-tabs('notes', ${kb}, ${labels})}" />

<!-- 面包屑 -->
<div style="margin-bottom:16px;font-size:13px;">
    <a th:href="@{/kb/{id}/notes(id=${kb.id})}" style="color:#7c5cfc;text-decoration:none;">📂 全部目录</a>
    <span th:each="b : ${breadcrumbs}" style="color:#999;"> / </span>
    <span th:text="${currentDir}" style="font-weight:600;">当前目录</span>
</div>

<!-- Tab 栏 -->
<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('files')">📄 文件</button>
    <button class="tab-btn" onclick="switchTab('analysis')">🤖 AI 分析</button>
    <button class="tab-btn" onclick="switchTab('data')">📋 原始数据</button>
</div>

<!-- 文件 Tab -->
<div id="tab-files" class="tab-content active">
    <div class="card">
        <div style="margin-top:12px;">
            <div th:each="f : ${files}" style="padding:8px 0;border-bottom:1px solid #f0f0f0;">
                <a th:if="${!f.is_dir}"
                   th:href="@{/kb/{id}/notes/view(path=${currentDir + '/' + f.name})}"
                   style="text-decoration:none;color:#333;">
                    <span>📄</span> <span th:text="${f.name}">文件名</span>
                </a>
                <a th:if="${f.is_dir}"
                   th:href="@{/kb/{id}/notes(dir=${currentDir + '/' + f.name}, id=${kb.id})}"
                   style="text-decoration:none;color:#333;">
                    <span>📁</span> <span th:text="${f.name}">目录名</span>
                </a>
                <span class="text-muted" style="font-size:12px;margin-left:8px;" th:text="${f.modified}"></span>
            </div>
            <div th:if="${files.isEmpty()}" class="text-muted" style="padding:20px;text-align:center;">
                目录为空
            </div>
        </div>
    </div>
</div>

<!-- AI 分析 Tab -->
<div id="tab-analysis" class="tab-content">
    <div class="card" style="background:linear-gradient(135deg,#f0edff,#fafafe);border:1px solid #d9d0ff;">
        <h2 style="margin-bottom:4px;">🤖 AI 分析报告</h2>
        <div th:if="${latestReport != null}" class="report" th:utext="${latestReport}"></div>
        <div th:if="${latestReport == null}" class="text-muted" style="padding:20px;text-align:center;">
            暂无分析报告，点击下方按钮开始分析
        </div>
        <div style="margin-top:12px;">
            <textarea id="analyzePrompt" rows="3" placeholder="输入分析提示词（可留空）"
                style="width:100%;padding:10px;border:1px solid #e1e3e6;border-radius:8px;font-size:13px;
                       font-family:monospace;resize:vertical;box-sizing:border-box;"></textarea>
            <div style="margin-top:8px;text-align:right;">
                <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalysis()">🚀 开始分析</button>
            </div>
        </div>
        <div id="analyzeResult" style="margin-top:12px;display:none;">
            <div style="max-height:400px;overflow-y:auto;padding:12px;background:#fff;border-radius:8px;border:1px solid #e1e3e6;"
                 id="analyzeResultContent"></div>
        </div>
    </div>
</div>

<!-- 原始数据 Tab -->
<div id="tab-data" class="tab-content">
    <div class="card">
        <h2 style="margin-bottom:8px;">📋 原始数据</h2>
        <div th:if="${jsonFiles != null && !jsonFiles.isEmpty()}">
            <div th:each="jf : ${jsonFiles}" style="padding:8px 0;border-bottom:1px solid #f0f0f0;">
                <a href="#" th:attr="data-file=${jf.fileName}"
                   onclick="loadJsonData(this.getAttribute('data-file'));return false;"
                   style="text-decoration:none;color:#7c5cfc;font-weight:500;"
                   th:text="${jf.fileName}">文件名</a>
                <span class="text-muted" style="font-size:11px;margin-left:6px;">.json</span>
            </div>
        </div>
        <div th:if="${jsonFiles == null || jsonFiles.isEmpty()}" class="text-muted" style="padding:20px;text-align:center;">
            暂无数据文件
        </div>
        <div id="jsonDataContent" style="margin-top:12px;"></div>
    </div>
</div>

<script>
var KB_ID = [[${kb.id}]];
var CURRENT_DIR = [[${currentDir}]];

function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    document.querySelector('.tab-btn[onclick*="' + name + '"]').classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
}

function startAnalysis() {
    var btn = document.getElementById('analyzeBtn');
    btn.disabled = true; btn.textContent = '⏳ 分析中...';
    var resultDiv = document.getElementById('analyzeResult');
    var resultContent = document.getElementById('analyzeResultContent');
    resultDiv.style.display = 'block';
    resultContent.innerHTML = '<span class="text-muted">AI 正在探索目录并分析内容...</span>';

    var prompt = document.getElementById('analyzePrompt').value;
    var url = '/kb/' + KB_ID + '/api/analyze-dir?dir=' + encodeURIComponent(CURRENT_DIR)
              + '&prompt=' + encodeURIComponent(prompt);

    var evtSource = new EventSource(url);
    evtSource.onmessage = function(e) {
        var data = JSON.parse(e.data);
        if (data.type === 'text') {
            resultContent.innerHTML = data.content.replace(/\n/g, '<br>');
            btn.textContent = '✅ 分析完成';
            setTimeout(function() { location.reload(); }, 1000);
        } else if (data.type === 'error') {
            resultContent.innerHTML = '<span style="color:red;">' + data.content + '</span>';
            btn.disabled = false; btn.textContent = '🚀 重新分析';
        } else if (data.type === 'done') {
            evtSource.close();
        }
    };
    evtSource.onerror = function() {
        evtSource.close();
        btn.disabled = false; btn.textContent = '🚀 重新分析';
    };
}

function loadJsonData(fileName) {
    fetch('/kb/' + KB_ID + '/api/data/read?dir=' + encodeURIComponent(CURRENT_DIR) + '&file=' + encodeURIComponent(fileName))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.ok) {
                var result = data.data;
                var html = '<h3>' + fileName + '</h3>';
                if (result.groups) {
                    for (var g in result.groups) {
                        html += '<div style="margin:8px 0;"><strong>' + g + '</strong> (' + result.groups[g].count + ' 条)</div>';
                    }
                }
                document.getElementById('jsonDataContent').innerHTML = html;
            }
        });
}
</script>

</th:block>
</body>
</html>
