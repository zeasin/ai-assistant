server:
  port: 6790
  address: 0.0.0.0

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: true
    encoding: UTF-8
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
  datasource:
    url: jdbc:sqlite:${ASSISTANT_CONFIG_DIR:.}/memory.db
    driver-class-name: org.sqlite.JDBC

app:
  config-dir: ${ASSISTANT_CONFIG_DIR:.}
  notes-port: 14096
  code-port: 14099
  timezone: Asia/Shanghai
  max-history-chars: 6000
  ollama:
    base-url: http://127.0.0.1:11434
    model: nomic-embed-text
    timeout-seconds: 30
  llm:
    api-key: sk-IwBKOtmu2qdngCnfVVO7SC213uqGFiWM
    # ${LLM_API_KEY:}
    # 兼容 OpenAI Chat Completions 格式的 API 地址
    # DeepSeek: https://api.deepseek.com
    # 商汤日日新: https://api.sensenova.cn/v1（请从商汤后台确认）
    base-url: https://token.sensenova.cn/v1
    model: sensenova-6.7-flash-lite
    timeout-seconds: 60

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    root: INFO
    com.laoqi.assistant.service.SchedulerService: DEBUG
    com.laoqi.assistant.service.ConfigService: DEBUG
    com.laoqi.assistant.service.FeishuService: DEBUG
    com.laoqi.assistant.service.OpenCodeService: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${user.dir}/app.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7

